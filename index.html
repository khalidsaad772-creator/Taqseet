<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محل التقسيط - الإدارة الشاملة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
/* نفس الستايل الخاص بك بدون أي تغيير */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma, Arial, sans-serif;background:#f0f8ff;padding:10px}
.container{max-width:550px;margin:0 auto;background:white;border-radius:16px;padding:20px;box-shadow:0 6px 25px rgba(0,0,0,0.15)}
h1{color:#28a745;text-align:center;margin:20px 0;font-size:26px}
h2{color:#007bff;text-align:center;margin:15px 0;font-size:20px}

input,button,select{width:100%;padding:14px;margin:8px 0;border:2px solid #28a745;border-radius:12px;font-size:16px;text-align:center}
button{background:#28a745;color:#fff;font-weight:bold;cursor:pointer;transition:background .3s}
button:hover{background:#1e7e34}

.btn{padding:8px 5px; margin:3px; font-size:13px; border-radius:8px; font-weight:bold; cursor:pointer; flex-basis: calc(25% - 6px); min-width: 60px;}
.action-content{display:flex; flex-wrap:wrap; gap:5px; justify-content:center;}
.pay{background:#007bff; color:#fff}.wa{background:#25D366; color:#fff}.edit{background:#ffc107;color:#000}.del{background:#dc3545; color:#fff}.cam{background:#6f42c1; color:#fff}

.result{background:#d4edda;color:#155524;padding:16px;border-radius:12px;margin:15px 0;text-align:center;font-size:18px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin:15px 0;font-size:14px;border-radius:12px;overflow:hidden}
th{background:#28a745;color:#fff;padding:12px}
td{border:1px solid #ddd;padding:10px;text-align:center;background:#f9f9f9}
.progress{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin:8px 0}
.bar{height:100%;background:#28a745;transition:width .6s}
.client-thumb{width:40px;height:40px;border-radius:50%;object-fit:cover;border:3px solid #28a745;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal-content{background:white;padding:25px;border-radius:16px;width:90%;max-width:450px;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
<h1>محل التقسيط 💰</h1>
<input type="text" id="name" placeholder="* اسم العميل">
<input type="text" id="phone" placeholder="* رقم التليفون">
<input type="text" id="product" placeholder="وصف المنتج">
<div style="display:flex; gap:5px">
    <input type="number" id="price" placeholder="* السعر">
    <input type="number" id="months" placeholder="* الشهور">
</div>
<input type="number" id="interest" placeholder="* الفائدة %">
<input type="date" id="regDate">
<button onclick="addClient()">إضافة عميل جديد</button>

<h2 style="color:#d35400">خزنة المحصلات 🏦</h2>
<div id="safeRes" class="result" style="background:#fff3cd; color:#856404;">0 ج.م</div>
<button onclick="clearSafe()" style="background:#ff9800; border:none; color:white">جرد وتصفير الخزنة 🧹</button>

<h2>إجمالي الأرباح المتوقعة</h2>
<div id="res" class="result">0 جنيه</div>

<h2 style="color:#20B2AA">إدارة رأس المال 💸</h2>
<div id="capitalRes" class="result" style="background:#ADD8E6; color:#0056b3;">0 ج.م</div>
<button onclick="openCapitalModal()" style="background:#007bff; border:none; color:white">إضافة سحب / إيداع</button>

<h2 id="clientsCount">العملاء (0)</h2>
<div id="clientsTable"></div>
</div>

<div id="capitalModal" class="modal hidden"><div class="modal-content">
    <h2>حركة رأس مال</h2>
    <select id="capType"><option value="in">إيداع (+)</option><option value="out">سحب (-)</option></select>
    <input id="capitalAmount" type="number" placeholder="المبلغ">
    <input id="capitalReason" type="text" placeholder="السبب (مثلاً: فاتورة كهرباء)">
    <input id="capitalDate" type="date">
    <button onclick="addCapitalEntry()">حفظ</button>
    <button onclick="closeModal('capitalModal')" style="background:#dc3545; color:white; border:none">إغلاق</button>
</div></div>

<div id="paymentModal" class="modal hidden"><div class="modal-content">
    <h2>تسجيل قسط</h2>
    <input id="paymentAmount" type="number">
    <input id="paymentDate" type="date">
    <button onclick="addPayment()">تأكيد الدفع</button>
    <button onclick="closeModal('paymentModal')" style="background:#dc3545; border:none; color:white">إلغاء</button>
</div></div>

<div id="editModal" class="modal hidden"><div class="modal-content">
    <h2>تعديل العميل</h2>
    <input id="editName"><input id="editPhone"><input id="editProduct"><input id="editPrice" type="number"><input id="editMonths" type="number"><input id="editInterest" type="number">
    <button onclick="saveClient()">حفظ</button>
    <button onclick="closeModal('editModal')" style="background:#dc3545; border:none; color:white">إغلاق</button>
</div></div>

<script>
let clients = JSON.parse(localStorage.getItem('clients') || '[]');
let capitalEntries = JSON.parse(localStorage.getItem('capitalEntries') || '[]');
let cashSafe = Number(localStorage.getItem('cashSafe') || 0);
let currentIndex = -1;
const today = new Date().toISOString().split('T')[0];

const formatCurrency = (num) => Number(num).toLocaleString('ar-EG') + ' ج.م';

function save() {
    localStorage.setItem('clients', JSON.stringify(clients));
    localStorage.setItem('capitalEntries', JSON.stringify(capitalEntries));
    localStorage.setItem('cashSafe', cashSafe);
    showClients();
}

function addClient() {
    const name = document.getElementById('name').value;
    if(!name) return alert("أدخل الاسم");
    clients.push({
        name, phone: document.getElementById('phone').value,
        product: document.getElementById('product').value || 'بضاعة',
        price: Number(document.getElementById('price').value),
        months: Number(document.getElementById('months').value),
        interest: Number(document.getElementById('interest').value),
        registrationDate: document.getElementById('regDate').value || today,
        paid: 0, payments: []
    });
    save();
}

function showClients() {
    let totalProfits = clients.reduce((a,c) => a + (c.price * (c.interest/100)), 0);
    document.getElementById('res').innerText = formatCurrency(totalProfits);
    document.getElementById('safeRes').innerText = formatCurrency(cashSafe);
    document.getElementById('capitalRes').innerText = formatCurrency(capitalEntries.reduce((a,c)=>a+Number(c.amount),0));
    document.getElementById('clientsCount').innerText = `العملاء (${clients.length})`;

    let html = `<table><tr><th>العميل والتليفون</th><th>متبقي</th><th>القسط القادم</th></tr>`;
    clients.forEach((c, i) => {
        const total = c.price * (1 + (c.interest/100));
        const inst = total / c.months;
        const rem = total - c.paid;
        const nextDate = new Date(c.registrationDate);
        nextDate.setMonth(nextDate.getMonth() + Math.floor(c.paid / (inst || 1)) + 1);

        html += `<tr>
            <td style="text-align:right"><b>${c.name}</b><br><small>${c.phone}</small><br><i style="font-size:10px">${c.product}</i></td>
            <td>${formatCurrency(rem)}</td>
            <td><b style="color:#007bff">${formatCurrency(Math.min(inst, rem))}</b><br><small>${nextDate.toLocaleDateString('ar-EG')}</small></td>
        </tr>
        <tr><td colspan="3">
            <div class="progress"><div class="bar" style="width:${Math.min(100, (c.paid/total)*100)}%"></div></div>
            <div class="action-content">
                <button class="btn pay" onclick="openPaymentModal(${i})">قسط</button>
                <button class="btn edit" onclick="openEdit(${i})">تعديل</button>
                <button class="btn wa" onclick="sendWA(${i})">واتس</button>
                <button class="btn del" onclick="deleteClient(${i})">حذف</button>
            </div>
        </td></tr>`;
    });
    document.getElementById('clientsTable').innerHTML = html + `</table>`;
}

function openPaymentModal(i) {
    currentIndex = i;
    const inst = (clients[i].price * (1 + clients[i].interest/100)) / clients[i].months;
    document.getElementById('paymentAmount').value = Math.round(inst);
    document.getElementById('paymentDate').value = today;
    document.getElementById('paymentModal').classList.remove('hidden');
}

function addPayment() {
    const amt = Number(document.getElementById('paymentAmount').value);
    clients[currentIndex].paid += amt;
    clients[currentIndex].payments.push({amt, date: document.getElementById('paymentDate').value});
    cashSafe += amt; // إضافة للخزنة التراكمية
    save(); closeModal('paymentModal');
}

function sendWA(i) {
    const c = clients[i];
    const total = c.price * (1 + (c.interest/100));
    const inst = total / c.months;
    const rem = total - c.paid;
    const nextDate = new Date(c.registrationDate);
    nextDate.setMonth(nextDate.getMonth() + Math.floor(c.paid/inst) + 1);

    const msg = `مرحباً ${c.name}، إليك تفاصيل تقسيط ${c.product}:\n\n`
              + `• المبلغ الإجمالي المتبقي: ${formatCurrency(rem)}\n`
              + `• باقي الأقساط المتوقعة: ${Math.ceil(rem/inst)} قسط\n`
              + `• قيمة القسط القادم: ${formatCurrency(Math.min(inst, rem))}\n`
              + `• تاريخ استحقاق القسط: ${nextDate.toLocaleDateString('ar-EG')}\n\n`
              + `برجاء سرعة السداد. شكراً لتعاونك.`;
    window.open(`https://wa.me/${c.phone.startsWith('0')?'2'+c.phone:c.phone}?text=${encodeURIComponent(msg)}`);
}

function openCapitalModal() { document.getElementById('capitalDate').value = today; document.getElementById('capitalModal').classList.remove('hidden'); }
function addCapitalEntry() {
    const amt = Number(document.getElementById('capitalAmount').value);
    const type = document.getElementById('capType').value;
    capitalEntries.push({amount: type==='in'?amt:-amt, reason: document.getElementById('capitalReason').value, date: document.getElementById('capitalDate').value});
    save(); closeModal('capitalModal');
}

function openEdit(i) {
    currentIndex = i; const c = clients[i];
    document.getElementById('editName').value = c.name; document.getElementById('editPhone').value = c.phone;
    document.getElementById('editProduct').value = c.product; document.getElementById('editPrice').value = c.price;
    document.getElementById('editMonths').value = c.months; document.getElementById('editInterest').value = c.interest;
    document.getElementById('editModal').classList.remove('hidden');
}
function saveClient() {
    const c = clients[currentIndex];
    c.name = document.getElementById('editName').value; c.phone = document.getElementById('editPhone').value;
    c.product = document.getElementById('editProduct').value; c.price = Number(document.getElementById('editPrice').value);
    c.months = Number(document.getElementById('editMonths').value); c.interest = Number(document.getElementById('editInterest').value);
    save(); closeModal('editModal');
}

function deleteClient(i) { if(confirm("حذف؟")) { clients.splice(i,1); save(); } }
function clearSafe() { if(confirm("تصفير الخزنة؟")) { cashSafe = 0; save(); } }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

window.onload = () => { document.getElementById('regDate').value = today; showClients(); };
</script>
</body>
</html>
