<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التقسيط الاحترافي - إدارة السيولة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma, Arial, sans-serif;background:#f0f8ff;padding:10px}
.container{max-width:550px;margin:0 auto;background:white;border-radius:16px;padding:20px;box-shadow:0 6px 25px rgba(0,0,0,0.15)}
h1{color:#28a745;text-align:center;margin:20px 0;font-size:26px}
h2{color:#007bff;text-align:center;margin:15px 0;font-size:18px}
input,button,select{width:100%;padding:14px;margin:8px 0;border:2px solid #28a745;border-radius:12px;font-size:16px;text-align:center}
button{background:#28a745;color:#fff;font-weight:bold;cursor:pointer;border:none}
.backup-btn{background:#ff9800!important}.restore-btn{background:#9c27b0!important}
.btn{padding:8px 5px; margin:3px; font-size:13px; border-radius:8px; font-weight:bold; cursor:pointer; flex: 1; min-width: 65px; color:#fff; border:none}
.action-content{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; align-items:center; padding:10px 0}
.pay{background:#007bff}.wa{background:#25D366}.edit{background:#ffc107;color:#000}.del{background:#dc3545}.cam{background:#6f42c1}
.result{background:#d4edda;color:#155524;padding:12px;border-radius:12px;margin:5px 0;text-align:center;font-size:16px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border:1px solid #ddd}
th{background:#28a745;color:#fff;padding:10px}
td{border:1px solid #ddd;padding:10px;text-align:center;background:#fff}
.progress{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:8px;width:100%}
.bar{height:100%;background:#28a745}
.client-thumb{width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid #28a745; margin:0 5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal-content{background:white;padding:20px;border-radius:16px;width:95%;max-width:400px}
.hidden{display:none!important}
.summary-box{display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;}
</style>
</head>
<body>
<div class="container">
    <h1>محل التقسيط 💰</h1>
    
    <input type="text" id="name" placeholder="* اسم العميل">
    <input type="text" id="phone" placeholder="* رقم التليفون">
    <input type="text" id="product" placeholder="وصف المنتج">
    <div style="display:flex; gap:5px">
        <input type="number" id="price" placeholder="* السعر الأصل">
        <input type="number" id="months" placeholder="* الشهور">
    </div>
    <input type="number" id="interest" placeholder="* الفائدة %">
    <input type="date" id="regDate">
    <button onclick="addClient()">إضافة عميل جديد</button>
    <button onclick="exportPDF()" style="background:#4CAF50">Export Report 📄</button>

    <h2 style="color:#20B2AA">إدارة المال والسيولة 💸</h2>
    <div class="summary-box">
        <div>
            <small>رأس مال البنك (دين)</small>
            <div id="bankCapRes" class="result" style="background:#fff3cd; color:#856404;">0</div>
        </div>
        <div>
            <small>الخزنة (تحصيل متاح)</small>
            <div id="safeRes" class="result" style="background:#e8f5e9; color:#2e7d32;">0</div>
        </div>
    </div>
    
    <div style="display:flex; gap:10px;">
        <button onclick="openCapitalModal()" style="flex:1; background:#007bff">إيداع / سحب بنكي</button>
        <button class="backup-btn" onclick="exportData()" style="padding:10px">💾</button>
        <button class="restore-btn" onclick="document.getElementById('restoreInput').click()" style="padding:10px">♻️</button>
    </div>
    <input type="file" id="restoreInput" accept=".json" onchange="restoreData(event)" style="display:none">

    <h2>إجمالي الربح الشهري المتوقع</h2>
    <div id="monthlyRes" class="result">0 ج.م</div>

    <h2 id="clientsCount">العملاء (0)</h2>
    <div id="clientsTable"></div>
</div>

<div id="capitalModal" class="modal hidden"><div class="modal-content">
    <h3>حركة رأس مال البنك</h3>
    <select id="capType"><option value="in">سحب من البنك (+)</option><option value="out">سداد للبنك (-)</option></select>
    <input id="capitalAmount" type="number" placeholder="المبلغ">
    <input id="capitalReason" type="text" placeholder="ملاحظة">
    <button onclick="addCapitalEntry()">تسجيل الحركة</button>
    <div id="capitalEntriesTable" style="max-height:150px; overflow:auto"></div>
    <button onclick="closeModal('capitalModal')" style="background:#dc3545">إغلاق</button>
</div></div>

<div id="paymentModal" class="modal hidden"><div class="modal-content">
    <h3>تحصيل قسط</h3>
    <input id="paymentAmount" type="number" placeholder="المبلغ"><input id="paymentDate" type="date">
    <button onclick="addPayment()">تأكيد التحصيل</button>
    <div id="paymentsTable" style="max-height:150px; overflow:auto"></div>
    <button onclick="closeModal('paymentModal')" style="background:#dc3545">إغلاق</button>
</div></div>

<div id="photoModal" class="modal hidden"><div class="modal-content" style="text-align:center">
    <h3>صورة العميل</h3>
    <img id="previewImage" style="max-width:150px; border-radius:10px; display:none; margin:10px auto; border:2px solid #28a745">
    <input type="file" id="photoInput" accept="image/*" onchange="loadPhoto(event)" style="display:none">
    <button onclick="document.getElementById('photoInput').click()" style="background:#17a2b8">اختيار صورة</button>
    <button onclick="savePhoto()" style="background:#28a745">حفظ</button>
    <button onclick="closeModal('photoModal')" style="background:#dc3545">إلغاء</button>
</div></div>

<script>
let clients = JSON.parse(localStorage.getItem('clients') || '[]');
let capitalEntries = JSON.parse(localStorage.getItem('capitalEntries') || '[]');
let currentIndex = -1;
let tempPhoto = null;
const today = new Date().toISOString().split('T')[0];

const formatCurrency = (n) => Number(n).toLocaleString('ar-EG') + ' ج.م';
const formatCurrencyEn = (n) => Number(n).toFixed(0).replace(/\d(?=(\d{3})+$)/g, '$&,') + ' EGP';

function save() {
    localStorage.setItem('clients', JSON.stringify(clients));
    localStorage.setItem('capitalEntries', JSON.stringify(capitalEntries));
    showClients();
}

function addClient() {
    const name = document.getElementById('name').value;
    const price = document.getElementById('price').value;
    if(!name || !price) return alert("أكمل البيانات");
    clients.push({
        name, phone: document.getElementById('phone').value,
        product: document.getElementById('product').value || "منتج",
        price: Number(price),
        months: Number(document.getElementById('months').value) || 1,
        interest: Number(document.getElementById('interest').value) / 100,
        paid: 0, payments: [], photo: null, registrationDate: document.getElementById('regDate').value || today
    });
    save();
}

function showClients() {
    let monthProf = 0, totalSafe = 0;
    const now = new Date();
    
    clients.forEach(c => {
        totalSafe += (c.paid || 0);
        const profitRatio = (c.interest) / (1 + c.interest);
        c.payments.forEach(p => {
            const pd = new Date(p.date);
            if(pd.getMonth() === now.getMonth() && pd.getFullYear() === now.getFullYear()) {
                monthProf += (p.amount * profitRatio);
            }
        });
    });

    document.getElementById('bankCapRes').innerText = formatCurrency(capitalEntries.reduce((a,c)=>a+c.amount,0));
    document.getElementById('safeRes').innerText = formatCurrency(totalSafe);
    document.getElementById('monthlyRes').innerText = formatCurrency(monthProf);
    document.getElementById('clientsCount').innerText = "العملاء (" + clients.length + ")";

    let html = '<table><thead><tr><th>العميل</th><th>مدفوع</th><th>متبقي</th><th>القسط</th></tr></thead><tbody>';
    clients.forEach((c, i) => {
        const total = c.price * (1 + c.interest);
        const inst = total / c.months;
        const rem = total - c.paid;
        const thumb = c.photo ? `<img src="${c.photo}" class="client-thumb">` : `<div class="client-thumb" style="background:#eee"></div>`;

        html += `<tr>
            <td style="text-align:right"><b>${c.name}</b><br><small>${c.product}</small></td>
            <td>${c.paid}</td>
            <td>${rem.toFixed(0)}</td>
            <td><b>${inst.toFixed(0)}</b></td>
        </tr>
        <tr><td colspan="4">
            <div class="progress"><div class="bar" style="width:${(c.paid/total)*100}%"></div></div>
            <div class="action-content">
                <button class="btn pay" onclick="openPaymentModal(${i})">تحصيل</button>
                <button class="btn wa" onclick="sendWA(${i})">واتس</button>
                ${thumb}
                <button class="btn cam" onclick="openPhotoModal(${i})">صورة</button>
                <button class="btn del" onclick="deleteClient(${i})">حذف</button>
            </div>
        </td></tr>`;
    });
    document.getElementById('clientsTable').innerHTML = html + '</tbody></table>';
}

function sendWA(i) {
    const c = clients[i];
    const total = c.price * (1 + c.interest);
    const inst = Math.round(total / c.months);
    const rem = Math.round(total - c.paid);
    const remainingInstCount = Math.ceil(rem / inst);
    
    const nextDate = new Date(c.registrationDate);
    nextDate.setMonth(nextDate.getMonth() + Math.floor(c.paid / inst) + 1);

    const msg = `مرحباً ${c.name}، إليك تفاصيل تقسيط ${c.product}:

• المبلغ الإجمالي المتبقي: ${formatCurrency(rem)}
• باقي الأقساط المتوقعة: ${remainingInstCount} قسط
• قيمة القسط القادم: ${formatCurrency(Math.min(inst, rem))}
• تاريخ استحقاق القسط: ${nextDate.toLocaleDateString('ar-EG')}

برجاء سرعة السداد. شكراً لتعاونك.`;

    window.open(`https://wa.me/${c.phone.replace(/\D/g,'')}/?text=${encodeURIComponent(msg)}`);
}

function openPhotoModal(i) {
    currentIndex = i;
    tempPhoto = clients[i].photo;
    const img = document.getElementById('previewImage');
    if(tempPhoto) { img.src = tempPhoto; img.style.display = 'block'; } 
    else { img.style.display = 'none'; }
    document.getElementById('photoModal').classList.remove('hidden');
}

function loadPhoto(e) {
    const reader = new FileReader();
    reader.onload = ev => {
        tempPhoto = ev.target.result;
        document.getElementById('previewImage').src = tempPhoto;
        document.getElementById('previewImage').style.display = 'block';
    };
    reader.readAsDataURL(e.target.files[0]);
}

function savePhoto() {
    if(tempPhoto) clients[currentIndex].photo = tempPhoto;
    save(); closeModal('photoModal');
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    doc.text("Installment Report", 105, 15, {align:'center'});
    
    const data = clients.map(c => [
        c.name, c.phone, 
        formatCurrencyEn(c.paid), 
        formatCurrencyEn(c.price*(1+c.interest)-c.paid), 
        formatCurrencyEn((c.price*(1+c.interest))/c.months)
    ]);

    doc.autoTable({
        head: [['Name', 'Phone', 'Paid', 'Remaining', 'Installment']],
        body: data, startY: 25, headStyles: {fillColor:[40, 167, 69]}
    });
    doc.save("Report.pdf");
}

function openCapitalModal() { displayCapital(); document.getElementById('capitalModal').classList.remove('hidden'); }
function addCapitalEntry() {
    const amt = Number(document.getElementById('capitalAmount').value);
    const type = document.getElementById('capType').value;
    capitalEntries.push({ amount: type==='in'?amt:-amt, date: today, reason: document.getElementById('capitalReason').value });
    save(); displayCapital();
}
function displayCapital() {
    let h = '<table>';
    capitalEntries.slice().reverse().forEach((e, i) => {
        h += `<tr><td>${e.amount}</td><td>${e.reason}</td></tr>`;
    });
    document.getElementById('capitalEntriesTable').innerHTML = h + '</table>';
}

function openPaymentModal(i) { currentIndex = i; displayPayments(i); document.getElementById('paymentModal').classList.remove('hidden'); }
function addPayment() {
    const amt = Number(document.getElementById('paymentAmount').value);
    if(!amt) return;
    clients[currentIndex].payments.push({amount: amt, date: document.getElementById('paymentDate').value || today});
    clients[currentIndex].paid += amt;
    save(); closeModal('paymentModal');
}
function displayPayments(idx) {
    let h = '<table>';
    clients[idx].payments.forEach(p => h += `<tr><td>${p.date}</td><td>${p.amount}</td></tr>`);
    document.getElementById('paymentsTable').innerHTML = h + '</table>';
}

function deleteClient(i) { if(confirm("حذف؟")) { clients.splice(i,1); save(); } }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function exportData() {
    const blob = new Blob([JSON.stringify({clients, capitalEntries})], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
}
function restoreData(e) {
    const r = new FileReader();
    r.onload = ev => { const d = JSON.parse(ev.target.result); clients = d.clients; capitalEntries = d.capitalEntries; save(); };
    r.readAsText(e.target.files[0]);
}

window.onload = () => { document.getElementById('regDate').value = today; showClients(); };
</script>
</body>
</html>
