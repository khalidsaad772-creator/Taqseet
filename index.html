<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محل التقسيط - النسخة النهائية المصلحة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma, Arial, sans-serif;background:#f0f8ff;padding:10px}
.container{max-width:550px;margin:0 auto;background:white;border-radius:16px;padding:20px;box-shadow:0 6px 25px rgba(0,0,0,0.15)}
h1{color:#28a745;text-align:center;margin:20px 0;font-size:26px}
h2{color:#007bff;text-align:center;margin:15px 0;font-size:18px}
input,button,select{width:100%;padding:14px;margin:8px 0;border:2px solid #28a745;border-radius:12px;font-size:16px;text-align:center}
button{background:#28a745;color:#fff;font-weight:bold;cursor:pointer;border:none}
.btn{padding:8px 5px; margin:3px; font-size:13px; border-radius:8px; font-weight:bold; cursor:pointer; flex: 1; min-width: 65px; color:#fff; border:none}
.action-content{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; align-items:center; padding:10px 0}
.pay{background:#007bff}.wa{background:#25D366}.edit{background:#ffc107;color:#000}.del{background:#dc3545}.cam{background:#6f42c1}
.result{background:#d4edda;color:#155524;padding:16px;border-radius:12px;margin:10px 0;text-align:center;font-size:18px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border-radius:12px;overflow:hidden; border:1px solid #ddd}
th{background:#28a745;color:#fff;padding:12px; text-align:center}
td{border:1px solid #ddd;padding:10px;text-align:center;background:#fff}
.progress{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:8px;width:100%}
.bar{height:100%;background:#28a745}
.client-thumb{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #28a745; margin:0 5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal-content{background:white;padding:20px;border-radius:16px;width:95%;max-width:400px;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
    <h1>محل التقسيط 💰</h1>
    <input type="text" id="name" placeholder="* اسم العميل">
    <input type="text" id="phone" placeholder="* رقم التليفون">
    <input type="text" id="product" placeholder="وصف المنتج">
    <div style="display:flex; gap:5px"><input type="number" id="price" placeholder="* السعر"><input type="number" id="months" placeholder="* الشهور"></div>
    <input type="number" id="interest" placeholder="* الفائدة %">
    <input type="date" id="regDate">
    <button onclick="addClient()">إضافة عميل جديد</button>
    <button onclick="exportPDF()" style="background:#4CAF50">Export Clients Report 📄 (English)</button>

    <h2 style="color:#20B2AA">إدارة رأس المال 💸</h2>
    <div style="display:flex; gap:10px;">
        <button onclick="openCapitalModal()" style="flex:1; background:#007bff">إضافة رأس مال</button>
        <button onclick="exportCapitalPDF()" style="background:#4CAF50; flex:1">تقرير رأس مال PDF</button>
    </div>

    <h2>إجمالي رأس المال 💰</h2>
    <div id="capitalRes" class="result" style="background:#ADD8E6; color:#0056b3;">0 ج.م</div>
    <h2>إجمالي الربح الشهري الفعلي</h2>
    <div id="monthlyRes" class="result">0 ج.م</div>
    <h2>رصيد الخزنة (كل المتحصلات) 💵</h2>
    <div id="safeRes" class="result" style="background:#e8f5e9; color:#2e7d32;">0 ج.م</div>

    <h2 id="clientsCount">العملاء (0)</h2>
    <div id="clientsTable"></div>
</div>

<div id="capitalModal" class="modal hidden"><div class="modal-content">
    <h3>حركة رأس مال</h3>
    <select id="capType"><option value="in">إيداع (+)</option><option value="out">سحب (-)</option></select>
    <input id="capitalAmount" type="number" placeholder="المبلغ">
    <input id="capitalReason" type="text" placeholder="السبب">
    <input id="capitalDate" type="date">
    <button onclick="addCapitalEntry()">إضافة</button>
    <div id="capitalEntriesTable"></div>
    <button onclick="closeModal('capitalModal')" style="background:#dc3545">إغلاق</button>
</div></div>

<div id="paymentModal" class="modal hidden"><div class="modal-content">
    <h3>تسجيل قسط</h3>
    <input id="paymentAmount" type="number" placeholder="المبلغ"><input id="paymentDate" type="date">
    <button onclick="addPayment()">تأكيد</button>
    <div id="paymentsTable"></div>
    <button onclick="closeModal('paymentModal')" style="background:#dc3545">إغلاق</button>
</div></div>

<div id="photoModal" class="modal hidden"><div class="modal-content">
    <h3>صورة العميل</h3>
    <input type="file" id="photoInput" accept="image/*" onchange="loadPhoto(event)">
    <button onclick="savePhoto()">حفظ</button>
    <button onclick="closeModal('photoModal')" style="background:#dc3545">إلغاء</button>
</div></div>

<div id="editModal" class="modal hidden"><div class="modal-content">
    <h3>تعديل البيانات</h3>
    <input id="editName"><input id="editPhone"><input id="editProduct"><input id="editPrice" type="number"><input id="editMonths" type="number"><input id="editInterest" type="number">
    <button onclick="saveClient()">حفظ</button>
    <button onclick="closeModal('editModal')" style="background:#dc3545">إلغاء</button>
</div></div>

<script>
let clients = JSON.parse(localStorage.getItem('clients') || '[]');
let capitalEntries = JSON.parse(localStorage.getItem('capitalEntries') || '[]');
let currentIndex = -1;
let tempPhoto = null;

const formatCurrencyEn = (n) => Number(n).toLocaleString('en-US') + ' EGP';

function save() {
    localStorage.setItem('clients', JSON.stringify(clients));
    localStorage.setItem('capitalEntries', JSON.stringify(capitalEntries));
    showClients();
}

function addClient() {
    const name = document.getElementById('name').value;
    if(!name) return;
    clients.push({
        name, phone: document.getElementById('phone').value,
        product: document.getElementById('product').value || "بدون وصف",
        price: Number(document.getElementById('price').value),
        months: Number(document.getElementById('months').value),
        interest: Number(document.getElementById('interest').value) / 100,
        paid: 0, payments: [], photo: null, registrationDate: document.getElementById('regDate').value || new Date().toISOString().split('T')[0]
    });
    save();
}

function showClients() {
    let monthProf = 0, totalSafe = 0;
    const now = new Date();
    
    clients.forEach(c => {
        totalSafe += (c.paid || 0);
        const profitRatio = (c.interest) / (1 + c.interest);
        c.payments.forEach(p => {
            const pd = new Date(p.date);
            if(pd.getMonth() === now.getMonth() && pd.getFullYear() === now.getFullYear()) {
                monthProf += (p.amount * profitRatio);
            }
        });
    });

    document.getElementById('monthlyRes').innerText = monthProf.toFixed(2) + " ج.م";
    document.getElementById('safeRes').innerText = totalSafe + " ج.م";
    document.getElementById('capitalRes').innerText = capitalEntries.reduce((a,c)=>a+Number(c.amount),0) + " ج.م";
    document.getElementById('clientsCount').innerText = "العملاء (" + clients.length + ")";

    let html = '<table><thead><tr><th>الاسم والمنتج</th><th>تليفون</th><th>مدفوع</th><th>متبقي</th><th>القسط / التاريخ</th></tr></thead><tbody>';
    clients.forEach((c, i) => {
        const total = c.price * (1 + c.interest);
        const inst = total / c.months;
        const rem = total - c.paid;
        const thumb = c.photo ? `<img src="${c.photo}" class="client-thumb">` : `<div class="client-thumb" style="background:#eee"></div>`;

        html += `<tr>
            <td style="text-align:right"><b>${c.name}</b><br><small>${c.product}</small></td>
            <td>${c.phone}</td>
            <td>${c.paid} ج.م</td>
            <td>${rem.toFixed(0)} ج.م</td>
            <td><b>${inst.toFixed(0)} ج.م</b></td>
        </tr>
        <tr><td colspan="5">
            <div class="progress"><div class="bar" style="width:${(c.paid/total)*100}%"></div></div>
            <div class="action-content">
                <button class="btn pay" onclick="openPaymentModal(${i})">قسط</button>
                <button class="btn edit" onclick="editClient(${i})">تعديل</button>
                <button class="btn wa" onclick="sendWA(${i})">واتس</button>
                ${thumb}
                <button class="btn cam" onclick="openPhotoModal(${i})">صورة</button>
                <button class="btn del" onclick="deleteClient(${i})">حذف</button>
            </div>
        </td></tr>`;
    });
    document.getElementById('clientsTable').innerHTML = html + '</tbody></table>';
}

function sendWA(i) {
    const c = clients[i];
    const msg = `مرحباً ${c.name}، نذكركم بموعد القسط لـ ${c.product}.`;
    window.open(`https://wa.me/${c.phone}/?text=${encodeURIComponent(msg)}`);
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    
    let monthProfTotal = 0;
    const now = new Date();
    clients.forEach(c => {
        const profitRatio = (c.interest) / (1 + c.interest);
        c.payments.forEach(p => {
            const pd = new Date(p.date);
            if(pd.getMonth() === now.getMonth() && pd.getFullYear() === now.getFullYear()) {
                monthProfTotal += (p.amount * profitRatio);
            }
        });
    });

    doc.setFontSize(18);
    doc.text("Installment Clients Report", 105, 15, {align:'center'});
    
    const data = clients.map(c => [
        c.name, c.product, c.phone, 
        formatCurrencyEn(c.paid), 
        formatCurrencyEn(c.price*(1+c.interest)-c.paid), 
        formatCurrencyEn((c.price*(1+c.interest))/c.months)
    ]);

    doc.autoTable({
        head: [['Name', 'Product', 'Phone', 'Paid', 'Remaining', 'Installment']],
        body: data,
        startY: 30,
        headStyles: { fillColor: [40, 167, 69] }
    });

    doc.setFontSize(14);
    doc.setTextColor(0, 128, 0);
    doc.text("Actual Monthly Profit: " + monthProfTotal.toFixed(2) + " EGP", 105, doc.lastAutoTable.finalY + 15, {align:'center'});
    doc.save("Report.pdf");
}

function openPaymentModal(i) { currentIndex = i; displayPayments(i); document.getElementById('paymentModal').classList.remove('hidden'); }
function addPayment() {
    const amt = Number(document.getElementById('paymentAmount').value);
    clients[currentIndex].payments.push({amount: amt, date: document.getElementById('paymentDate').value});
    clients[currentIndex].paid += amt;
    save(); closeModal('paymentModal');
}
function displayPayments(idx) {
    let h = '<table>';
    clients[idx].payments.forEach((p, i) => h += `<tr><td>${p.date}</td><td>${p.amount}</td></tr>`);
    document.getElementById('paymentsTable').innerHTML = h + '</table>';
}
function openCapitalModal() { displayCapitalEntries(); document.getElementById('capitalModal').classList.remove('hidden'); }
function addCapitalEntry() {
    const amt = Number(document.getElementById('capitalAmount').value);
    capitalEntries.push({ amount: amt, date: document.getElementById('capitalDate').value, reason: document.getElementById('capitalReason').value });
    save(); displayCapitalEntries();
}
function displayCapitalEntries() {
    let h = '<table>';
    capitalEntries.forEach((e, i) => h += `<tr><td>${e.amount}</td><td>${e.reason}</td><td><button onclick="delCap(${i})" style="color:red">X</button></td></tr>`);
    document.getElementById('capitalEntriesTable').innerHTML = h + '</table>';
}
function delCap(i) { capitalEntries.splice(i,1); save(); displayCapitalEntries(); }
function editClient(i) {
    currentIndex = i; const c = clients[i];
    document.getElementById('editName').value = c.name; document.getElementById('editPhone').value = c.phone;
    document.getElementById('editModal').classList.remove('hidden');
}
function saveClient() {
    const c = clients[currentIndex];
    c.name = document.getElementById('editName').value; c.phone = document.getElementById('editPhone').value;
    save(); closeModal('editModal');
}
function openPhotoModal(i) { currentIndex = i; document.getElementById('photoModal').classList.remove('hidden'); }
function loadPhoto(e) { const r = new FileReader(); r.onload = ev => tempPhoto = ev.target.result; r.readAsDataURL(e.target.files[0]); }
function savePhoto() { if(tempPhoto) clients[currentIndex].photo = tempPhoto; save(); closeModal('photoModal'); }
function deleteClient(i) { if(confirm("حذف؟")) { clients.splice(i,1); save(); } }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
window.onload = showClients;
</script>
</body>
</html>
