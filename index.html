<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <title>معرض خالد خفاجي للتقسيط</title>
    <meta name="description" content="أسهل نظام تقسيط للموبايلات والأجهزة الكهربائية - خصم خاص لموظفي البريد">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; --gold-dark: #b8860b; --dark: #1a1a1a; 
            --green-wa: #25D366; --green-wa-dark: #128C7E;
            --blue-link: #3498db; --bg: #f8f9fa;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 0; color: #333; }

        header { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; padding: 45px 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }
        
        /* شريط البحث وتنسيقه الجديد */
        .search-container { position: sticky; top: 0; z-index: 1000; background: #fff; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 2px solid var(--gold); }
        .search-box { width: 90%; max-width: 600px; margin: auto; position: relative; }
        .search-box input { width: 100%; padding: 12px 45px 12px 15px; border-radius: 30px; border: 2px solid #eee; font-family: 'Cairo'; outline: none; box-sizing: border-box; font-size: 1rem; }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gold); }

        /* تنسيق الأقسام */
        .category-header { background: var(--dark); color: var(--gold); padding: 12px 20px; margin: 30px 20px 15px; border-radius: 10px; border-right: 6px solid var(--gold); font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .container { padding: 10px 20px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }

        .product-card { background: white; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .img-wrapper { position: relative; width: 100%; height: 280px; background: #fff; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; transition: 0.3s ease; }
        
        .product-info { padding: 15px; text-align: center; border-top: 1px solid #f1f1f1; }
        .price-tag { color: #2ecc71; font-weight: 800; font-size: 1.4rem; margin: 5px 0; }
        
        .btn-wa { background: linear-gradient(45deg, var(--green-wa), var(--green-wa-dark)); color: white; text-decoration: none; padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-weight: 700; font-size: 1.1rem; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-calc, .btn-share { background: #f0f4f8; color: var(--blue-link); border: 1px solid #dce4ec; padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; cursor: pointer; font-family: 'Cairo'; font-size: 0.85rem; }

        /* استعلام العملاء */
        .client-query-box { background: #fff; padding: 25px; margin: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; border: 1px solid var(--gold); }
        .client-query-box input { width: 100%; max-width: 300px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin: 5px; font-family: 'Cairo'; text-align: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: right; border-top: 6px solid var(--gold); max-height: 85vh; overflow-y: auto; }
        
        #imageModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10001; justify-content: center; align-items: center; }
        #modalImage { max-width: 95%; max-height: 90vh; object-fit: contain; }
        
        footer { background: #1a1a1a; color: white; padding: 30px 10px; text-align: center; border-top: 4px solid var(--gold); margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" class="logo-img">
    <h1 style="margin: 0;">معرض خالد خفاجي</h1>
    <p style="color: var(--gold); font-weight: 600;">للتقسيط وخدمات المحمول 📱</p>
</header>

<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن موبايل، غسالة، أو ماركة..." oninput="filterProducts()">
    </div>
</div>

<div class="client-query-box">
    <h3 style="margin-top:0">🔒 استعلام العملاء</h3>
    <input type="tel" id="clientPhone" placeholder="رقم التليفون">
    <input type="password" id="clientSecret" placeholder="الكود السري">
    <button onclick="checkInstallments()" style="background:var(--gold); border:none; padding:10px 30px; border-radius:20px; font-weight:bold; cursor:pointer; margin-top:10px;">دخول</button>
</div>

<div id="mainProductsContainer">
    </div>

<div id="resultModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<div id="imageModal" onclick="this.style.display='none'"><img id="modalImage"></div>

<footer>
    <p>جميع الحقوق محفوظة © معرض خالد خفاجي - كفر الشيخ</p>
    <a href="tel:01095890589" style="color:var(--gold); text-decoration:none; font-weight:bold; display:block; margin-top:10px;">
        <i class="fas fa-phone-alt"></i> 01095890589
    </a>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProducts = [];

    const categoryNames = {
        'mobiles_new': '📱 موبايلات جديدة',
        'mobiles_used': '✨ موبايلات كسر زيرو',
        'appliances_new': '🧺 أجهزة كهربائية جديدة',
        'appliances_used': '🔌 أجهزة كسر زيرو',
        'other': '📦 عروض متنوعة'
    };

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        allProducts = [];
        snapshot.forEach(doc => allProducts.push({id: doc.id, ...doc.data()}));
        renderAll(allProducts);
    });

    function renderAll(products) {
        const container = document.getElementById('mainProductsContainer');
        container.innerHTML = '';

        if(products.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:50px;">لا يوجد نتائج</p>';
            return;
        }

        // تقسيم المنتجات حسب القسم
        const grouped = products.reduce((acc, p) => {
            const cat = p.category || 'other';
            if (!acc[cat]) acc[cat] = [];
            acc[cat].push(p);
            return acc;
        }, {});

        // عرض كل قسم بمنتجاته
        Object.keys(categoryNames).forEach(catId => {
            if (grouped[catId] && grouped[catId].length > 0) {
                const section = document.createElement('div');
                section.innerHTML = `<div class="category-header"><i class="fas fa-tag"></i> ${categoryNames[catId]}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'container';
                
                grouped[catId].forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="img-wrapper" onclick="openImg('${p.image}')">
                                <img src="${p.image}" class="product-img" loading="lazy">
                            </div>
                            <div class="product-info">
                                <h3 style="margin:0; font-size:1.1rem">${p.name}</h3>
                                <p style="color:#666; font-size:0.8rem; margin:5px 0;">${p.description || ''}</p>
                                <p class="price-tag">${p.price.toLocaleString()} ج.م</p>
                                <p style="color:#888; font-size:0.9rem">مقدم: ${p.downPayment} ج.م</p>
                                <div class="action-btns">
                                    <button class="btn-calc" onclick="openInstallmentCalc('${p.name}', ${p.price}, ${p.downPayment}, ${p.interestRate || 20})">
                                        <i class="fas fa-calculator"></i> احسب قسطك
                                    </button>
                                    <button class="btn-share" onclick="shareProduct('${p.name}', ${p.price})">
                                        <i class="fas fa-share-alt"></i>
                                    </button>
                                </div>
                                <a href="https://wa.me/201095890589?text=استفسار عن ${p.name}" class="btn-wa">
                                    <i class="fab fa-whatsapp"></i> اطلب الآن
                                </a>
                            </div>
                        </div>
                    `;
                });
                section.appendChild(grid);
                container.appendChild(section);
            }
        });
    }

    window.filterProducts = function() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
        renderAll(filtered);
    };

    window.openImg = (src) => {
        document.getElementById('modalImage').src = src;
        document.getElementById('imageModal').style.display = 'flex';
    };

    // --- الوظائف الأساسية (بدون تعديل) ---
    window.shareProduct = function(name, price) {
        const text = `شوف العرض ده من معرض خالد خفاجي:\n${name}\nبسعر: ${price.toLocaleString()} ج.م`;
        if (navigator.share) navigator.share({title: 'معرض خالد خفاجي', text: text, url: window.location.href});
        else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    };

    window.checkInstallments = async function() {
        const phone = document.getElementById('clientPhone').value.trim();
        const secret = document.getElementById('clientSecret').value.trim();
        if (!phone || !secret) return alert("أدخل البيانات");
        const body = document.getElementById('modalBody');
        document.getElementById('resultModal').style.display = 'flex';
        body.innerHTML = 'جاري البحث...';
        try {
            const q = query(collection(db, "clients"), where("phone", "==", phone), where("secretCode", "==", secret));
            const snap = await getDocs(q);
            if (!snap.empty) {
                let h = `<h3>مرحباً، ${snap.docs[0].data().name}</h3>`;
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div style="border:1px solid #eee; padding:10px; margin-bottom:10px; border-radius:10px;">
                        <b>${d.product}</b><br>المدفوع: ${d.paid} | المتبقي: ${(d.price * (1 + d.interest)) - d.paid}
                    </div>`;
                });
                h += `<button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; padding:10px; background:var(--gold); border:none; border-radius:10px;">إغلاق</button>`;
                body.innerHTML = h;
            } else body.innerHTML = 'بيانات غير صحيحة';
        } catch(e) { body.innerHTML = 'خطأ في البحث'; }
    };

    window.openInstallmentCalc = (name, price, minDown, interest) => {
        const body = document.getElementById('modalBody');
        document.getElementById('resultModal').style.display = 'flex';
        body.innerHTML = `
            <h3 style="text-align:center">${name}</h3>
            <label>المقدم:</label><input type="number" id="uDown" value="${minDown}" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:10px;">
            <label>الشهور:</label><select id="uMonths" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px;"><option value="12">12 شهر</option><option value="6">6 شهور</option><option value="18">18 شهر</option></select>
            <button onclick="doCalc(${price}, ${interest})" style="width:100%; padding:12px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">احسب القسط</button>
            <div id="cRes" style="margin-top:15px; text-align:center; font-weight:bold; color:green;"></div>
            <button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:#999;">إغلاق</button>
        `;
    };

    window.doCalc = (price, rate) => {
        const down = parseFloat(document.getElementById('uDown').value);
        const months = parseInt(document.getElementById('uMonths').value);
        const rem = price - down;
        const total = rem + (rem * (rate/100) * (months/12));
        document.getElementById('cRes').innerText = `القسط الشهري: ${Math.round(total/months).toLocaleString()} ج.م`;
    };
</script>
</body>
</html>
