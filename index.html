<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <title>معرض خالد خفاجي للتقسيط</title>
    <meta name="description" content="أسهل نظام تقسيط للموبايلات والأجهزة الكهربائية - خصم خاص لموظفي البريد">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; --gold-dark: #b8860b; --dark: #1a1a1a; 
            --green-wa: #25D366; --green-wa-dark: #128C7E;
            --blue-link: #3498db; --bg: #f8f9fa;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 0; color: #333; }

        header { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; padding: 45px 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }
        
        /* --- تنسيق شريط البحث الجديد (دائري ومستقل) --- */
        .search-container-box { max-width: 500px; margin: 20px auto; padding: 0 20px; display: flex; gap: 10px; align-items: center; }
        .search-container-box input { flex: 1; padding: 12px 25px; border-radius: 50px; border: 2px solid var(--gold); outline: none; font-family: 'Cairo'; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-container-box button { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--gold); color: white; cursor: pointer; transition: 0.3s; }
        .search-container-box button:hover { background: var(--gold-dark); }

        /* --- تنسيق الأقسام التفاعلية (Collapse) --- */
        .category-wrapper { margin-bottom: 15px; }
        .category-header-btn { 
            background: var(--dark); color: var(--gold); 
            padding: 15px 25px; margin: 10px 20px; 
            border-radius: 15px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; 
            font-weight: 800; border-right: 6px solid var(--gold);
        }
        .category-header-btn i { transition: transform 0.3s ease; }
        .category-header-btn.closed i { transform: rotate(-90deg); }
        .category-content { display: block; } /* يفتح بشكل افتراضي */
        .category-content.hidden { display: none; }

        .search-section { background: #fff; padding: 25px; margin: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .search-section input { width: 85%; padding: 14px; border: 2px solid #eee; border-radius: 30px; font-family: 'Cairo'; margin-bottom: 10px; text-align: center; display: inline-block; box-sizing: border-box; }

        .container { padding: 10px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }

        .product-card { background: white; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; overflow: hidden;}
        .img-wrapper { position: relative; width: 100%; height: 320px; background: #fff; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .product-img { width: 75%; height: 75%; object-fit: contain; pointer-events: none; transition: transform 0.3s ease; }
        .product-info { padding: 15px; text-align: center; background: white; border-radius: 0 0 25px 25px; }
        .price-tag { color: #2ecc71; font-weight: 800; font-size: 1.4rem; margin: 5px 0; }
        
        .btn-wa { background: linear-gradient(45deg, var(--green-wa), var(--green-wa-dark)); color: white; text-decoration: none; padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-weight: 700; border: none; font-size: 1.1rem; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-calc, .btn-share { background: #f0f4f8; color: var(--blue-link); border: 1px solid #dce4ec; padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; cursor: pointer; font-family: 'Cairo'; font-size: 0.85rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: right; border-top: 6px solid var(--gold); max-height: 80vh; overflow-y: auto; }
        
        footer { background: #1a1a1a; color: white; padding: 30px 10px; text-align: center; border-top: 4px solid var(--gold); margin-top: 50px; }
        .footer-call { background: var(--gold); color: black; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; }

        /* الأكورديون الخاص بالاستعلام */
        .accordion { background-color: #f8f9fa; color: #333; cursor: pointer; padding: 15px; width: 100%; border: 1px solid #eee; text-align: right; outline: none; font-size: 1rem; transition: 0.4s; border-radius: 12px; margin-bottom: 8px; font-family: 'Cairo'; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .panel { padding: 0 15px; background-color: white; max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; border-radius: 0 0 12px 12px; margin-bottom: 10px; border: 1px solid #f1f1f1; border-top: none; }
    </style>
</head>
<body>
    
<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" alt="Khalid Logo" class="logo-img">
    <h1 style="margin: 0; font-size: 2rem;">معرض خالد خفاجي</h1>
    <p style="margin: 5px 0 0; color: var(--gold); font-weight: 600;">للتقسيط وخدمات المحمول 📱</p>
</header>

<div class="search-container-box">
    <input type="text" id="searchInput" placeholder="ابحث عن موبايل أو جهاز..." oninput="filterProducts()">
    <button onclick="filterProducts()"><i class="fas fa-search"></i></button>
</div>

<div class="search-section">
    <h3 style="margin-top:0">استعلم عن أقساطك بأمان 🔒</h3>
    <input type="tel" id="clientPhone" placeholder="أدخل رقم التليفون مسبوق بـ 02">
    <input type="password" id="clientSecret" placeholder="أدخل الكود السري الخاص بك">
    <button onclick="checkInstallments()" style="background:var(--gold); border:none; padding:10px 25px; border-radius:25px; margin-top:10px; font-weight:bold; cursor:pointer;">بحث الآن</button>
</div>

<div id="mainContentArea">
    <div class="container" id="productsGrid">
        </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<div id="imageModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:20000; justify-content:center; align-items:center;" onclick="this.style.display='none'">
    <img id="modalImage" style="max-width:90%; max-height:90%; object-fit:contain;">
</div>

<footer>
    <p style="margin:0">جميع الحقوق محفوظة © معرض خالد خفاجي للتقسيط - كفر الشيخ</p>
    <a href="tel:01095890589" class="footer-call">
        <i class="fas fa-phone-alt"></i> اتصل بنا: 01095890589
    </a>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProducts = [];

    const catMap = {
        'mobiles_new': '📱 موبايلات جديدة',
        'mobiles_used': '✨ موبايلات كسر زيرو',
        'appliances_new': '🧺 أجهزة كهربائية جديدة',
        'appliances_used': '🔌 أجهزة كسر زيرو',
        'other': '📦 عروض متنوعة'
    };

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        allProducts = [];
        snapshot.forEach(doc => allProducts.push({id: doc.id, ...doc.data()}));
        renderCategorized(allProducts);
    });

    function renderCategorized(products) {
        const mainArea = document.getElementById('mainContentArea');
        mainArea.innerHTML = '';

        if(products.length === 0) {
            mainArea.innerHTML = '<p style="text-align:center; padding:50px;">لا توجد نتائج للبحث</p>';
            return;
        }

        const grouped = products.reduce((acc, p) => {
            const c = p.category || 'other';
            if (!acc[c]) acc[c] = [];
            acc[c].push(p);
            return acc;
        }, {});

        Object.keys(catMap).forEach(key => {
            if (grouped[key] && grouped[key].length > 0) {
                const wrapper = document.createElement('div');
                wrapper.className = 'category-wrapper';

                const header = document.createElement('div');
                header.className = 'category-header-btn';
                header.innerHTML = `<span>${catMap[key]}</span> <i class="fas fa-chevron-down"></i>`;
                
                const content = document.createElement('div');
                content.className = 'category-content';
                
                const grid = document.createElement('div');
                grid.className = 'container';

                grouped[key].forEach(p => {
                    const myNumber = "201095890589";
                    const interestRate = p.interestRate || 20;
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="img-wrapper" onclick="openImageModal('${p.image}')">
                                <img src="${p.image}" class="product-img" loading="lazy">
                            </div>
                            <div class="product-info">
                                <h3 style="margin:0; font-size:1.1rem">${p.name}</h3>
                                <p style="color:#666; font-size:0.85rem; margin:5px 0;">${p.description || ''}</p>
                                <p class="price-tag">${p.price.toLocaleString()} ج.م</p>
                                <div class="action-btns">
                                    <button class="btn-calc" onclick="openInstallmentCalc('${p.name}', ${p.price}, ${p.downPayment}, ${interestRate})">
                                        <i class="fas fa-calculator"></i> احسب
                                    </button>
                                    <button class="btn-share" onclick="shareProduct('${p.name}', ${p.price})">
                                        <i class="fas fa-share-alt"></i>
                                    </button>
                                </div>
                                <a href="https://wa.me/${myNumber}?text=استفسار عن ${p.name}" class="btn-wa">
                                   <i class="fab fa-whatsapp"></i> اطلبه الآن
                                </a>
                            </div>
                        </div>`;
                });

                header.onclick = () => {
                    header.classList.toggle('closed');
                    content.classList.toggle('hidden');
                };

                content.appendChild(grid);
                wrapper.appendChild(header);
                wrapper.appendChild(content);
                mainArea.appendChild(wrapper);
            }
        });
    }

    window.filterProducts = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
        renderCategorized(filtered);
    };

    // --- الوظائف الأصلية بالكامل كما أرسلتها ---
    window.checkInstallments = async function() {
        const phone = document.getElementById('clientPhone').value.trim();
        const secret = document.getElementById('clientSecret').value.trim();
        if (!phone || !secret) { alert("يرجى إدخال رقم التليفون والكود السري"); return; }
        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = `<p style="text-align:center; padding:40px; color:#666;">جاري التحقق...</p>`;
        try {
            const q = query(collection(db, "clients"), where("phone", "==", phone), where("secretCode", "==", secret));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                const clientName = querySnapshot.docs[0].data().name || "العميل";
                let htmlContent = `<h3 style="text-align:center; color:#27ae60; margin-bottom:15px;">مرحباً، ${clientName}</h3>`;
                querySnapshot.forEach((doc) => {
                    const c = doc.data();
                    const price = Number(c.price) || 0;
                    const interest = Number(c.interest) || 0;
                    const paid = Number(c.paid) || 0;
                    const totalInstallment = price * (1 + interest);
                    const remaining = totalInstallment - paid;
                    htmlContent += `
                        <button class="accordion">${c.product || "منتج"}</button>
                        <div class="panel">
                            <div style="padding:15px;">
                                <p><strong>إجمالي التقسيط:</strong> ${Math.round(totalInstallment).toLocaleString()} ج.م</p>
                                <p><strong>المدفوع:</strong> ${paid.toLocaleString()} ج.م</p>
                                <p style="color:red; font-weight:bold;">المتبقي: ${Math.round(remaining).toLocaleString()} ج.م</p>
                            </div>
                        </div>`;
                });
                htmlContent += `<button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; background:var(--gold); border:none; padding:15px; border-radius:12px; font-weight:bold; margin-top:20px;">إغلاق</button>`;
                body.innerHTML = htmlContent;
                const acc = body.getElementsByClassName("accordion");
                for (let i = 0; i < acc.length; i++) {
                    acc[i].onclick = function() {
                        this.classList.toggle("active");
                        const panel = this.nextElementSibling;
                        panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
                    };
                }
            } else { body.innerHTML = `<p style="text-align:center; color:red; padding:30px;">بيانات غير صحيحة</p>`; }
        } catch (e) { body.innerHTML = `<p style="text-align:center;">حدث خطأ</p>`; }
    };

    window.openImageModal = function(src) { document.getElementById('modalImage').src = src; document.getElementById('imageModal').style.display = 'flex'; };
    window.openInstallmentCalc = function(name, price, minDown, interest) {
        document.getElementById('resultModal').style.display = 'flex';
        document.getElementById('modalBody').innerHTML = `
            <h3 style="text-align:center">${name}</h3>
            <label>المقدم:</label><input type="number" id="userDown" value="${minDown}" style="width:90%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:10px;">
            <button onclick="calculateResult(${price}, ${interest})" style="width:100%; background:var(--gold); border:none; padding:12px; border-radius:10px; font-weight:bold">احسب قسط 12 شهر</button>
            <div id="finalCalcResult" style="margin-top:15px; text-align:center; font-weight:bold; color:green; display:none;"></div>
            <button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:#999">إغلاق</button>`;
    };
    window.calculateResult = function(price, rate) {
        const down = parseFloat(document.getElementById('userDown').value) || 0;
        const res = ((price - down) * (1 + (rate/100))) / 12;
        const div = document.getElementById('finalCalcResult');
        div.style.display = 'block';
        div.innerText = `القسط الشهري: ${Math.round(res).toLocaleString()} ج.م`;
    };
    window.shareProduct = function(name, price) {
        const text = `${name} بسعر ${price} ج.م من معرض خالد خفاجي`;
        if (navigator.share) navigator.share({title: 'معرض خالد خفاجي', text: text, url: window.location.href});
        else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    };
</script>
</body>
</html>
