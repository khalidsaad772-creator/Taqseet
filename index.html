<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة التقسيط الاحترافي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
/* الستايلات الأساسية */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma, Arial, sans-serif;background:#f4f7f6;padding:10px}
.container{max-width:600px;margin:0 auto;background:white;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
h1, h2{text-align:center;margin-bottom:15px}
h1{color:#2ecc71} h2{color:#3498db;font-size:1.2rem}

input, select, button{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:10px;font-size:15px;outline:none}
input:focus{border-color:#2ecc71}
button{background:#2ecc71;color:white;font-weight:bold;cursor:pointer;border:none;transition:0.3s}
button:hover{opacity:0.8}

/* الأزرار والألوان */
.btn-red{background:#e74c3c} .btn-blue{background:#3498db} .btn-orange{background:#f39c12} .btn-purple{background:#9b59b6}
.result-box{padding:15px;border-radius:12px;margin:10px 0;text-align:center;font-weight:bold;font-size:1.1rem}
.bg-light-blue{background:#e8f4fd;color:#2980b9}
.bg-light-green{background:#eafaf1;color:#27ae60}
.bg-light-orange{background:#fef5e7;color:#d35400}

/* الجدول */
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:0.85rem}
th{background:#2ecc71;color:white;padding:10px}
td{border:1px solid #eee;padding:10px;text-align:center}
.overdue-alert{background-color:#fdedec !important;color:#c0392b}

/* أزرار الإجراءات المصغرة */
.action-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:5px;margin-top:10px}
.btn-small{padding:6px;font-size:0.75rem;margin:0}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal-content{background:white;padding:20px;border-radius:15px;width:90%;max-width:400px;max-height:90vh;overflow-y:auto}
.hidden{display:none}

.flex-row{display:flex;gap:10px}
.thumb{width:35px;height:35px;border-radius:50%;object-fit:cover;cursor:pointer;border:1px solid #ddd}
</style>
</head>
<body>

<div class="container">
    <h1>محل التقسيط 💰</h1>
    
    <input type="text" id="name" placeholder="* اسم العميل">
    <input type="text" id="phone" placeholder="* رقم التليفون">
    <input type="text" id="product" placeholder="المنتج (مثال: شاشة LG)">
    <div class="flex-row">
        <input type="number" id="price" placeholder="* السعر">
        <input type="number" id="months" placeholder="* الشهور">
    </div>
    <div class="flex-row">
        <input type="number" id="interest" placeholder="* الفائدة %">
        <input type="date" id="regDate">
    </div>
    <button onclick="addClient()">إضافة عميل جديد ✅</button>

    <hr style="margin:20px 0">

    <h2>خزنة المحصلات (الجرد) 🏦</h2>
    <div id="cashBox" class="result-box bg-light-orange">0 ج.م</div>
    <button class="btn-orange" onclick="clearCashBox()">جرد وتصفير الخزنة 🧹</button>

    <h2>إدارة رأس المال 💸</h2>
    <div id="capitalTotal" class="result-box bg-light-blue">رأس المال: 0 ج.م</div>
    <div class="flex-row">
        <button class="btn-blue" onclick="openCapitalModal()">إيداع / سحب رأس مال</button>
        <button class="btn-purple" onclick="exportCapitalPDF()">تقرير رأس المال</button>
    </div>

    <div class="flex-row">
        <div style="flex:1" class="result-box bg-light-green"><small>أرباح متوقعة</small><br><span id="totalProfit">0</span></div>
        <div style="flex:1" class="result-box bg-light-green"><small>ربح فعلي (الشهر)</small><br><span id="monthlyProfit">0</span></div>
    </div>

    <button class="btn-blue" onclick="exportPDF()">تقرير العملاء (PDF)</button>
    
    <h2 id="clientsCount" style="margin-top:20px">العملاء (0)</h2>
    <div id="clientsTable"></div>
</div>

<div id="capitalModal" class="modal hidden">
    <div class="modal-content">
        <h3>إدارة حركة رأس المال</h3>
        <select id="capType">
            <option value="in">إيداع (+)</option>
            <option value="out">سحب (-)</option>
        </select>
        <input type="number" id="capAmount" placeholder="المبلغ">
        <input type="text" id="capReason" placeholder="السبب (مثال: شراء بضاعة / سداد ديون)">
        <input type="date" id="capDate">
        <button onclick="saveCapital()">حفظ الحركة</button>
        <div id="capHistory" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px; font-size:0.8rem"></div>
        <button class="btn-red" onclick="closeModal('capitalModal')">إغلاق</button>
    </div>
</div>

<div id="paymentModal" class="modal hidden">
    <div class="modal-content">
        <h3 id="payTitle">تسجيل قسط</h3>
        <input type="number" id="payAmount" placeholder="قيمة القسط">
        <input type="date" id="payDate">
        <button onclick="processPayment()">تسجيل الدفع</button>
        <div id="payHistory" style="margin-top:10px"></div>
        <button class="btn-red" onclick="closeModal('paymentModal')">إغلاق</button>
    </div>
</div>

<script>
// البيانات الأساسية
let clients = JSON.parse(localStorage.getItem('cl_data') || '[]');
let capital = JSON.parse(localStorage.getItem('cap_data') || '[]');
let cashBox = Number(localStorage.getItem('cash_box') || 0);
let currentIdx = -1;

const today = new Date().toISOString().split('T')[0];
const cur = (num) => Number(num).toLocaleString('ar-EG') + ' ج.م';

// دالة حساب تاريخ الاستحقاق القادم بناءً على الأقساط المدفوعة
function calculateNextDue(client) {
    const totalWithInterest = client.price * (1 + (client.interest/100));
    const installmentVal = totalWithInterest / client.months;
    
    // عدد الأقساط المدفوعة بالكامل
    const paidInstallments = Math.floor(client.paid / installmentVal);
    
    const d = new Date(client.regDate);
    // التاريخ القادم = تاريخ التسجيل + (عدد الأقساط المدفوعة + 1) شهور
    d.setMonth(d.getMonth() + paidInstallments + 1);
    
    return d.toISOString().split('T')[0];
}

// إضافة عميل
function addClient() {
    const name = document.getElementById('name').value;
    const price = Number(document.getElementById('price').value);
    const months = Number(document.getElementById('months').value);
    const interest = Number(document.getElementById('interest').value);
    const phone = document.getElementById('phone').value;
    const regDate = document.getElementById('regDate').value || today;

    if(!name || !price || !months) return alert("أكمل البيانات المطلوبة");

    clients.push({
        name, phone, product: document.getElementById('product').value || 'بضاعة',
        price, months, interest, regDate, paid: 0, payments: [], photo: null
    });

    save();
    render();
    alert("تمت إضافة العميل");
}

// تسجيل قسط
function processPayment() {
    const amt = Number(document.getElementById('payAmount').value);
    const date = document.getElementById('payDate').value;
    if(!amt || !date) return;

    const c = clients[currentIdx];
    c.payments.push({amt, date});
    c.paid += amt;
    
    // إضافة المبلغ للخزنة (الجرد)
    cashBox += amt;
    
    save();
    render();
    closeModal('paymentModal');
    alert("تم تسجيل الدفع وتحديث موعد القسط القادم");
}

// جرد الخزنة
function clearCashBox() {
    if(confirm(`هل أنت متأكد من جرد الخزنة؟ سيتم تصفير المبلغ الحالي (${cur(cashBox)})`)) {
        cashBox = 0;
        save();
        render();
    }
}

// إدارة رأس المال
function openCapitalModal() {
    document.getElementById('capDate').value = today;
    showCapitalHistory();
    document.getElementById('capitalModal').classList.remove('hidden');
}

function saveCapital() {
    const type = document.getElementById('capType').value;
    const amt = Number(document.getElementById('capAmount').value);
    const reason = document.getElementById('capReason').value || (type === 'in' ? 'إيداع' : 'سحب');
    const date = document.getElementById('capDate').value;

    if(!amt) return;

    // السحب يتم تخزينه كقيمة سالبة
    const finalAmt = type === 'in' ? amt : -amt;
    capital.push({amt: finalAmt, reason, date});
    
    save();
    render();
    showCapitalHistory();
    document.getElementById('capAmount').value = '';
}

function showCapitalHistory() {
    let h = '<table>';
    capital.slice().reverse().forEach((x, i) => {
        const color = x.amt >= 0 ? 'green' : 'red';
        h += `<tr><td>${x.date}</td><td style="color:${color}">${cur(x.amt)}</td><td>${x.reason}</td></tr>`;
    });
    document.getElementById('capHistory').innerHTML = h + '</table>';
}

// الواتساب المطور
function sendWA(i) {
    const c = clients[i];
    const totalWithInterest = c.price * (1 + (c.interest/100));
    const rem = totalWithInterest - c.paid;
    const nextDate = calculateNextDue(c);
    const instVal = totalWithInterest / c.months;
    const remInst = Math.ceil(rem / instVal);

    const msg = `مرحباً ${c.name} 🌹\nنذكركم بتفاصيل حسابكم لـ (${c.product}):\n\n` +
                `✅ تم دفع: ${cur(c.paid)}\n` +
                `💰 المبلغ المتبقي: ${cur(rem)}\n` +
                `📅 موعد القسط القادم: ${nextDate}\n` +
                `🔢 عدد الأقساط المتبقية: ${remInst}\n\n` +
                `شكراً لتعاملكم معنا 🙏`;

    window.open(`https://wa.me/2${c.phone}?text=${encodeURIComponent(msg)}`);
}

// دوال مساعدة
function save() {
    localStorage.setItem('cl_data', JSON.stringify(clients));
    localStorage.setItem('cap_data', JSON.stringify(capital));
    localStorage.setItem('cash_box', cashBox);
}

function render() {
    // تحديث الأرقام العلوية
    document.getElementById('cashBox').innerText = `المحصل الحالي في الخزنة: ${cur(cashBox)}`;
    const totalCap = capital.reduce((a, b) => a + b.amt, 0);
    document.getElementById('capitalTotal').innerText = `إجمالي رأس المال: ${cur(totalCap)}`;
    
    const totalProf = clients.reduce((a, b) => a + (b.price * (b.interest/100)), 0);
    document.getElementById('totalProfit').innerText = cur(totalProf);

    // بناء جدول العملاء
    document.getElementById('clientsCount').innerText = `العملاء (${clients.length})`;
    let html = `<table><tr><th>العميل</th><th>مدفوع/متبقي</th><th>القسط القادم</th></tr>`;
    
    clients.forEach((c, i) => {
        const total = c.price * (1 + (c.interest/100));
        const nextDate = calculateNextDue(c);
        const isPast = new Date(nextDate) < new Date();
        
        html += `
        <tr class="${isPast && (total - c.paid > 1) ? 'overdue-alert' : ''}">
            <td style="text-align:right"><b>${c.name}</b><br><small>${c.product}</small></td>
            <td>${cur(c.paid)}<br><small>باقي: ${cur(total-c.paid)}</small></td>
            <td>${nextDate}<br><small>${cur(total/c.months)}</small></td>
        </tr>
        <tr><td colspan="3">
            <div class="action-grid">
                <button class="btn-small btn-blue" onclick="openPay(${i})">قسط</button>
                <button class="btn-small btn-orange" onclick="sendWA(${i})">واتس</button>
                <button class="btn-small btn-red" onclick="deleteClient(${i})">حذف</button>
            </div>
        </td></tr>`;
    });
    document.getElementById('clientsTable').innerHTML = html + '</table>';
}

function openPay(i) {
    currentIdx = i;
    const c = clients[i];
    const instVal = (c.price * (1 + (c.interest/100))) / c.months;
    document.getElementById('payAmount').value = Math.round(instVal);
    document.getElementById('payDate').value = today;
    document.getElementById('paymentModal').classList.remove('hidden');
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function deleteClient(i) { if(confirm("حذف العميل نهائياً؟")) { clients.splice(i, 1); save(); render(); } }

// تقرير رأس المال PDF
function exportCapitalPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Report: Head Capital History", 105, 15, { align: "center" });
    const data = capital.map(x => [x.date, x.amt + " EGP", x.reason]);
    doc.autoTable({ head: [['Date', 'Amount', 'Reason']], body: data, startY: 25 });
    doc.save("Capital_Report.pdf");
}

window.onload = () => { document.getElementById('regDate').value = today; render(); };
</script>
</body>
</html>
