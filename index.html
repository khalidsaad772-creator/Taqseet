<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <title>معرض خالد خفاجي للتقسيط</title>
    <meta name="description" content="أسهل نظام تقسيط للموبايلات والأجهزة الكهربائية - خصم خاص لموظفي البريد">
    
    <meta property="og:title" content="معرض خالد خفاجي للتقسيط">
    <meta property="og:description" content="أسهل نظام تقسيط للموبايلات والأجهزة الكهربائية - خصم خاص لموظفي البريد">
    <meta property="og:image" content="https://i.ibb.co/XgdnJ7Y/lv-0.jpg">
    <meta property="og:url" content="https://khaled-khafagi.github.io/taqseet/">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; --gold-dark: #b8860b; --dark: #1a1a1a; 
            --green-wa: #25D366; --green-wa-dark: #128C7E;
            --blue-link: #3498db; --bg: #f8f9fa;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 0; color: #333; }

        header { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; padding: 45px 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }
        
        /* شريط البحث الدائري */
        .search-container-box { max-width: 500px; margin: 20px auto; padding: 0 20px; display: flex; gap: 10px; align-items: center; }
        .search-container-box input { flex: 1; padding: 12px 25px; border-radius: 50px; border: 2px solid var(--gold); outline: none; font-family: 'Cairo'; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-container-box button { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--gold); color: white; cursor: pointer; transition: 0.3s; }

        /* تنسيق الأقسام التفاعلية */
        .category-header-btn { background: var(--dark); color: var(--gold); padding: 15px 25px; margin: 10px 20px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; border-right: 6px solid var(--gold); }
        .category-content { display: block; }
        .category-content.hidden { display: none; }

        .post-promo-tag { 
            background: var(--gold); 
            color: #000; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            padding: 10px 25px; 
            border-radius: 20px; 
            font-weight: 800; 
            margin-top: 15px; 
            font-size: 0.85rem; 
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        .search-section { background: #fff; padding: 25px; margin: -30px 20px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .search-section input { width: 85%; padding: 14px; border: 2px solid #eee; border-radius: 30px; font-family: 'Cairo'; margin-bottom: 10px; text-align: center; display: inline-block; box-sizing: border-box; }

        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; min-height: 100px; }

        .product-card { background: white; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; overflow: hidden;}
        .img-wrapper { position: relative; width: 100%; height: 320px; background: #fff; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .product-img { width: 75%; height: 75%; object-fit: contain; pointer-events: none; transition: transform 0.3s ease; }
        .product-info { padding: 15px; text-align: center; background: white; border-radius: 0 0 25px 25px; }
        .price-tag { color: #2ecc71; font-weight: 800; font-size: 1.4rem; margin: 5px 0; }
        
        .btn-wa { background: linear-gradient(45deg, var(--green-wa), var(--green-wa-dark)); color: white; text-decoration: none; padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-weight: 700; border: none; font-size: 1.1rem; animation: pulse-wa 2s infinite; }
        @keyframes pulse-wa { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); } 70% { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-calc, .btn-share { background: #f0f4f8; color: var(--blue-link); border: 1px solid #dce4ec; padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Cairo'; font-size: 0.85rem; }
        .btn-share { color: #555; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: right; border-top: 6px solid var(--gold); max-height: 80vh; overflow-y: auto; }

        #imageModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; overflow: auto; }
        #modalImage { max-width: 100%; max-height: 100vh; object-fit: contain; margin: auto; }
        .close-btn { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.3); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 32px; cursor: pointer; z-index: 10001; }

        footer { background: #1a1a1a; color: white; padding: 30px 10px; text-align: center; border-top: 4px solid var(--gold); margin-top: 50px; }
        .footer-call { background: var(--gold); color: black; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; }

        .accordion { background-color: #f8f9fa; color: #333; cursor: pointer; padding: 15px; width: 100%; border: 1px solid #eee; text-align: right; outline: none; font-size: 1rem; transition: 0.4s; border-radius: 12px; margin-bottom: 8px; font-family: 'Cairo'; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .panel { padding: 0 15px; background-color: white; max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; border-radius: 0 0 12px 12px; margin-bottom: 10px; border: 1px solid #f1f1f1; border-top: none; }
    </style>
</head>
<body>
    
<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" alt="Khalid Logo" class="logo-img">
    <h1 style="margin: 0; font-size: 2rem;">معرض خالد خفاجي</h1>
    <p style="margin: 5px 0 0; color: var(--gold); font-weight: 600;">للتقسيط وخدمات المحمول 📱</p>
</header>

<div class="search-container-box">
    <input type="text" id="searchInput" placeholder="ابحث عن موبايل أو جهاز..." oninput="filterProducts()">
    <button onclick="filterProducts()"><i class="fas fa-search"></i></button>
</div>

<div class="search-section">
    <h3 style="margin-top:0">استعلم عن أقساطك بأمان 🔒</h3>
    <input type="tel" id="clientPhone" placeholder="أدخل رقم التليفون مسبوق بـ 02">
    <input type="password" id="clientSecret" placeholder="أدخل الكود السري الخاص بك">
    <button onclick="checkInstallments()" style="background:var(--gold); border:none; padding:10px 25px; border-radius:25px; margin-top:10px; font-weight:bold; cursor:pointer;">بحث الآن</button>
</div>

<div style="text-align: center; margin: 20px 0 10px;">
    <h2 style="font-family: 'Cairo'; color: var(--dark); font-size: 1.5rem; position: relative; display: inline-block; padding-bottom: 10px;">
        أحدث المنتجات والعروض المتاحة
        <span style="display: block; width: 50px; height: 3px; background: var(--gold); margin: 8px auto 0;"></span>
    </h2>
    <p style="color: #666; font-size: 0.9rem; margin-top: 5px;"> أفضل الأسعار وأسهل نظام تقسيط  </p>
    
    <div class="post-promo-tag">
        <i class="fas fa-envelope-open-text"></i>
        <span>خصم خاص لموظفي البريد المصري 🏤</span>
    </div>
</div>

<div id="dynamicProductsArea">
    </div>

<div id="resultModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<div id="imageModal">
    <button class="close-btn" onclick="closeImageModal()">×</button>
    <img id="modalImage" src="" alt="">
</div>

<footer>
    <p style="margin:0">جميع الحقوق محفوظة © معرض خالد خفاجي للتقسيط - كفر الشيخ</p>
    <p style="font-size: 0.9rem; color: #888; margin-top: 5px;">نرحب بزيارتكم في أي وقت</p>
    <a href="tel:01095890589" class="footer-call">
        <i class="fas fa-phone-alt"></i> اتصل بنا: 01095890589
    </a>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProducts = [];

    const categoryNames = {
        'mobiles_new': '📱 موبايلات جديدة',
        'mobiles_used': '✨ موبايلات كسر زيرو',
        'appliances_new': '🧺 أجهزة كهربائية جديدة',
        'appliances_used': '🔌 أجهزة كسر زيرو',
        'other': '📦 عروض متنوعة'
    };

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        allProducts = [];
        snapshot.forEach(doc => allProducts.push({id: doc.id, ...doc.data()}));
        renderCategorized(allProducts);
    });

    function renderCategorized(products) {
        const mainArea = document.getElementById('dynamicProductsArea');
        mainArea.innerHTML = '';
        const grouped = products.reduce((acc, p) => {
            const c = p.category || 'other';
            if (!acc[c]) acc[c] = [];
            acc[c].push(p);
            return acc;
        }, {});

        Object.keys(categoryNames).forEach(key => {
            if (grouped[key] && grouped[key].length > 0) {
                const wrapper = document.createElement('div');
                const header = document.createElement('div');
                header.className = 'category-header-btn';
                header.innerHTML = `<span>${categoryNames[key]}</span> <i class="fas fa-chevron-down"></i>`;
                
                const content = document.createElement('div');
                content.className = 'category-content';
                const grid = document.createElement('div');
                grid.className = 'container';

                grouped[key].forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="img-wrapper" onclick="openImageModal('${p.image}')">
                                <img src="${p.image}" class="product-img" loading="lazy">
                            </div>
                            <div class="product-info">
                                <h3 style="margin:0; font-size:1.1rem">${p.name}</h3>
                                <p style="color:#666; font-size:0.85rem; margin:5px 0;">${p.description || ''}</p>
                                <p class="price-tag"><small style="font-size:0.8rem; color:#666; font-weight:400">السعر كاش:</small> ${p.price.toLocaleString()} ج.م</p>
                                <p style="color:#888; font-size:0.9rem">مقدم يبدأ من: ${p.downPayment} ج.م</p>
                                <div class="action-btns">
                                    <button class="btn-calc" onclick="openInstallmentCalc('${p.name}', ${p.price}, ${p.downPayment}, ${p.interestRate || 20})">
                                        <i class="fas fa-calculator"></i> احسب قسطك
                                    </button>
                                    <button class="btn-share" onclick="shareProduct('${p.name}', ${p.price})">
                                        <i class="fas fa-share-alt"></i> مشاركة
                                    </button>
                                </div>
                                <a href="https://wa.me/201095890589?text=أريد الاستفسار عن ${p.name}" class="btn-wa">
                                   <i class="fab fa-whatsapp"></i> اطلبه الآن
                                </a>
                            </div>
                        </div>`;
                });

                header.onclick = () => content.classList.toggle('hidden');
                content.appendChild(grid);
                wrapper.appendChild(header);
                wrapper.appendChild(content);
                mainArea.appendChild(wrapper);
            }
        });
    }

    window.filterProducts = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
        renderCategorized(filtered);
    };

    window.shareProduct = function(name, price) {
        const text = `شوف العرض ده من معرض خالد خفاجي للتقسيط:\n${name}\nبسعر كاش: ${price.toLocaleString()} ج.م\nتقدر تقسطه دلوقتي بأسهل الإجراءات!`;
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: 'معرض خالد خفاجي', text: text, url: url }).catch(console.error);
        } else {
            const waUrl = `https://wa.me/?text=${encodeURIComponent(text + "\n" + url)}`;
            window.open(waUrl, '_blank');
        }
    };

    window.checkInstallments = async function() {
        const phone = document.getElementById('clientPhone').value.trim();
        const secret = document.getElementById('clientSecret').value.trim();
        if (!phone || !secret) { alert("يرجى إدخال رقم التليفون والكود السري"); return; }
        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = `<p style="text-align:center; padding:40px; color:#666;">جاري التحقق والبحث...</p>`;
        try {
            const q = query(collection(db, "clients"), where("phone", "==", phone), where("secretCode", "==", secret));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                const clientName = querySnapshot.docs[0].data().name || "العميل";
                let htmlContent = `<h3 style="text-align:center; color:#27ae60; margin-bottom:15px;">مرحباً بك، ${clientName}</h3>`;
                querySnapshot.forEach((doc) => {
                    const c = doc.data();
                    const price = Number(c.price) || 0;
                    const interest = Number(c.interest) || 0;
                    const paid = Number(c.paid) || 0;
                    const months = Number(c.months) || 0;
                    const totalInstallment = price * (1 + interest);
                    const remaining = totalInstallment - paid;
                    let monthly = months > 0 ? totalInstallment / months : 0;
                    let remainingMonths = monthly > 0 && remaining > 0 ? Math.ceil(remaining / monthly) : 0;
                    htmlContent += `
                        <button class="accordion">${c.product || "منتج"}</button>
                        <div class="panel">
                            <div style="padding: 15px; line-height: 2; font-size: 0.95rem; background:#fff;">
                                <p><strong>إجمالي التقسيط:</strong> ${Math.round(totalInstallment).toLocaleString()} ج.م</p>
                                <p><strong>المدفوع حتى الآن:</strong> ${paid.toLocaleString()} ج.م</p>
                                <p style="color:#e74c3c; font-weight:bold; border-top: 1px solid #eee; padding-top:5px;">المتبقي: ${Math.round(remaining).toLocaleString()} ج.م</p>
                                ${monthly > 0 ? `<p><strong>القسط الشهري:</strong> ${Math.round(monthly).toLocaleString()} ج.م</p>` : ''}
                                ${remainingMonths > 0 ? `<p><strong>الشهور المتبقية:</strong> ${remainingMonths} شهر تقريباً</p>` : ''}
                            </div>
                        </div>`;
                });
                htmlContent += `<button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; background:var(--gold); color:#000; border:none; padding:15px; border-radius:12px; font-weight:bold; margin-top:20px;">إغلاق</button>`;
                body.innerHTML = htmlContent;
                const acc = body.getElementsByClassName("accordion");
                for (let i = 0; i < acc.length; i++) {
                    acc[i].addEventListener("click", function() {
                        this.classList.toggle("active");
                        const panel = this.nextElementSibling;
                        if (panel.style.maxHeight) { panel.style.maxHeight = null; } else { panel.style.maxHeight = panel.scrollHeight + "px"; } 
                    });
                }
            } else { body.innerHTML = `<p style="text-align:center; color:#e74c3c; padding:50px 20px; font-size:1.1rem;">بيانات الاستعلام غير صحيحة</p>`; }
        } catch (e) { body.innerHTML = `<p style="color:red; text-align:center; padding:30px;">حدث خطأ أثناء البحث</p>`; }
    };

    window.openImageModal = function(imageSrc) { document.getElementById('modalImage').src = imageSrc; document.getElementById('imageModal').style.display = 'flex'; };
    window.closeImageModal = function() { document.getElementById('imageModal').style.display = 'none'; };

    window.openInstallmentCalc = function(name, price, minDown, interest) {
        const body = document.getElementById('modalBody');
        document.getElementById('resultModal').style.display = 'flex';
        body.innerHTML = `
            <h3 style="text-align:center">🧮 حاسبة التقسيط لـ <br>${name}</h3>
            <label>المقدم:</label>
            <input type="number" id="userDown" style="width:90%; border:1px solid #ddd; border-radius:10px; margin:10px 0; padding:10px" value="${minDown}">
            <label>الشهور:</label>
            <select id="monthsCount" style="width:100%; padding:10px; margin:5px 0; border-radius:10px">
                <option value="6">6 شهور</option>
                <option value="12" selected>12 شهر</option>
            </select>
            <button onclick="calculateResult(${price}, ${interest})" style="width:100%; background:var(--gold); border:none; padding:12px; border-radius:10px; margin-top:10px; font-weight:bold">احسب</button>
            <div id="finalCalcResult" style="margin-top:15px; text-align:center; font-weight:bold; background:#f9f9f9; padding:10px; border-radius:10px; display:none;"></div>
            <button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; background:none; border:none; color:#999; margin-top:10px">إغلاق</button>
        `;
    };

    window.calculateResult = function(price, interestRate) {
        const userDown = parseFloat(document.getElementById('userDown').value) || 0;
        const months = parseInt(document.getElementById('monthsCount').value);
        const resultDiv = document.getElementById('finalCalcResult');
        const remaining = price - userDown;
        const totalWithInterest = remaining + (remaining * (interestRate / 100) * (months / 12));
        const monthly = Math.round(totalWithInterest / months);
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<span style="color:green; font-size:1.2rem">القسط الشهري: ${monthly.toLocaleString()} ج.م</span>`;
    };
</script>
</body>
</html>
