<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معرض خالد خفاجي للتقسيط</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --gold: #d4af37;
    --dark: #1a1a1a;
    --bg: #f6f7f9;
    --green: #25D366;
}

/* ===== BASE ===== */
body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    margin: 0;
    color: #333;
}

/* ===== HEADER ===== */
header {
    background: #fff;
    padding: 20px 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.logo-img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    margin-bottom: 10px;
}

/* ===== SEARCH ===== */
.search-container-box {
    max-width: 500px;
    margin: 15px auto;
    padding: 0 15px;
    display: flex;
    gap: 10px;
}

.search-container-box input {
    flex: 1;
    padding: 12px 15px;
    border-radius: 12px;
    border: 1px solid #ddd;
}

.search-container-box button {
    width: 45px;
    border-radius: 12px;
    border: none;
    background: var(--gold);
    color: #fff;
}

/* ===== GRID ===== */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: auto;
}

/* ===== CARD ===== */
.product-card {
    background: #fff;
    border-radius: 18px;
    border: 1px solid #eee;
    overflow: hidden;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

.img-wrapper {
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
}

.product-img {
    width: 90%;
    height: 90%;
    object-fit: contain;
}

.product-info {
    padding: 15px;
    text-align: center;
}

.product-info h3 {
    font-size: 1rem;
    margin: 5px 0;
    font-weight: 600;
}

.price-tag {
    color: #2ecc71;
    font-weight: bold;
    margin: 5px 0;
}

/* ===== BUTTONS ===== */
.btn-wa {
    background: var(--green);
    color: #fff;
    padding: 12px;
    border-radius: 12px;
    display: block;
    margin-top: 10px;
    text-decoration: none;
    font-size: 0.9rem;
}

.action-btns {
    display: flex;
    gap: 5px;
}

.btn-calc, .btn-share {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #eee;
    background: #fafafa;
    font-size: 0.8rem;
    cursor: pointer;
}

/* ===== CATEGORY ===== */
.category-header-btn {
    margin: 20px;
    padding: 12px;
    background: #fff;
    border-radius: 12px;
    font-weight: bold;
    border: 1px solid #eee;
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
}

/* ===== FOOTER ===== */
footer {
    background: #111;
    color: #fff;
    padding: 25px;
    text-align: center;
}

.footer-call {
    background: var(--gold);
    padding: 10px 20px;
    border-radius: 20px;
    color: #000;
    display: inline-block;
    margin-top: 10px;
}

/* ===== LOADING ===== */
.skeleton-card {
    background: #fff;
    border-radius: 15px;
    padding: 15px;
}

.skeleton-img {
    height: 200px;
    background: #eee;
    border-radius: 10px;
}

.skeleton-text {
    height: 15px;
    background: #eee;
    margin-top: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
<img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" class="logo-img">
<h2>معرض خالد خفاجي</h2>
<p style="color:#888;font-size:0.9rem">تقسيط مريح وسريع</p>
</header>

<div class="search-container-box">
<input type="text" id="searchInput" placeholder="ابحث...">
<button onclick="filterProducts()"><i class="fas fa-search"></i></button>
</div>

<div id="mainContentArea">
<div class="container">
<div class="skeleton-card">
<div class="skeleton-img"></div>
<div class="skeleton-text"></div>
</div>
</div>
</div>

<footer>
<p>© معرض خالد خفاجي</p>
<a href="tel:01095890589" class="footer-call">اتصل بنا</a>
</footer>

<!-- ===== JS (كما هو بدون تعديل) ===== -->
<script type="module">
/* نفس كودك بالظبط بدون تغيير */
</script>

</body>
</html>
