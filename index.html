<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>معرض خالد خفاجي للتقسيط</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:title" content="معرض خالد خفاجي للتقسيط">
    <meta property="og:description" content="أسهل نظام تقسيط للموبايلات والأجهزة الكهربائية - خصم خاص لموظفي البريد">
    <meta property="og:image" content="https://i.ibb.co/XgdnJ7Y/lv-0.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; --gold-dark: #b8860b; --dark: #1a1a1a; 
            --green-wa: #25D366; --green-wa-dark: #128C7E;
            --blue-link: #3498db; --bg: #f8f9fa;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 0; color: #333; overflow-x: hidden; }

        header { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; padding: 45px 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }
        
        .search-container-box { max-width: 500px; margin: 20px auto 5px; padding: 0 20px; display: flex; gap: 10px; align-items: center; }
        .search-container-box input { flex: 1; padding: 12px 25px; border-radius: 50px; border: 2px solid var(--gold); outline: none; font-family: 'Cairo'; font-weight: 600; }
        .search-container-box button { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--gold); color: white; cursor: pointer; }

        #noProductMessage { display: none; text-align: center; background: #fff; color: #e74c3c; padding: 15px; margin: 10px 20px; border-radius: 15px; border: 1px dashed var(--gold); font-weight: bold; font-size: 0.9rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        #installToast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--dark); color: var(--gold); padding: 15px 25px; border-radius: 30px; z-index: 20000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: top 0.5s ease; font-size: 0.9rem; font-weight: bold; text-align: center; width: 85%; max-width: 400px; border: 2px solid var(--gold); cursor: pointer; display: none; }
        #installToast.show { top: 20px; display: block; }

        .category-header-btn { background: var(--dark); color: var(--gold); padding: 15px 25px; margin: 10px 20px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; border-right: 6px solid var(--gold); }

        .search-section { background: #fff; padding: 25px; margin: 20px 20px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .search-section input { width: 85%; padding: 14px; border: 2px solid #eee; border-radius: 30px; font-family: 'Cairo'; margin-bottom: 10px; text-align: center; box-sizing: border-box; }

        /* تعديلات السكرول الأفقي وتوحيد الحجم */
        .horizontal-scroll-wrapper { position: relative; padding: 0 20px 20px; }
        .products-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 20px; padding: 10px 5px; scrollbar-width: none; -ms-overflow-style: none; transition: all 0.5s ease; }
        .products-carousel::-webkit-scrollbar { display: none; }

        .product-card { 
            flex: 0 0 280px; /* توحيد العرض */
            scroll-snap-align: start; 
            background: white; 
            border-radius: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            height: 600px; /* توحيد الطول */
        }

        .img-wrapper { height: 250px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 10px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .product-info { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .price-tag { color: #2ecc71; font-weight: 800; font-size: 1.3rem; margin: 5px 0; }
        
        .btn-wa { background: linear-gradient(45deg, var(--green-wa), var(--green-wa-dark)); color: white; text-decoration: none; padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; font-size: 1rem; }

        /* نقاط الترقيم (Dots) */
        .dots-container { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .dot.active { background: var(--gold); width: 20px; border-radius: 10px; }

        /* Bones / Skeleton */
        .skeleton-card { flex: 0 0 280px; height: 500px; background: white; border-radius: 25px; padding: 20px; }
        .skeleton-img { width: 100%; height: 200px; background: #eee; border-radius: 20px; }
        .skeleton-text { width: 80%; height: 20px; background: #eee; border-radius: 10px; margin-top: 15px; }
        .loading-shimmer { background: linear-gradient(90deg, #eeeeee 25%, #f5f5f5 50%, #eeeeee 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: right; border-top: 6px solid var(--gold); max-height: 80vh; overflow-y: auto; }
        
        #imageModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .close-btn { position: fixed; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 32px; }

        footer { background: #1a1a1a; color: white; padding: 30px 10px; text-align: center; border-top: 4px solid var(--gold); margin-top: 50px; }
        .footer-call { background: var(--gold); color: black; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; }

        .accordion { background-color: #f8f9fa; color: #333; cursor: pointer; padding: 15px; width: 100%; border: 1px solid #eee; text-align: right; border-radius: 12px; margin-bottom: 8px; font-weight: bold; display: flex; justify-content: space-between; }
        .panel { padding: 0 15px; background-color: white; max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; border-radius: 0 0 12px 12px; border: 1px solid #f1f1f1; border-top: none; }
    </style>
</head>
<body>

<div id="installToast" onclick="installApp()">اضغط هنا لتثبيت معرض خالد خفاجي على سطح المكتب 📱</div>

<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" alt="Khalid Logo" class="logo-img">
    <h1 style="margin: 0; font-size: 2rem;">معرض خالد خفاجي</h1>
    <p style="margin: 5px 0 0; color: var(--gold); font-weight: 600;">للتقسيط وخدمات المحمول 📱</p>
</header>

<div class="search-container-box">
    <input type="text" id="searchInput" placeholder="ابحث عن موبايل أو جهاز..." oninput="filterProducts()">
    <button onclick="filterProducts()"><i class="fas fa-search"></i></button>
</div>

<div id="noProductMessage">
    هذا المنتج غير موجود حالياً.. يمكنك طلبه مباشرة عبر 
    <a href="https://wa.me/201095890589" style="color:var(--green-wa-dark)">الواتساب</a> 
</div>

<div class="search-section">
    <h3 style="margin-top:0">استعلم عن أقساطك بأمان 🔒</h3>
    <input type="tel" id="clientPhone" placeholder="رقم الموبايل">
    <input type="password" id="clientSecret" placeholder="الكود السري">
    <button onclick="checkInstallments()" style="background:var(--gold); border:none; padding:10px 25px; border-radius:25px; margin-top:10px; font-weight:bold; cursor:pointer;"> استعلم </button>
</div>

<div id="mainContentArea">
    <div class="category-header-btn"><span>جاري تحميل العروض...</span></div>
    <div class="horizontal-scroll-wrapper">
        <div class="products-carousel">
            <div class="skeleton-card"><div class="skeleton-img loading-shimmer"></div><div class="skeleton-text loading-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-img loading-shimmer"></div><div class="skeleton-text loading-shimmer"></div></div>
            <div class="skeleton-card"><div class="skeleton-img loading-shimmer"></div><div class="skeleton-text loading-shimmer"></div></div>
        </div>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<div id="imageModal" onclick="this.style.display='none'">
    <button class="close-btn">×</button>
    <img id="modalImage" src="" style="max-width:100%; max-height:100vh;">
</div>

<footer>
    <p>© معرض خالد خفاجي للتقسيط - كفر الشيخ</p>
    <a href="tel:01095890589" class="footer-call"><i class="fas fa-phone-alt"></i> 01095890589</a>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProducts = [];
    let deferredPrompt;
    let autoScrollIntervals = [];

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installToast').classList.add('show');
    });

    window.installApp = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('installToast').classList.remove('show');
        } else {
            alert("اذهب لإعدادات المتصفح واختر 'إضافة للشاشة الرئيسية' 📲");
        }
    };

    const categoryNames = {
        'mobiles_new': '📱 موبايلات جديدة',
        'mobiles_used': '✨ موبايلات كسر زيرو',
        'appliances_new': '🧺 أجهزة كهربائية جديدة',
        'appliances_used': '🔌 أجهزة كسر زيرو',
        'other': '📦 عروض متنوعة'
    };

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        allProducts = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
        renderCategorized(allProducts);
    });

    function renderCategorized(products) {
        const area = document.getElementById('mainContentArea');
        area.innerHTML = '';
        autoScrollIntervals.forEach(clearInterval); // مسح التوقيتات القديمة
        
        const grouped = products.reduce((acc, p) => {
            const c = p.category || 'other';
            if (!acc[c]) acc[c] = [];
            acc[c].push(p);
            return acc;
        }, {});

        Object.keys(categoryNames).forEach(key => {
            if (grouped[key] && grouped[key].length > 0) {
                const catId = `carousel-${key}`;
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
                    <div class="category-header-btn"><span>${categoryNames[key]}</span> <i class="fas fa-chevron-left"></i></div>
                    <div class="horizontal-scroll-wrapper">
                        <div class="products-carousel" id="${catId}">
                            ${grouped[key].map(p => `
                                <div class="product-card">
                                    <div class="img-wrapper" onclick="openImageModal('${p.image}')">
                                        <img src="${p.image}" class="product-img">
                                    </div>
                                    <div class="product-info">
                                        <h3 style="margin:0; font-size:1.1rem">${p.name}</h3>
                                        <p style="color:#666; font-size:0.85rem;">${p.description || ''}</p>
                                        <p class="price-tag">${p.price.toLocaleString()} ج.م</p>
                                        <p style="font-size:0.85rem">مقدم: ${p.downPayment} ج.م</p>
                                        <div class="action-btns">
                                            <button class="btn-calc" onclick="openInstallmentCalc('${p.name}', ${p.price}, ${p.downPayment}, ${p.interestRate || 20})"><i class="fas fa-calculator"></i> احسب</button>
                                            <button class="btn-share" onclick="shareProduct('${p.name}', ${p.price})"><i class="fas fa-share-alt"></i></button>
                                        </div>
                                        <a href="https://wa.me/201095890589?text=استفسار عن ${p.name}" class="btn-wa"><i class="fab fa-whatsapp"></i> اطلب الآن</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="dots-container" id="dots-${key}">
                            ${grouped[key].map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
                        </div>
                    </div>
                `;
                area.appendChild(wrapper);
                setupAutoScroll(catId, `dots-${key}`, grouped[key].length);
            }
        });
    }

    function setupAutoScroll(carouselId, dotsId, count) {
        const carousel = document.getElementById(carouselId);
        const dots = document.getElementById(dotsId).children;
        let index = 0;

        const scrollFunc = () => {
            index = (index + 1) % count;
            const cardWidth = 300; // عرض الكارت + الـ gap
            carousel.scrollTo({ left: index * cardWidth, behavior: 'smooth' });
            
            // تحديث الدوائر
            Array.from(dots).forEach(d => d.classList.remove('active'));
            if(dots[index]) dots[index].classList.add('active');
        };

        let interval = setInterval(scrollFunc, 4000);
        autoScrollIntervals.push(interval);

        // توقيف السكرول عند تفاعل المستخدم
        carousel.addEventListener('touchstart', () => clearInterval(interval));
        carousel.addEventListener('scroll', () => {
            const currentIndex = Math.round(carousel.scrollLeft / 300);
            Array.from(dots).forEach((d, i) => {
                d.classList.toggle('active', i === currentIndex);
            });
        });
    }

    // دوال الاستعلام والحساب (بدون تغيير)
    window.filterProducts = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderCategorized(allProducts.filter(p => p.name.toLowerCase().includes(term)));
    };

    window.shareProduct = (name, price) => {
        const text = `العرض ده من خالد خفاجي:\n${name}\nكاش: ${price.toLocaleString()} ج.م`;
        if (navigator.share) navigator.share({ title: 'معرض خالد خفاجي', text: text, url: window.location.href });
    };

    window.checkInstallments = async function() {
        const phone = document.getElementById('clientPhone').value.trim();
        const secret = document.getElementById('clientSecret').value.trim();
        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = "جاري البحث...";
        const q = query(collection(db, "clients"), where("phone", "==", phone), where("secretCode", "==", secret));
        const snap = await getDocs(q);
        if (!snap.empty) {
            let html = `<h3>أهلاً ${snap.docs[0].data().name}</h3>`;
            snap.forEach(doc => {
                const c = doc.data();
                html += `<div style="border:1px solid #ddd; padding:10px; border-radius:10px; margin-bottom:10px;">
                    <p>المنتج: ${c.product}</p><p>المتبقي: ${(c.price * (1 + c.interest) - c.paid).toLocaleString()} ج.م</p>
                </div>`;
            });
            body.innerHTML = html + `<button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; padding:10px; background:var(--gold); border:none; border-radius:10px;">إغلاق</button>`;
        } else { body.innerHTML = "البيانات غير صحيحة"; }
    };

    window.openImageModal = (src) => { document.getElementById('modalImage').src = src; document.getElementById('imageModal').style.display = 'flex'; };
    window.openInstallmentCalc = (name, price, minDown, interest) => {
        document.getElementById('resultModal').style.display = 'flex';
        document.getElementById('modalBody').innerHTML = `<h3>حاسبة ${name}</h3>
        <input type="number" id="uDown" value="${minDown}" style="width:90%; padding:10px; margin-bottom:10px;">
        <select id="uMonths" style="width:95%; padding:10px;"><option value="12">12 شهر</option><option value="18">18 شهر</option></select>
        <button onclick="doCalc(${price}, ${interest})" style="width:100%; padding:10px; background:var(--gold); border:none; margin-top:10px;">احسب</button>
        <div id="cRes" style="margin-top:10px; font-weight:bold;"></div>`;
    };
    window.doCalc = (p, i) => {
        const d = document.getElementById('uDown').value;
        const m = document.getElementById('uMonths').value;
        const res = ((p - d) + ((p - d) * (i/100) * (m/12))) / m;
        document.getElementById('cRes').innerText = `القسط الشهري: ${Math.round(res).toLocaleString()} ج.م`;
    };
</script>
</body>
</html>
