<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التقسيط - نسخة الخزنة ورأس المال</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Tahoma, Arial, sans-serif;background:#f0f4f8;padding:10px}
    .container{max-width:500px;margin:0 auto;background:white;border-radius:15px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
    h1{color:#28a745;text-align:center;margin-bottom:20px}
    input, select, button{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:10px;font-size:16px;outline:none}
    input:focus{border-color:#28a745}
    button{background:#28a745;color:white;font-weight:bold;cursor:pointer;border:none}
    .result-card{padding:15px;border-radius:10px;margin:10px 0;text-align:center;font-weight:bold}
    .safe-card{background:#fff3cd;color:#856404;border:1px solid #ffeeba}
    .cap-card{background:#d1ecf1;color:#0c5460;border:1px solid #bee5eb}
    table{width:100%;border-collapse:collapse;margin-top:15px;background:white}
    th{background:#28a745;color:white;padding:10px;font-size:14px}
    td{border:1px solid #eee;padding:10px;text-align:center;font-size:13px}
    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);display:flex;justify-content:center;align-items:center;z-index:1000}
    .modal-content{background:white;padding:20px;border-radius:15px;width:90%;max-width:400px}
    .hidden{display:none}
</style>
</head>
<body>

<div class="container">
    <h1>محل التقسيط 💰</h1>
    
    <input type="text" id="name" placeholder="* اسم العميل">
    <input type="number" id="price" placeholder="* السعر">
    <input type="number" id="months" placeholder="* عدد الشهور">
    <input type="number" id="interest" placeholder="* الفائدة %">
    <input type="date" id="regDate">
    <button onclick="addClient()">إضافة عميل</button>

    <hr style="margin:20px 0">

    <div class="result-card safe-card">
        إجمالي المتحصلات في الخزنة:<br>
        <span id="cashSafeDisplay" style="font-size:20px">0 ج.م</span>
    </div>
    <button onclick="clearSafe()" style="background:#ffc107; color:#333">جرد وتصفير الخزنة 🧹</button>

    <div class="result-card cap-card">
        رأس المال الحالي:<br>
        <span id="capitalDisplay" style="font-size:20px">0 ج.م</span>
    </div>
    <div class="btn-grid">
        <button onclick="openCapModal()" style="background:#17a2b8">إيداع / سحب</button>
        <button onclick="exportCapPDF()" style="background:#6c757d">تقرير رأس المال</button>
    </div>

    <div class="btn-grid" style="margin-top:10px">
        <button onclick="exportBackup()" style="background:#fd7e14">سحب نسخة 💾</button>
        <button onclick="document.getElementById('importFile').click()" style="background:#6f42c1">إضافة نسخة ♻️</button>
    </div>
    <input type="file" id="importFile" hidden onchange="importBackup(event)">

    <h3 id="cCount" style="margin-top:20px; color:#555">العملاء (0)</h3>
    <div id="clientsList"></div>
</div>

<div id="capModal" class="modal hidden">
    <div class="modal-content">
        <h3>حركة رأس مال</h3>
        <select id="capType">
            <option value="in">إيداع (زيادة +)</option>
            <option value="out">سحب (نقص -)</option>
        </select>
        <input type="number" id="capAmt" placeholder="المبلغ">
        <input type="text" id="capReason" placeholder="السبب (مثلاً: شراء بضاعة)">
        <input type="date" id="capDate">
        <button onclick="saveCap()">تأكيد العملية</button>
        <button onclick="closeModal('capModal')" style="background:#dc3545">إلغاء</button>
    </div>
</div>

<div id="payModal" class="modal hidden">
    <div class="modal-content">
        <h3>دفع قسط</h3>
        <input type="number" id="pAmt" placeholder="المبلغ">
        <input type="date" id="pDate">
        <button onclick="confirmPay()">تأكيد الدفع</button>
        <button onclick="closeModal('payModal')" style="background:#dc3545">إلغاء</button>
    </div>
</div>

<script>
// الأسماء الأصلية لضمان استعادة البيانات
let clients = JSON.parse(localStorage.getItem('clients') || '[]');
let capitalEntries = JSON.parse(localStorage.getItem('capitalEntries') || '[]');
let cashSafe = Number(localStorage.getItem('cashSafe') || 0);
let activeIdx = -1;

const today = new Date().toISOString().split('T')[0];

function save() {
    localStorage.setItem('clients', JSON.stringify(clients));
    localStorage.setItem('capitalEntries', JSON.stringify(capitalEntries));
    localStorage.setItem('cashSafe', cashSafe);
    render();
}

function addClient() {
    const name = document.getElementById('name').value;
    const price = Number(document.getElementById('price').value);
    if(!name || !price) return alert("يرجى ملء البيانات");
    clients.push({
        name, price, months: Number(document.getElementById('months').value),
        interest: Number(document.getElementById('interest').value),
        regDate: document.getElementById('regDate').value || today,
        paid: 0, payments: []
    });
    save();
}

function openPay(i) {
    activeIdx = i;
    const c = clients[i];
    const inst = (c.price * (1 + (c.interest/100))) / c.months;
    document.getElementById('pAmt').value = Math.round(inst);
    document.getElementById('pDate').value = today;
    document.getElementById('payModal').classList.remove('hidden');
}

function confirmPay() {
    const amt = Number(document.getElementById('pAmt').value);
    clients[activeIdx].paid += amt;
    clients[activeIdx].payments.push({amt, date: document.getElementById('pDate').value});
    cashSafe += amt; // تزويد الخزنة تراكمياً
    save();
    closeModal('payModal');
}

function clearSafe() {
    if(confirm("هل متأكد من جرد وتصفير الخزنة؟")) {
        cashSafe = 0;
        save();
    }
}

function openCapModal() {
    document.getElementById('capDate').value = today;
    document.getElementById('capModal').classList.remove('hidden');
}

function saveCap() {
    const amt = Number(document.getElementById('capAmt').value);
    const type = document.getElementById('capType').value;
    const finalAmt = type === 'in' ? amt : -amt;
    capitalEntries.push({
        amount: finalAmt, 
        reason: document.getElementById('capReason').value || "غير محدد", 
        date: document.getElementById('capDate').value
    });
    save();
    closeModal('capModal');
}

function render() {
    document.getElementById('cashSafeDisplay').innerText = cashSafe.toLocaleString() + ' ج.م';
    const totalCap = capitalEntries.reduce((a, b) => a + Number(b.amount), 0);
    document.getElementById('capitalDisplay').innerText = totalCap.toLocaleString() + ' ج.م';
    document.getElementById('cCount').innerText = `العملاء (${clients.length})`;

    let html = `<table><tr><th>العميل</th><th>الباقي</th><th>التحكم</th></tr>`;
    clients.forEach((c, i) => {
        const total = c.price * (1 + (c.interest/100));
        html += `<tr>
            <td><b>${c.name}</b></td>
            <td>${Math.round(total - c.paid)}</td>
            <td><button onclick="openPay(${i})" style="padding:5px; font-size:12px">قسط</button></td>
        </tr>`;
    });
    document.getElementById('clientsList').innerHTML = html + '</table>';
}

function exportBackup() {
    const blob = new Blob([JSON.stringify({clients, capitalEntries, cashSafe})], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `تقسيط_احتياطي_${today}.json`;
    a.click();
}

function importBackup(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const data = JSON.parse(ev.target.result);
        clients = data.clients || [];
        capitalEntries = data.capitalEntries || [];
        cashSafe = data.cashSafe || 0;
        save();
    };
    reader.readAsText(e.target.files[0]);
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

window.onload = () => { document.getElementById('regDate').value = today; render(); };
</script>
</body>
</html>
