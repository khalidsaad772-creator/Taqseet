<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>معرض خالد خفاجي للتقسيط</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; --gold-dark: #b8860b; --dark: #1a1a1a; 
            --green-wa: #25D366; --green-wa-dark: #128C7E;
            --blue-link: #3498db; --bg: #f8f9fa;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 0; color: #333; }

        header { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; padding: 45px 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }
        
        .search-container-box { max-width: 500px; margin: 20px auto 5px; padding: 0 20px; display: flex; gap: 10px; align-items: center; }
        .search-container-box input { flex: 1; padding: 12px 25px; border-radius: 50px; border: 2px solid var(--gold); outline: none; font-family: 'Cairo'; font-weight: 600; }
        .search-container-box button { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--gold); color: white; cursor: pointer; }

        .container { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: auto;
            /* دعم السكرول الأفقي */
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            display: flex;
        }
        .container::-webkit-scrollbar { display: none; }

        .product-card { background: white; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; overflow: hidden; flex: 0 0 280px; }
        .img-wrapper { position: relative; width: 100%; height: 320px; background: #fff; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .product-img { width: 75%; height: 75%; object-fit: contain; }
        .product-info { padding: 15px; text-align: center; }
        .price-tag { color: #2ecc71; font-weight: 800; font-size: 1.4rem; margin: 5px 0; }
        
        .btn-wa { background: linear-gradient(45deg, var(--green-wa), var(--green-wa-dark)); color: white; text-decoration: none; padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-weight: 700; border: none; font-size: 1.1rem; }

        .category-header-btn { background: var(--dark); color: var(--gold); padding: 15px 25px; margin: 10px 20px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; border-right: 6px solid var(--gold); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: right; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" class="logo-img">
    <h1 style="margin:0;">معرض خالد خفاجي</h1>
    <p style="color:var(--gold);">للتقسيط وخدمات المحمول 📱</p>
</header>

<div class="search-container-box">
    <input type="text" id="searchInput" placeholder="ابحث هنا..." oninput="filterProducts()">
    <button onclick="filterProducts()"><i class="fas fa-search"></i></button>
</div>

<div id="mainContentArea">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProducts = [];

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        allProducts = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
        renderCategorized(allProducts);
    });

    function renderCategorized(products) {
        const area = document.getElementById('mainContentArea');
        area.innerHTML = '';
        
        const categories = {
            'mobiles_new': '📱 موبايلات جديدة',
            'appliances_new': '🧺 أجهزة كهربائية'
        };

        Object.keys(categories).forEach(key => {
            const filtered = products.filter(p => (p.category || 'other') === key);
            if (filtered.length > 0) {
                const section = document.createElement('div');
                section.innerHTML = `<div class="category-header-btn">${categories[key]}</div>`;
                const grid = document.createElement('div');
                grid.className = 'container';
                grid.id = `scroll-${key}`;

                filtered.forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="img-wrapper">
                                <img src="${p.image}" class="product-img">
                            </div>
                            <div class="product-info">
                                <h3>${p.name}</h3>
                                <p class="price-tag">${p.price.toLocaleString()} ج.م</p>
                                <a href="https://wa.me/201095890589" class="btn-wa">اطلبه الآن</a>
                            </div>
                        </div>`;
                });
                section.appendChild(grid);
                area.appendChild(section);
                
                // سكرول تلقائي بسيط جداً
                startAutoScroll(`scroll-${key}`);
            }
        });
    }

    function startAutoScroll(id) {
        const el = document.getElementById(id);
        setInterval(() => {
            if (el.scrollLeft + el.clientWidth >= el.scrollWidth - 1) {
                el.scrollTo({left: 0, behavior: 'smooth'});
            } else {
                el.scrollBy({left: 305, behavior: 'smooth'});
            }
        }, 4000);
    }
</script>
</body>
</html>
