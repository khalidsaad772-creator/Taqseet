<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>معرض خالد خفاجي للتقسيط</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --bg: #f4f4f4; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; overflow-x: hidden; }
        
        header { background: var(--dark); color: white; padding: 30px 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); }

        /* حاوية السكرول الأفقي */
        .category-section { margin-bottom: 40px; }
        .category-title { margin: 20px; font-weight: 800; color: var(--dark); border-right: 5px solid var(--gold); padding-right: 15px; }
        
        .carousel-container { position: relative; padding: 0 10px; overflow: hidden; }
        .carousel-track { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            gap: 15px; 
            padding: 10px 0 20px;
            scrollbar-width: none; /* لإخفاء السكرول بار في Firefox */
        }
        .carousel-track::-webkit-scrollbar { display: none; } /* لإخفاء السكرول بار في Chrome */

        /* توحيد حجم كارت المنتج */
        .product-card { 
            flex: 0 0 260px; /* عرض ثابت لكل المنتجات */
            height: 520px;    /* طول ثابت لكل المنتجات */
            background: white; 
            border-radius: 20px; 
            scroll-snap-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .img-box { 
            width: 100%; 
            height: 220px; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px;
            box-sizing: border-box;
            border-bottom: 1px solid #eee;
        }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info-box { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
        .info-box h3 { font-size: 1rem; margin: 0 0 10px; height: 45px; overflow: hidden; }
        .price { color: #27ae60; font-weight: 800; font-size: 1.2rem; margin: 5px 0; }
        
        /* الدوائر (Dots) */
        .dots-wrapper { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 18px; border-radius: 10px; }

        /* الأزرار */
        .btn-wa { background: #25D366; color: white; text-decoration: none; padding: 10px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btn-small { background: #f0f0f0; border: none; padding: 8px; border-radius: 10px; font-family: 'Cairo'; cursor: pointer; font-size: 0.8rem; }

        /* الاستعلام والبحث */
        .search-box { background: white; margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .search-box input { width: 90%; padding: 12px; border-radius: 25px; border: 1px solid #ddd; margin-bottom: 10px; text-align: center; font-family: 'Cairo'; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" class="logo-img">
    <h1>معرض خالد خفاجي</h1>
    <p style="color: var(--gold);">عروض التقسيط الذكية 📱✨</p>
</header>

<div class="search-box">
    <input type="text" id="mainSearch" placeholder="ابحث عن موبايل أو جهاز..." oninput="filterData()">
</div>

<div id="dynamicContent">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProducts = [];

    const categories = {
        'mobiles_new': '📱 موبايلات جديدة',
        'mobiles_used': '✨ كسر زيرو',
        'appliances_new': '🧺 أجهزة منزلية',
        'other': '📦 عروض أخرى'
    };

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snap) => {
        allProducts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        render(allProducts);
    });

    function render(data) {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = '';

        Object.keys(categories).forEach(catKey => {
            const filtered = data.filter(p => (p.category || 'other') === catKey);
            if (filtered.length > 0) {
                const section = document.createElement('div');
                section.className = 'category-section';
                
                const carouselId = `track-${catKey}`;
                const dotsId = `dots-${catKey}`;

                section.innerHTML = `
                    <h2 class="category-title">${categories[catKey]}</h2>
                    <div class="carousel-container">
                        <div class="carousel-track" id="${carouselId}">
                            ${filtered.map(p => `
                                <div class="product-card">
                                    <div class="img-box"><img src="${p.image}"></div>
                                    <div class="info-box">
                                        <h3>${p.name}</h3>
                                        <p class="price">${p.price.toLocaleString()} ج.م</p>
                                        <p style="font-size:0.8rem; color:#888;">مقدم: ${p.downPayment} ج.م</p>
                                        <div class="action-btns">
                                            <button class="btn-small"><i class="fas fa-calculator"></i> احسب</button>
                                            <button class="btn-small"><i class="fas fa-share-alt"></i> مشاركة</button>
                                        </div>
                                        <a href="https://wa.me/201095890589" class="btn-wa"><i class="fab fa-whatsapp"></i> اطلب الآن</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="dots-wrapper" id="${dotsId}">
                            ${filtered.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(section);
                initCarouselLogic(carouselId, dotsId, filtered.length);
            }
        });
    }

    function initCarouselLogic(trackId, dotsId, count) {
        const track = document.getElementById(trackId);
        const dots = document.getElementById(dotsId).children;
        let currentIdx = 0;

        // الحركة الأوتوماتيكية
        let autoPlay = setInterval(() => {
            currentIdx = (currentIdx + 1) % count;
            track.scrollTo({ left: currentIdx * 275, behavior: 'smooth' }); // 275 = العرض + الجاب
        }, 4000);

        // تحديث الدوائر أثناء السكرول اليدوي
        track.addEventListener('scroll', () => {
            const index = Math.round(track.scrollLeft / 275);
            Array.from(dots).forEach((d, i) => d.classList.toggle('active', i === index));
        });

        // إيقاف الحركة عند اللمس
        track.addEventListener('touchstart', () => clearInterval(autoPlay));
    }
</script>

</body>
</html>
