<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض خالد خفاجي للتقسيط</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; 
            --gold-dark: #b8860b;
            --dark: #1a1a1a; 
            --green-wa: #25D366; 
            --green-wa-dark: #128C7E;
            --blue-link: #3498db; 
            --bg: #f8f9fa;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-bottom: 60px; 
            color: #333;
        }

        /* الهيدر الاحترافي */
        header { 
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            color: white; padding: 45px 10px; text-align: center; 
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 3px solid var(--gold); margin-bottom: 15px; 
            object-fit: cover; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* البحث بتأثير زجاجي */
        .search-section { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 25px; margin: -30px 20px 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center;
        }
        .search-section input { 
            width: 80%; padding: 14px; border: 2px solid #eee; 
            border-radius: 30px; font-family: 'Cairo'; font-size: 16px;
        }

        /* شبكة المنتجات */
        .container { 
            padding: 20px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1200px; margin: auto; 
        }

        /* بطاقة المنتج */
        .product-card { 
            background: white; border-radius: 25px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04); display: flex; 
            flex-direction: column; transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease forwards;
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        .product-img { width: 100%; height: 250px; object-fit: contain; padding: 20px; }

        .product-info { padding: 20px; text-align: center; }
        .price-tag { color: #2ecc71; font-weight: 800; font-size: 1.5rem; margin: 10px 0; }
        
        /* زر الواتساب الجديد (التطوير المطلوب) */
        .btn-wa { 
            background: linear-gradient(45deg, var(--green-wa), var(--green-wa-dark));
            color: white; text-decoration: none; padding: 14px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 10px; font-weight: 700; font-size: 1.1rem; border: none;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); transition: 0.3s;
            animation: pulse-wa 2s infinite;
        }
        .btn-wa:hover { transform: scale(1.02); filter: brightness(1.1); }

        @keyframes pulse-wa {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* زر الحاسبة العصري */
        .btn-calc { 
            background: #f0f4f8; color: var(--blue-link); border: 1px solid #dce4ec;
            padding: 12px; border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; gap: 10px; margin-top: 15px; font-weight: 600; 
            cursor: pointer; width: 100%; font-family: 'Cairo'; transition: 0.3s;
        }
        .btn-calc:hover { background: var(--blue-link); color: white; border-color: var(--blue-link); }

        .admin-lock { 
            position: fixed; bottom: 20px; left: 20px; background: var(--dark); 
            color: var(--gold); border: 1px solid var(--gold); width: 50px; 
            height: 50px; border-radius: 50%; cursor: pointer; z-index: 3000;
        }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; 
            height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; 
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 25px; width: 90%; 
            max-width: 400px; text-align: right; border-top: 8px solid var(--gold);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    
<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" alt="Khalid Logo" class="logo-img">
    <h1 style="margin: 0; font-size: 2rem;">معرض خالد خفاجي</h1>
    <p style="margin: 5px 0 0; color: var(--gold); font-weight: 600;">أسهل نظام تقسيط في مصر 💳</p>
</header>

<div class="search-section">
    <h3 style="margin-top:0">استعلم عن أقساطك 🔍</h3>
    <input type="tel" id="clientPhone" placeholder="رقم تليفونك المسجل">
    <button onclick="checkInstallments()" style="background:var(--gold); border:none; padding:10px 25px; border-radius:25px; margin-top:10px; font-weight:bold; cursor:pointer;">بحث الآن</button>
</div>

<div class="container" id="productsGrid"></div>

<button class="admin-lock" onclick="adminLogin()"><i class="fas fa-cog"></i></button>

<div id="resultModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        let i = 0;
        snapshot.forEach((doc) => {
            const p = doc.data();
            const myNumber = "201095890589"; 
            const interestRate = p.interestRate || 20;

            grid.innerHTML += `
                <div class="product-card" style="animation-delay: ${i * 0.1}s">
                    <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/200'">
                    <div class="product-info">
                        <h3 style="margin:0; font-size:1.2rem">${p.name}</h3>
                        <p class="price-tag">${p.price.toLocaleString()} ج.م</p>
                        <p style="color:#777; font-size:0.9rem; margin-bottom:15px">مقدم يبدأ من: ${p.downPayment} ج.م</p>
                        
                        <button class="btn-calc" onclick="openInstallmentCalc('${p.name}', ${p.price}, ${p.downPayment}, ${interestRate})">
                            <i class="fas fa-calculator"></i> احسب قسطك بنفسك
                        </button>

                        <a href="https://wa.me/${myNumber}?text=أريد الاستفسار عن ${p.name}" class="btn-wa">
                           <span>اطلبه الآن</span>
                           <i class="fab fa-whatsapp fa-lg"></i>
                        </a>
                    </div>
                </div>`;
            i++;
        });
    });

    // --- حاسبة الأقساط ---
    window.openInstallmentCalc = function(name, price, minDown, interest) {
        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = `
            <h3 style="text-align:center; color:var(--dark)">🧮 حاسبة التقسيط لـ <br><span style="color:var(--gold-dark)">${name}</span></h3>
            <label style="display:block; margin-top:15px">المقدم (ج.م):</label>
            <input type="number" id="userDown" style="width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ddd" value="${minDown}" min="${minDown}">
            
            <label style="display:block; margin-top:10px">مدة التقسيط:</label>
            <select id="monthsCount" style="width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ddd">
                <option value="6">6 شهور</option>
                <option value="12" selected>12 شهر</option>
                <option value="24">24 شهر</option>
            </select>

            <button onclick="calculateResult(${price}, ${interest})" style="width:100%; background:var(--dark); color:white; padding:12px; border:none; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer">احسب القسط</button>
            <div id="finalCalcResult" style="margin-top:15px; padding:15px; background:#f9f9f9; border-radius:10px; display:none; text-align:center"></div>
            <button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer">إغلاق</button>
        `;
    }

    window.calculateResult = function(price, interestRate) {
        const userDown = parseFloat(document.getElementById('userDown').value);
        const months = parseInt(document.getElementById('monthsCount').value);
        const resultDiv = document.getElementById('finalCalcResult');
        const remaining = price - userDown;
        if (remaining <= 0) { resultDiv.innerHTML = "المقدم يغطي السعر!"; resultDiv.style.display="block"; return; }
        const interestAmount = remaining * (interestRate / 100) * (months / 12);
        const monthly = Math.round((remaining + interestAmount) / months);
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<p style="margin:0">قسطك الشهري:</p><h2 style="color:#2ecc71; margin:5px 0">${monthly.toLocaleString()} ج.م</h2>`;
    }

    // --- الاستعلام ---
    window.checkInstallments = async function() {
        const phone = document.getElementById('clientPhone').value.trim();
        if(!phone) return;
        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = "جاري البحث...";
        try {
            const q = query(collection(db, "clients"), where("phone", "==", phone));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                const c = querySnapshot.docs[0].data();
                const total = c.price * (1 + (c.interest || 0));
                body.innerHTML = `<h3>أهلاً ${c.name}</h3><p>المنتج: ${c.product}</p><p>المتبقي: <span style="color:red; font-weight:bold">${(total - c.paid).toLocaleString()} ج.م</span></p>
                <button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; background:var(--gold); border:none; padding:10px; border-radius:10px; cursor:pointer">شكراً</button>`;
            } else {
                body.innerHTML = "الرقم غير مسجل. <button onclick='document.getElementById(\"resultModal\").style.display=\"none\"'>إغلاق</button>";
            }
        } catch (e) { body.innerHTML = "خطأ في الاتصال"; }
    }

    window.adminLogin = function() {
        if(prompt("كلمة المرور:") === "khalid1234") window.location.href = "admin.html";
    }
</script>
</body>
</html>
