<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معرض خالد خفاجي للتقسيط</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --gold: #d4af37; --gold-dark: #b8860b; --dark: #1a1a1a; 
            --green-wa: #25D366; --green-wa-dark: #128C7E;
            --blue-link: #3498db; --bg: #f8f9fa;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 60px; color: #333; }

        header { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; padding: 45px 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }

        .search-section { background: #fff; padding: 25px; margin: -30px 20px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .search-section input { width: 85%; padding: 14px; border: 2px solid #eee; border-radius: 30px; font-family: 'Cairo'; }

        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }

        .product-card { 
            background: white; border-radius: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; 
        }

        .img-wrapper { 
            position: relative; width: 100%; height: 320px; 
            background: #fff; 
            overflow: hidden;
            cursor: crosshair;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-img { 
            width: 75%; 
            height: 75%; 
            object-fit: contain; 
            pointer-events: none; 
        }
        
        .magnifier {
            position: absolute; 
            width: 160px; 
            height: 160px;
            border: 4px solid var(--gold); 
            border-radius: 50%;
            pointer-events: none; 
            display: none;
            background-repeat: no-repeat; 
            background-color: rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            z-index: 10000;
            overflow: hidden;
        }

        .product-info { padding: 15px; text-align: center; background: white; border-radius: 0 0 25px 25px; }
        .price-tag { color: #2ecc71; font-weight: 800; font-size: 1.6rem; margin: 5px 0; }
        
        .btn-wa { 
            background: linear-gradient(45deg, var(--green-wa), var(--green-wa-dark));
            color: white; text-decoration: none; padding: 15px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px; font-weight: 700; border: none; font-size: 1.1rem;
            animation: pulse-wa 2s infinite;
        }
        @keyframes pulse-wa {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .btn-calc { background: #f0f4f8; color: var(--blue-link); border: 1px solid #dce4ec; padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Cairo'; }

        /* زر الأدمن المحسن */
        .admin-lock { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            background: #eab308; 
            color: #000; 
            border: none; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            z-index: 3000; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
            transition: all 0.3s ease;
        }
        
        .admin-lock:hover {
            transform: rotate(30deg) scale(1.1);
            background: #d4af37;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: right; border-top: 6px solid var(--gold); }
    </style>
</head>
<body>
    
<header>
    <img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" alt="Khalid Logo" class="logo-img">
    <h1 style="margin: 0; font-size: 2rem;">معرض خالد خفاجي</h1>
    <p style="margin: 5px 0 0; color: var(--gold); font-weight: 600;">للتقسيط وخدمات المحمول 📱</p>
</header>

<div class="search-section">
    <h3 style="margin-top:0">استعلم عن أقساطك 💳</h3>
    <input type="tel" id="clientPhone" placeholder="أدخل رقم تليفونك المسجل">
    <button onclick="checkInstallments()" style="background:var(--gold); border:none; padding:10px 25px; border-radius:25px; margin-top:10px; font-weight:bold; cursor:pointer;">بحث الآن</button>
</div>

<div class="container" id="productsGrid"></div>

<button class="admin-lock" onclick="adminLogin()"><i class="fas fa-cog"></i></button>

<div id="resultModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        snapshot.forEach((doc) => {
            const p = doc.data();
            const myNumber = "201095890589"; 
            const interestRate = p.interestRate || 20;

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="img-wrapper" 
                     onmousemove="zoomImage(event, this)" 
                     onmouseleave="hideZoom(this)" 
                     ontouchmove="zoomImage(event, this)" 
                     ontouchend="hideZoom(this)">
                    <div class="magnifier"></div>
                    <img src="${p.image}" class="product-img">
                </div>
                <div class="product-info">
                    <h3 style="margin:0; font-size:1.1rem">${p.name}</h3>
                    <p class="price-tag">${p.price.toLocaleString()} ج.م</p>
                    <p style="color:#888; font-size:0.9rem">مقدم يبدأ من: ${p.downPayment} ج.م</p>
                    <button class="btn-calc" onclick="openInstallmentCalc('${p.name}', ${p.price}, ${p.downPayment}, ${interestRate})">
                        <i class="fas fa-calculator"></i> احسب قسطك بنفسك
                    </button>
                    <a href="https://wa.me/${myNumber}?text=أريد الاستفسار عن ${p.name}" class="btn-wa">
                       <i class="fab fa-whatsapp"></i> اطلبه الآن
                    </a>
                </div>`;
            grid.appendChild(card);
        });
    });

    // العدسة (لم يتم تعديلها)
    window.zoomImage = function(e, wrapper) {
        const mag = wrapper.querySelector('.magnifier');
        const img = wrapper.querySelector('.product-img');
        
        if (!mag || !img) return;

        mag.style.display = "block";

        const rect = wrapper.getBoundingClientRect();
        
        let x, y;
        if (e.touches) {
            x = e.touches[0].clientX - rect.left;
            y = e.touches[0].clientY - rect.top;
        } else {
            x = e.clientX - rect.left;
            y = e.clientY - rect.top;
        }

        x = Math.max(80, Math.min(x, rect.width - 80));
        y = Math.max(80, Math.min(y, rect.height - 80));

        mag.style.left = (x - 80) + "px";
        mag.style.top = (y - 80) + "px"; 

        const zoomLevel = 2.3;

        const posX = (x / rect.width) * 100;
        const posY = (y / rect.height) * 100;

        mag.style.backgroundImage = `url('${img.src}')`;
        mag.style.backgroundSize = (rect.width * zoomLevel) + "px " + (rect.height * zoomLevel) + "px";
        mag.style.backgroundPosition = `${posX}% ${posY}%`;
    };

    window.hideZoom = function(wrapper) {
        const mag = wrapper.querySelector('.magnifier');
        if (mag) mag.style.display = "none";
    };

    // باقي الأكواد بدون أي تغيير
    window.openInstallmentCalc = function(name, price, minDown, interest) {
        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = `
            <h3 style="text-align:center">🧮 حاسبة التقسيط لـ <br>${name}</h3>
            <label>المقدم:</label>
            <input type="number" id="userDown" class="search-section input" style="width:90%; border:1px solid #ddd; border-radius:10px; margin:10px 0; padding:10px" value="${minDown}">
            <label>الشهور:</label>
            <select id="monthsCount" style="width:100%; padding:10px; margin:5px 0; border-radius:10px">
                <option value="6">6 شهور</option>
                <option value="10">10 شهور</option>
                <option value="12" selected>12 شهر</option>
                <option value="18">18 شهر</option>
            </select>
            <button onclick="calculateResult(${price}, ${interest})" style="width:100%; background:var(--gold); border:none; padding:12px; border-radius:10px; margin-top:10px; font-weight:bold">احسب</button>
            <div id="finalCalcResult" style="margin-top:15px; text-align:center; font-weight:bold; background:#f9f9f9; padding:10px; border-radius:10px; display:none;"></div>
            <button onclick="document.getElementById('resultModal').style.display='none'" style="width:100%; background:none; border:none; color:#999; margin-top:10px">إغلاق</button>
        `;
    };

    window.calculateResult = function(price, interestRate) {
        const userDown = parseFloat(document.getElementById('userDown').value);
        const months = parseInt(document.getElementById('monthsCount').value);
        const resultDiv = document.getElementById('finalCalcResult');
        const remaining = price - userDown;
        
        if (remaining <= 0) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = "المقدم يغطي السعر!";
            return;
        }

        const interestAmount = remaining * (interestRate / 100) * (months / 12);
        const totalWithInterest = remaining + interestAmount;
        const monthly = Math.round(totalWithInterest / months);
        
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <span style="color:green; font-size:1.2rem">القسط: ${monthly.toLocaleString()} ج.م</span>
            <hr style="margin:5px 0; opacity:0.1">
            <span style="color:#666; font-size:0.9rem">إجمالي المتبقي: ${Math.round(totalWithInterest).toLocaleString()} ج.م</span>
        `;
    };

    window.checkInstallments = async function() {
        const phone = document.getElementById('clientPhone').value.trim();
        if(!phone) return;
        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = "جاري البحث...";
        const q = query(collection(db, "clients"), where("phone", "==", phone));
        const querySnapshot = await getDocs(q);
        if (!querySnapshot.empty) {
            const c = querySnapshot.docs[0].data();
            body.innerHTML = `<h3>أهلاً ${c.name}</h3><p>المتبقي: ${(c.price * (1 + (c.interest||0)) - c.paid).toLocaleString()} ج.م</p>
            <button onclick="document.getElementById('resultModal').style.display='none'">إغلاق</button>`;
        } else { body.innerHTML = "غير مسجل"; }
    };

    window.adminLogin = function() { if(prompt("الباسورد:") === "khalid1234") window.location.href = "admin.html"; }
</script>
</body>
</html>
