<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معرض خالد خفاجي للتقسيط</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --gold: #d4af37; --dark: #1a1a1a;
    --green-wa: #25D366; --green-wa-dark:#128C7E;
    --bg:#f8f9fa;
}

body {font-family:Cairo;background:var(--bg);margin:0}

/* ====== HEADER ====== */
header{
background:linear-gradient(135deg,#1a1a1a,#333);
color:#fff;padding:40px;text-align:center;
border-bottom:4px solid var(--gold);
}

.logo-img{width:100px;border-radius:50%;border:3px solid var(--gold)}

/* ====== CATEGORY ====== */
.category-header-btn{
background:var(--dark);color:var(--gold);
padding:15px;margin:10px;border-radius:15px;
display:flex;justify-content:space-between;
cursor:pointer;font-weight:bold;
}

/* ====== AMAZON STYLE SCROLL ====== */
.horizontal-scroll{
display:flex;
gap:15px;
overflow-x:auto;
padding:15px;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
}

.horizontal-scroll::-webkit-scrollbar{
display:none;
}

.product-card{
min-width:260px;
max-width:260px;
background:#fff;
border-radius:20px;
scroll-snap-align:start;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
flex-shrink:0;
}

.img-wrapper{
height:220px;
display:flex;
align-items:center;
justify-content:center;
}

.product-img{
width:80%;
height:80%;
object-fit:contain;
}

.product-info{padding:10px;text-align:center}

.price-tag{color:#27ae60;font-weight:bold}

.btn-wa{
background:linear-gradient(45deg,var(--green-wa),var(--green-wa-dark));
color:#fff;
padding:10px;
border-radius:15px;
display:block;
margin-top:10px;
text-decoration:none;
}

.action-btns{
display:flex;
gap:5px;
}

.btn-calc,.btn-share{
flex:1;
padding:8px;
border-radius:10px;
border:none;
cursor:pointer;
}

/* ===== DRAG SCROLL ===== */
.horizontal-scroll.active{
cursor:grabbing;
cursor:-webkit-grabbing;
}

</style>
</head>

<body>

<header>
<img src="https://i.ibb.co/XgdnJ7Y/lv-0.jpg" class="logo-img">
<h2>معرض خالد خفاجي</h2>
</header>

<div id="mainContentArea"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBs...",
authDomain:"taqseet-f4aaf.firebaseapp.com",
projectId:"taqseet-f4aaf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts=[];

onSnapshot(query(collection(db,"products"),orderBy("date","desc")),snapshot=>{
allProducts = snapshot.docs.map(doc=>doc.data());
render(allProducts);
});

function render(products){
const area = document.getElementById("mainContentArea");
area.innerHTML="";

const grouped = products.reduce((acc,p)=>{
const c=p.category||"other";
if(!acc[c]) acc[c]=[];
acc[c].push(p);
return acc;
},{});

Object.keys(grouped).forEach(cat=>{

const wrapper=document.createElement("div");

const header=document.createElement("div");
header.className="category-header-btn";
header.innerHTML=cat;

const content=document.createElement("div");

const scroll=document.createElement("div");
scroll.className="horizontal-scroll";

grouped[cat].forEach(p=>{
scroll.innerHTML+=`
<div class="product-card">
<div class="img-wrapper">
<img src="${p.image}" class="product-img">
</div>
<div class="product-info">
<h4>${p.name}</h4>
<p class="price-tag">${p.price} ج</p>

<div class="action-btns">
<button class="btn-calc">قسط</button>
<button class="btn-share">مشاركة</button>
</div>

<a class="btn-wa" href="https://wa.me/201095890589?text=${p.name}">
اطلب الآن
</a>

</div>
</div>
`;
});

content.appendChild(scroll);
wrapper.appendChild(header);
wrapper.appendChild(content);
area.appendChild(wrapper);

/* ===== DRAG FUNCTION ===== */
let isDown=false;
let startX;
let scrollLeft;

scroll.addEventListener("mousedown",e=>{
isDown=true;
scroll.classList.add("active");
startX=e.pageX - scroll.offsetLeft;
scrollLeft=scroll.scrollLeft;
});

scroll.addEventListener("mouseleave",()=>isDown=false);
scroll.addEventListener("mouseup",()=>isDown=false);

scroll.addEventListener("mousemove",e=>{
if(!isDown) return;
e.preventDefault();
const x=e.pageX - scroll.offsetLeft;
const walk=(x-startX)*2;
scroll.scrollLeft=scrollLeft - walk;
});

/* TOUCH */
scroll.addEventListener("touchstart",e=>{
startX=e.touches[0].pageX;
scrollLeft=scroll.scrollLeft;
});

scroll.addEventListener("touchmove",e=>{
const x=e.touches[0].pageX;
const walk=(x-startX)*2;
scroll.scrollLeft=scrollLeft - walk;
});

});

}

</script>

</body>
</html>
