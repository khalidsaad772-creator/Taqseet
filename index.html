<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محل التقسيط - النسخة النهائية المستقرة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
/* التصميم الأصلي الخاص بك بالكامل */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma, Arial, sans-serif;background:#f0f8ff;padding:10px}
.container{max-width:550px;margin:0 auto;background:white;border-radius:16px;padding:20px;box-shadow:0 6px 25px rgba(0,0,0,0.15)}
h1{color:#28a745;text-align:center;margin:20px 0;font-size:26px}
h2{color:#007bff;text-align:center;margin:15px 0;font-size:20px}

input,button,select{width:100%;padding:14px;margin:8px 0;border:2px solid #28a745;border-radius:12px;font-size:16px;text-align:center}
button{background:#28a745;color:#fff;font-weight:bold;cursor:pointer;transition:background .3s;border:none}
button:hover{background:#1e7e34}

.btn{padding:8px 5px; margin:3px; font-size:13px; border-radius:8px; font-weight:bold; cursor:pointer; flex: 1; min-width: 60px; color:white; border:none}
.action-content{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; align-items:center}

.pay{background:#007bff}.wa{background:#25D366}.edit{background:#ffc107;color:#000}.del{background:#dc3545}.cam{background:#6f42c1}

.result{padding:16px;border-radius:12px;margin:15px 0;text-align:center;font-size:18px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin:15px 0;font-size:14px;border-radius:12px;overflow:hidden}
th{background:#28a745;color:#fff;padding:12px}
td{border:1px solid #ddd;padding:10px;text-align:center;background:#f9f9f9}

.progress{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin:8px 0;width:100%}
.bar{height:100%;background:#28a745;transition:width .6s}
.client-thumb{width:45px;height:45px;border-radius:50%;object-fit:cover;border:3px solid #28a745;cursor:pointer}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal-content{background:white;padding:25px;border-radius:16px;width:90%;max-width:450px;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="container">
    <h1>محل التقسيط 💰</h1>
    <input type="text" id="name" placeholder="* اسم العميل">
    <input type="text" id="phone" placeholder="* رقم التليفون">
    <input type="text" id="product" placeholder="وصف المنتج">
    <div style="display:flex; gap:5px">
        <input type="number" id="price" placeholder="* السعر">
        <input type="number" id="months" placeholder="* الشهور">
    </div>
    <input type="number" id="interest" placeholder="* الفائدة %">
    <input type="date" id="regDate">
    <button onclick="addClient()">إضافة عميل جديد</button>

    <hr style="margin:20px 0">

    <h2>إجمالي الأرباح المتوقعة 📈</h2>
    <div id="resTotal" class="result" style="background:#d4edda; color:#155524;">0 ج.م</div>

    <h2>الربح الشهري الفعلي 💵</h2>
    <div id="resMonthly" class="result" style="background:#fff3cd; color:#856404;">0 ج.م</div>

    <h2>خزنة المحصلات (تراكمي) 🏦</h2>
    <div id="safeRes" class="result" style="background:#e8f4fd; color:#0056b3;">0 ج.م</div>
    <button onclick="clearSafe()" style="background:#ff9800; color:white">جرد وتصفير الخزنة 🧹</button>

    <h2>رأس المال المسحوب 💸</h2>
    <div id="capitalRes" class="result" style="background:#f8d7da; color:#721c24;">0 ج.م</div>
    <div style="display:flex; gap:5px">
        <button onclick="openCapModal()" style="background:#007bff; flex:1">إضافة سحب / إيداع</button>
        <button onclick="exportCapPDF()" style="background:#4CAF50; flex:1">تقرير رأس المال PDF</button>
    </div>

    <h2 id="clientsCount">العملاء (0)</h2>
    <div id="clientsTable"></div>
</div>

<div id="payModal" class="modal hidden">
    <div class="modal-content">
        <h2>تسجيل قسط جديد</h2>
        <input type="number" id="pAmt" placeholder="قيمة القسط">
        <input type="date" id="pDate">
        <button onclick="doPay()">تأكيد الدفع</button>
        <button onclick="closeModal('payModal')" style="background:#dc3545">إلغاء</button>
    </div>
</div>

<div id="capModal" class="modal hidden">
    <div class="modal-content">
        <h2>حركة رأس مال</h2>
        <select id="capType"><option value="in">إيداع (+)</option><option value="out">سحب (-)</option></select>
        <input type="number" id="capAmt" placeholder="المبلغ">
        <input type="text" id="capReason" placeholder="السبب (مثلاً: إيجار)">
        <input type="date" id="capDate">
        <button onclick="saveCap()">حفظ العملية</button>
        <button onclick="closeModal('capModal')" style="background:#dc3545">إغلاق</button>
    </div>
</div>

<div id="editModal" class="modal hidden">
    <div class="modal-content">
        <h2>تعديل بيانات العميل</h2>
        <input id="eName"><input id="ePhone"><input id="eProduct"><input id="ePrice" type="number"><input id="eMonths" type="number"><input id="eInterest" type="number"><input type="date" id="eRegDate">
        <button onclick="saveEdit()">حفظ التعديلات</button>
        <button onclick="closeModal('editModal')" style="background:#dc3545">إلغاء</button>
    </div>
</div>

<script>
let clients = JSON.parse(localStorage.getItem('clients') || '[]');
let capitalEntries = JSON.parse(localStorage.getItem('capitalEntries') || '[]');
let cashSafe = Number(localStorage.getItem('cashSafe') || 0);
let activeIdx = -1;

const today = new Date().toISOString().split('T')[0];
const fmt = (n) => Number(n).toLocaleString('ar-EG') + ' ج.م';

function save() {
    localStorage.setItem('clients', JSON.stringify(clients));
    localStorage.setItem('capitalEntries', JSON.stringify(capitalEntries));
    localStorage.setItem('cashSafe', cashSafe);
    render();
}

function addClient() {
    const name = document.getElementById('name').value;
    if(!name) return alert("أدخل الاسم");
    clients.push({
        name, phone: document.getElementById('phone').value,
        product: document.getElementById('product').value || 'بدون وصف',
        price: Number(document.getElementById('price').value),
        months: Number(document.getElementById('months').value),
        interest: Number(document.getElementById('interest').value),
        registrationDate: document.getElementById('regDate').value || today,
        paid: 0, payments: [], photo: null
    });
    save();
}

function render() {
    let totalExpProfit = 0, monthlyActProfit = 0;
    const now = new Date();
    
    clients.forEach(c => {
        const total = c.price * (1 + (c.interest/100));
        totalExpProfit += (c.price * (c.interest/100));
        const profitRatio = (c.interest/100) / (1 + c.interest/100);
        c.payments.forEach(p => {
            const pd = new Date(p.date);
            if(pd.getMonth() === now.getMonth() && pd.getFullYear() === now.getFullYear())
                monthlyActProfit += (p.amt * profitRatio);
        });
    });

    document.getElementById('resTotal').innerText = fmt(totalExpProfit);
    document.getElementById('resMonthly').innerText = fmt(monthlyActProfit);
    document.getElementById('safeRes').innerText = fmt(cashSafe);
    document.getElementById('capitalRes').innerText = fmt(capitalEntries.reduce((a,b)=>a+Number(b.amount),0));
    document.getElementById('clientsCount').innerText = `العملاء (${clients.length})`;

    let html = `<table><tr><th>العميل والتليفون</th><th>متبقي</th><th>القسط القادم</th></tr>`;
    clients.forEach((c, i) => {
        const total = c.price * (1 + (c.interest/100));
        const inst = total / c.months;
        const rem = total - c.paid;
        const nextDate = new Date(c.registrationDate);
        nextDate.setMonth(nextDate.getMonth() + Math.floor(c.paid / (inst || 1)) + 1);

        html += `<tr>
            <td style="text-align:right">
                <b>${c.name}</b><br><small>${c.phone}</small><br><i style="font-size:11px;color:#666">${c.product}</i>
            </td>
            <td>${fmt(rem)}</td>
            <td><b style="color:#007bff">${fmt(Math.min(inst, rem))}</b><br><small>${nextDate.toLocaleDateString('ar-EG')}</small></td>
        </tr>
        <tr><td colspan="3">
            <div class="progress"><div class="bar" style="width:${Math.min(100, (c.paid/total)*100)}%"></div></div>
            <div class="action-content">
                <button class="btn pay" onclick="openPay(${i})">قسط</button>
                <button class="btn edit" onclick="openEdit(${i})">تعديل</button>
                <button class="btn wa" onclick="sendWA(${i})">واتس</button>
                <button class="btn cam" onclick="activeIdx=${i}; alert('برجاء رفع الصورة من زر تعديل')">صورة</button>
                <button class="btn del" onclick="deleteClient(${i})">حذف</button>
            </div>
        </td></tr>`;
    });
    document.getElementById('clientsTable').innerHTML = html + `</table>`;
}

function openPay(i) {
    activeIdx = i; const c = clients[i];
    const inst = (c.price * (1 + c.interest/100)) / c.months;
    document.getElementById('pAmt').value = Math.round(inst);
    document.getElementById('pDate').value = today;
    document.getElementById('payModal').classList.remove('hidden');
}

function doPay() {
    const amt = Number(document.getElementById('pAmt').value);
    clients[activeIdx].paid += amt;
    clients[activeIdx].payments.push({amt, date: document.getElementById('pDate').value});
    cashSafe += amt; save(); closeModal('payModal');
}

function sendWA(i) {
    const c = clients[i];
    const total = c.price * (1 + (c.interest/100));
    const inst = total / c.months;
    const rem = total - c.paid;
    const nextDate = new Date(c.registrationDate);
    nextDate.setMonth(nextDate.getMonth() + Math.floor(c.paid/inst) + 1);

    const msg = `مرحباً ${c.name}، إليك تفاصيل تقسيط ${c.product}:\n\n`
              + `• المبلغ الإجمالي المتبقي: ${fmt(rem)}\n`
              + `• باقي الأقساط المتوقعة: ${Math.ceil(rem/inst)} قسط\n`
              + `• قيمة القسط القادم: ${fmt(Math.min(inst, rem))}\n`
              + `• تاريخ استحقاق القسط: ${nextDate.toLocaleDateString('ar-EG')}\n\n`
              + `برجاء سرعة السداد. شكراً لتعاونك.`;
    window.open(`https://wa.me/${c.phone.startsWith('0')?'2'+c.phone:c.phone}?text=${encodeURIComponent(msg)}`);
}

function openCapModal() { document.getElementById('capDate').value = today; document.getElementById('capModal').classList.remove('hidden'); }
function saveCap() {
    const amt = Number(document.getElementById('capAmt').value);
    const type = document.getElementById('capType').value;
    capitalEntries.push({amount: type==='in'?amt:-amt, reason: document.getElementById('capReason').value, date: document.getElementById('capDate').value});
    save(); closeModal('capModal');
}

function openEdit(i) {
    activeIdx = i; const c = clients[i];
    document.getElementById('eName').value = c.name; document.getElementById('ePhone').value = c.phone;
    document.getElementById('eProduct').value = c.product; document.getElementById('ePrice').value = c.price;
    document.getElementById('eMonths').value = c.months; document.getElementById('eInterest').value = c.interest;
    document.getElementById('eRegDate').value = c.registrationDate;
    document.getElementById('editModal').classList.remove('hidden');
}

function saveEdit() {
    const c = clients[activeIdx];
    c.name = document.getElementById('eName').value; c.phone = document.getElementById('ePhone').value;
    c.product = document.getElementById('eProduct').value; c.price = Number(document.getElementById('ePrice').value);
    c.months = Number(document.getElementById('eMonths').value); c.interest = Number(document.getElementById('eInterest').value);
    c.registrationDate = document.getElementById('eRegDate').value;
    save(); closeModal('editModal');
}

function deleteClient(i) { if(confirm("حذف؟")) { clients.splice(i,1); save(); } }
function clearSafe() { if(confirm("تصفير الخزنة؟")) { cashSafe = 0; save(); } }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

window.onload = () => { document.getElementById('regDate').value = today; render(); };
</script>
</body>
</html>
