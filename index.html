<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض خالد خفاجي للتقسيط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --green: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        header { background: var(--dark); color: white; padding: 30px 10px; text-align: center; border-bottom: 3px solid var(--gold); }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 10px; object-fit: cover; }
        .search-section { background: white; padding: 20px; margin: -20px 20px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .search-section input { width: 80%; padding: 12px; border: 2px solid #ddd; border-radius: 25px; text-align: center; font-size: 16px; }
        .btn-search { background: var(--gold); color: black; border: none; padding: 10px 25px; border-radius: 25px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .product-img { width: 100%; height: 230px; object-fit: cover; }
        .product-info { padding: 15px; text-align: center; }
        .price-tag { color: var(--green); font-weight: bold; font-size: 1.2rem; }
        .btn-wa { background: #25D366; color: white; text-decoration: none; padding: 10px; border-radius: 8px; display: block; margin-top: 10px; font-weight: bold; }
        .admin-lock { position: fixed; bottom: 20px; left: 20px; background: var(--dark); color: var(--gold); border: 1px solid var(--gold); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 3000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: right; border-top: 5px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/h73L3V7m/74837.jpg" alt="Khalid Logo" class="logo-img">
    <h1>معرض خالد خفاجي</h1>
    <p style="color: var(--gold);">للتقسيط وخدمات المحمول</p>
</header>

<div class="search-section">
    <h3>استعلم عن أقساطك 💳</h3>
    <input type="tel" id="clientPhone" placeholder="أدخل رقم تليفونك المسجل">
    <button class="btn-search" onclick="checkInstallments()">بحث الآن</button>
</div>

<div class="container" id="productsGrid"></div>

<button class="admin-lock" onclick="adminLogin()"><i class="fas fa-cog"></i></button>

<div id="resultModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // سحب العروض
    onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snapshot) => {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        snapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.image}" class="product-img">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price-tag">كاش: ${p.price} ج.م</p>
                        <p>مقدم يبدأ من: ${p.downPayment} ج.م</p>
                        <a href="https://wa.me/201201550299?text=استفسار عن ${p.name}" class="btn-wa"><i class="fab fa-whatsapp"></i> اطلبه الآن</a>
                    </div>
                </div>`;
        });
    });

    // وظيفة الاستعلام
    window.checkInstallments = async function() {
        const phoneInput = document.getElementById('clientPhone').value.trim();
        if(!phoneInput) { alert("من فضلك أدخل رقم التليفون"); return; }

        const modal = document.getElementById('resultModal');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = "<div style='text-align:center'><i class='fas fa-spinner fa-spin'></i> جاري البحث...</div>";

        try {
            const q = query(collection(db, "clients"), where("phone", "==", phoneInput));
            const querySnapshot = await getDocs(q);
            let clientData = null;

            if (!querySnapshot.empty) {
                clientData = querySnapshot.docs[0].data();
            } else {
                // البحث في backup.json بعد تعديل الاسم
                const response = await fetch('backup.json');
                if (response.ok) {
                    const data = await response.json();
                    clientData = data.clients.find(c => String(c.phone).trim() === phoneInput);
                }
            }

            if(clientData) {
                const price = parseFloat(clientData.price) || 0;
                const interest = parseFloat(clientData.interest) || 0;
                const paid = parseFloat(clientData.paid) || 0;
                const total = price * (1 + interest);
                const remaining = total - paid;
                
                body.innerHTML = `
                    <h2 style="color:var(--gold); text-align:center">أهلاً بك يا ${clientData.name}</h2>
                    <hr><br>
                    <p>📦 المنتج: <b>${clientData.product || 'غير محدد'}</b></p>
                    <p>💰 الإجمالي بالفوائد: <b>${total.toLocaleString()} ج.م</b></p>
                    <p>✅ ما تم دفعه: <span style="color:green"><b>${paid.toLocaleString()} ج.م</b></span></p>
                    <p>⚠️ المتبقي عليك: <span style="color:red"><b>${remaining.toLocaleString()} ج.م</b></span></p>
                    <button onclick="document.getElementById('resultModal').style.display='none'" class="btn-search" style="width:100%; margin-top:20px">إغلاق</button>
                `;
            } else {
                body.innerHTML = `<h3>عفواً!</h3><p>الرقم ${phoneInput} غير مسجل.</p>
                <button onclick="document.getElementById('resultModal').style.display='none'" class="btn-search" style="width:100%">إغلاق</button>`;
            }
        } catch (error) {
            console.error(error);
            body.innerHTML = "<h3>خطأ!</h3><p>تأكد من وجود ملف backup.json على GitHub بنفس الاسم.</p>";
        }
    }

    window.adminLogin = function() {
        const p = prompt("كلمة مرور الإدارة:");
        if(p === "khalid1234") window.location.href = "admin.html";
    }

    window.onclick = function(event) {
        const modal = document.getElementById('resultModal');
        if (event.target == modal) modal.style.display = "none";
    }
</script>
</body>
</html>
