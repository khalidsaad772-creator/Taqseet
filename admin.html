<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - خالد خفاجي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma, Arial, sans-serif;background:#f0f8ff;padding:10px}
        .container{max-width:550px;margin:0 auto;background:white;border-radius:16px;padding:20px;box-shadow:0 6px 25px rgba(0,0,0,0.15)}
        h1{color:#28a745;text-align:center;margin:20px 0;font-size:26px}
        h2{color:#007bff;text-align:center;margin:15px 0;font-size:18px}
        input,button,select{width:100%;padding:14px;margin:8px 0;border:2px solid #28a745;border-radius:12px;font-size:16px;text-align:center}
        button{background:#28a745;color:#fff;font-weight:bold;cursor:pointer;transition:background .3s;border:none}
        .backup-btn{background:#ff9800!important}.restore-btn{background:#9c27b0!important}
        .capital-btn{background:#007bff!important}.safe-btn{background:#2e7d32!important}
        .btn{padding:8px 5px; margin:3px; font-size:13px; border-radius:8px; font-weight:bold; cursor:pointer; flex-basis: calc(25% - 6px); min-width: 65px; color:#fff; border:none}
        .action-content{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; align-items:center; padding:10px 0}
        .pay{background:#007bff}.wa{background:#25D366}.edit{background:#ffc107;color:#000}.del{background:#dc3545}.cam{background:#6f42c1}
        .result{background:#d4edda;color:#155524;padding:16px;border-radius:12px;margin:10px 0;text-align:center;font-size:18px;font-weight:bold}
        table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border:1px solid #ddd}
        th{background:#28a745;color:#fff;padding:8px}
        td{border:1px solid #ddd;padding:8px;text-align:center;background:#fff}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:2000}
        .modal-content{background:white;padding:20px;border-radius:16px;width:95%;max-width:400px;max-height:90vh;overflow-y:auto}
        .client-thumb{width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid #28a745;cursor:pointer}
    </style>
</head>
<body>

<div class="container">
    <h1>محل التقسيط 💰</h1>
    <input type="text" id="name" placeholder="* اسم العميل">
    <input type="text" id="phone" placeholder="* رقم التليفون">
    <input type="text" id="product" placeholder="وصف المنتج">
    <div style="display:flex; gap:5px">
        <input type="number" id="price" placeholder="* السعر">
        <input type="number" id="months" placeholder="* الشهور">
    </div>
    <input type="number" id="interest" placeholder="* الفائدة %">
    <input type="date" id="regDate">
    <button onclick="addClient()">إضافة عميل جديد</button>

    <div style="display:flex; gap:10px;">
        <button class="capital-btn" onclick="openModal('capitalModal'); displayCapitalEntries();" style="flex:1">إدارة رأس المال</button>
        <button class="safe-btn" onclick="openModal('safeModal'); displaySafeEntries();" style="flex:1">إدارة الخزنة</button>
    </div>
    
    <div style="display:flex; gap:10px; margin-top:10px">
        <button class="backup-btn" onclick="exportData()" style="flex:1">نسخة احتياطية 💾</button>
        <button class="restore-btn" onclick="document.getElementById('restoreInput').click()" style="flex:1">استعادة ♻️</button>
    </div>
    <input type="file" id="restoreInput" accept=".json" onchange="restoreData(event)" style="display:none">

    <h2>إجمالي أرباح الفائدة المتوقعة</h2>
    <div id="res" class="result">0 ج.م</div>
    <h2>إجمالي الربح الشهري الفعلي</h2>
    <div id="monthlyRes" class="result" style="background:#fff3cd; color:#856404;">0 ج.م</div>
    <h2>رصيد الخزنة الحالي 💵</h2>
    <div id="safeRes" class="result" style="background:#e8f5e9; color:#2e7d32; border: 2px dashed #28a745;">0 ج.م</div>

    <h2 id="clientsCount">العملاء (0)</h2>
    <div id="clientsTable"></div>
</div>

<div id="paymentModal" class="modal"><div class="modal-content">
    <h3>أقساط العميل</h3>
    <input id="paymentAmount" type="number" placeholder="المبلغ"><input id="paymentDate" type="date">
    <button onclick="addPayment()">تأكيد القسط</button>
    <div id="paymentsTable"></div>
    <button onclick="closeModal('paymentModal')" style="background:#dc3545">إغلاق</button>
</div></div>

<div id="capitalModal" class="modal"><div class="modal-content">
    <h3>إدارة رأس المال</h3>
    <select id="capType"><option value="in">إيداع (+)</option><option value="out">سحب (-)</option></select>
    <input id="capitalAmount" type="number" placeholder="المبلغ">
    <input id="capitalReason" type="text" placeholder="السبب">
    <input id="capitalDate" type="date">
    <button onclick="addCapitalEntry()">إضافة</button>
    <div id="capitalEntriesTable"></div>
    <button onclick="closeModal('capitalModal')" style="background:#dc3545">إغلاق</button>
</div></div>

<div id="safeModal" class="modal"><div class="modal-content">
    <h3>إدارة الخزنة يدوي</h3>
    <select id="safeEntryType"><option value="in">إيداع (+)</option><option value="out">سحب (-)</option></select>
    <input id="safeEntryAmount" type="number" placeholder="المبلغ">
    <input id="safeEntryReason" type="text" placeholder="السبب">
    <input id="safeEntryDate" type="date">
    <button onclick="addSafeManualEntry()">تسجيل الحركة</button>
    <div id="safeEntriesTable"></div>
    <button onclick="closeModal('safeModal')" style="background:#dc3545">إغلاق</button>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
    <h3>تعديل بيانات العميل</h3>
    <input id="editName"><input id="editPhone"><input id="editProduct">
    <input id="editPrice" type="number"><input id="editMonths" type="number">
    <input id="editInterest" type="number"><input id="editRegDate" type="date">
    <button onclick="saveClientEdit()">حفظ</button>
    <button onclick="closeModal('editModal')" style="background:#dc3545">إلغاء</button>
</div></div>

<div id="photoModal" class="modal"><div class="modal-content">
    <h3>صورة العميل</h3>
    <img id="previewImage" style="max-width:100%; border-radius:10px; display:none; margin-bottom:10px">
    <input type="file" id="photoInput" accept="image/*" onchange="loadPhoto(event)" style="display:none">
    <button onclick="document.getElementById('photoInput').click()">اختر صورة</button>
    <button onclick="savePhoto()" style="background:#28a745">حفظ</button>
    <button onclick="closeModal('photoModal')" style="background:#dc3545">إلغاء</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.syncToFirebase = async (client) => {
        try {
            await setDoc(doc(db, "clients", String(client.phone)), {
                name: client.name, phone: client.phone, product: client.product,
                price: client.price, interest: client.interest, paid: client.paid || 0,
                lastUpdate: new Date().toISOString()
            });
        } catch (e) { console.error("Firebase Error:", e); }
    };
    window.deleteFromFirebase = async (phone) => {
        try { await deleteDoc(doc(db, "clients", String(phone))); } catch (e) {}
    };
</script>

<script>
    let clients = JSON.parse(localStorage.getItem('clients') || '[]');
    let capitalEntries = JSON.parse(localStorage.getItem('capitalEntries') || '[]');
    let safeManualEntries = JSON.parse(localStorage.getItem('safeManualEntries') || '[]');
    let currentIndex = -1;
    let tempPhoto = null;
    const today = new Date().toISOString().split('T')[0];

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function save() {
        localStorage.setItem('clients', JSON.stringify(clients));
        localStorage.setItem('capitalEntries', JSON.stringify(capitalEntries));
        localStorage.setItem('safeManualEntries', JSON.stringify(safeManualEntries));
        showClients();
    }

    window.addClient = function() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if(!name || !phone) return alert("أكمل البيانات!");
        const c = {
            name, phone, product: document.getElementById('product').value,
            price: Number(document.getElementById('price').value),
            months: Number(document.getElementById('months').value),
            interest: Number(document.getElementById('interest').value)/100,
            paid: 0, payments: [], photo: null, registrationDate: document.getElementById('regDate').value || today
        };
        clients.push(c);
        save();
        if(window.syncToFirebase) window.syncToFirebase(c);
        ['name','phone','product','price','months','interest'].forEach(id => document.getElementById(id).value='');
    };

    function showClients() {
        let totalInt = 0, monthProf = 0, totalPaid = 0;
        const now = new Date();
        clients.forEach(c => {
            totalInt += (c.price * c.interest);
            totalPaid += (c.paid || 0);
            if(c.payments){
                const ratio = (c.interest) / (1 + c.interest);
                c.payments.forEach(p => {
                    const pd = new Date(p.date);
                    if(pd.getMonth() === now.getMonth() && pd.getFullYear() === now.getFullYear()) monthProf += (p.amount * ratio);
                });
            }
        });
        const safeBal = totalPaid + safeManualEntries.reduce((a,c)=>a+Number(c.amount),0);
        document.getElementById('res').innerText = Number(totalInt).toLocaleString() + ' ج.م';
        document.getElementById('monthlyRes').innerText = Number(monthProf).toLocaleString() + ' ج.م';
        document.getElementById('safeRes').innerText = Number(safeBal).toLocaleString() + ' ج.م';
        document.getElementById('clientsCount').innerText = `العملاء (${clients.length})`;
        
        let h = '<table><tr><th>العميل</th><th>متبقي</th><th>القسط</th></tr>';
        clients.forEach((c, i) => {
            const total = c.price * (1 + c.interest);
            const rem = total - (c.paid || 0);
            const installment = total / (c.months || 1);
            const img = c.photo ? `<img src="${c.photo}" class="client-thumb" onclick="openPhoto(${i})">` : `<div class="client-thumb" style="background:#ddd" onclick="openPhoto(${i})"></div>`;
            
            h += `<tr>
                <td style="display:flex; align-items:center; gap:5px; border:none">${img} <div>${c.name}<br><small>${c.phone}</small></div></td>
                <td style="color:red; font-weight:bold">${rem.toLocaleString()}</td>
                <td>${installment.toFixed(0)}</td>
            </tr>
            <tr><td colspan="3"><div class="action-content">
                <button class="btn pay" onclick="openPaymentModal(${i})">قسط</button>
                <button class="btn wa" onclick="sendWA(${i})">واتساب</button>
                <button class="btn edit" onclick="editClient(${i})">تعديل</button>
                <button class="btn del" onclick="deleteClient(${i})">حذف</button>
            </div></td></tr>`;
        });
        document.getElementById('clientsTable').innerHTML = h + '</table>';
    }

    // إدارة الأقساط
    window.openPaymentModal = (i) => { currentIndex = i; displayPayments(i); openModal('paymentModal'); };
    window.displayPayments = (i) => {
        let h = '<table><tr><th>المبلغ</th><th>التاريخ</th></tr>';
        (clients[i].payments || []).forEach(p => h += `<tr><td>${p.amount}</td><td>${p.date}</td></tr>`);
        document.getElementById('paymentsTable').innerHTML = h + '</table>';
    };
    window.addPayment = function() {
        const amt = Number(document.getElementById('paymentAmount').value);
        if(!amt) return;
        clients[currentIndex].payments.push({amount: amt, date: document.getElementById('paymentDate').value || today});
        clients[currentIndex].paid = (clients[currentIndex].paid || 0) + amt;
        save();
        if(window.syncToFirebase) window.syncToFirebase(clients[currentIndex]);
        displayPayments(currentIndex);
    };

    // واتساب
    window.sendWA = (i) => {
        const c = clients[i];
        const total = c.price * (1 + c.interest);
        const rem = total - (c.paid || 0);
        const text = `أهلاً يا ${c.name}, نذكرك ببيانات تقسيط ${c.product}: الإجمالي: ${total}, المدفوع: ${c.paid}, المتبقي: ${rem}. شكراً لتعاملك معنا.`;
        window.open(`https://wa.me/20${c.phone}?text=${encodeURIComponent(text)}`);
    };

    // إدارة رأس المال والخزنة
    window.displayCapitalEntries = () => {
        let h = '<table>';
        capitalEntries.forEach(e => h += `<tr><td>${e.amount}</td><td>${e.reason}</td></tr>`);
        document.getElementById('capitalEntriesTable').innerHTML = h + '</table>';
    };
    window.addCapitalEntry = function() {
        const amt = Number(document.getElementById('capitalAmount').value);
        const type = document.getElementById('capType').value;
        capitalEntries.push({amount: type==='in'?amt:-amt, reason: document.getElementById('capitalReason').value, date: document.getElementById('capitalDate').value || today});
        save(); displayCapitalEntries();
    };

    window.displaySafeEntries = () => {
        let h = '<table>';
        safeManualEntries.forEach(e => h += `<tr><td>${e.amount}</td><td>${e.reason}</td></tr>`);
        document.getElementById('safeEntriesTable').innerHTML = h + '</table>';
    };
    window.addSafeManualEntry = function() {
        const amt = Number(document.getElementById('safeEntryAmount').value);
        const type = document.getElementById('safeEntryType').value;
        safeManualEntries.push({amount: type==='in'?amt:-amt, reason: document.getElementById('safeEntryReason').value, date: document.getElementById('safeEntryDate').value || today});
        save(); displaySafeEntries();
    };

    // تعديل وحذف
    window.editClient = (i) => {
        currentIndex = i;
        const c = clients[i];
        document.getElementById('editName').value = c.name;
        document.getElementById('editPhone').value = c.phone;
        document.getElementById('editPrice').value = c.price;
        openModal('editModal');
    };
    window.saveClientEdit = function() {
        clients[currentIndex].name = document.getElementById('editName').value;
        clients[currentIndex].phone = document.getElementById('editPhone').value;
        save(); closeModal('editModal');
    };
    window.deleteClient = (i) => {
        if(confirm("حذف العميل نهائياً؟")) {
            const p = clients[i].phone;
            clients.splice(i,1);
            save();
            if(window.deleteFromFirebase) window.deleteFromFirebase(p);
        }
    };

    // استعادة البيانات (تعمل 100% الآن)
    window.restoreData = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            clients = data.clients || [];
            capitalEntries = data.capitalEntries || [];
            safeManualEntries = data.safeManualEntries || [];
            save();
            alert("تمت استعادة البيانات بنجاح!");
        };
        reader.readAsText(e.target.files[0]);
    };

    // الصور
    window.openPhoto = (i) => { currentIndex = i; openModal('photoModal'); };
    window.loadPhoto = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            tempPhoto = ev.target.result;
            document.getElementById('previewImage').src = tempPhoto;
            document.getElementById('previewImage').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    };
    window.savePhoto = () => { clients[currentIndex].photo = tempPhoto; save(); closeModal('photoModal'); };

    window.onload = () => { document.getElementById('regDate').value = today; showClients(); };
</script>
</body>
</html>
