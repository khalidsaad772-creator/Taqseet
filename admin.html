<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محل التقسيط - النسخة الاحترافية الشاملة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma, Arial, sans-serif;background:#f0f8ff;padding:10px}
.container{max-width:550px;margin:0 auto;background:white;border-radius:16px;padding:20px;box-shadow:0 6px 25px rgba(0,0,0,0.15)}
h1{color:#28a745;text-align:center;margin:20px 0;font-size:26px}
h2{color:#007bff;text-align:center;margin:15px 0;font-size:18px}
input,button,select{width:100%;padding:14px;margin:8px 0;border:2px solid #28a745;border-radius:12px;font-size:16px;text-align:center}
button{background:#28a745;color:#fff;font-weight:bold;cursor:pointer;transition:background .3s;border:none}
button:hover{background:#1e7e34}
.backup-btn{background:#ff9800!important}.restore-btn{background:#9c27b0!important}
.capital-btn{background:#007bff!important}
.safe-btn{background:#2e7d32!important}
.pdf-btn{background:#4CAF50!important; font-size: 14px!important; padding: 10px!important}
.btn{padding:8px 5px; margin:3px; font-size:13px; border-radius:8px; font-weight:bold; cursor:pointer; flex-basis: calc(25% - 6px); min-width: 65px; color:#fff; border:none}
.action-content{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; align-items:center; padding:10px 0}
.pay{background:#007bff}.wa{background:#25D366}.edit{background:#ffc107;color:#000}.del{background:#dc3545}.cam{background:#6f42c1}
.result{background:#d4edda;color:#155524;padding:16px;border-radius:12px;margin:10px 0;text-align:center;font-size:18px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border-radius:12px;overflow:hidden; border:1px solid #ddd}
th{background:#28a745;color:#fff;padding:12px; text-align:center}
td{border:1px solid #ddd;padding:10px;text-align:center;background:#fff}
.progress{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:8px;width:100%}
.bar{height:100%;background:#28a745;transition:width .6s}
.client-thumb{width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid #28a745; margin:0 5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal-content{background:white;padding:20px;border-radius:16px;width:95%;max-width:400px;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
    <h1>محل التقسيط 💰</h1>
    <input type="text" id="name" placeholder="* اسم العميل">
    <input type="text" id="phone" placeholder="* رقم التليفون">
    <input type="text" id="product" placeholder="وصف المنتج">
    <div style="display:flex; gap:5px">
        <input type="number" id="price" placeholder="* السعر">
        <input type="number" id="months" placeholder="* الشهور">
    </div>
    <input type="number" id="interest" placeholder="* الفائدة %">
    <input type="date" id="regDate">
    <button onclick="addClient()">إضافة عميل جديد</button>
    <button onclick="exportPDF()" style="background:#4CAF50">تقرير العملاء PDF 📄</button>

    <h2 style="color:#20B2AA">إدارة الأموال 💸</h2>
    <div style="display:flex; gap:10px;">
        <button class="capital-btn" onclick="openCapitalModal()" style="flex:1">إدارة رأس المال</button>
        <button class="safe-btn" onclick="openSafeModal()" style="flex:1">إدارة الخزنة</button>
    </div>
    <div style="display:flex; gap:10px; margin-top: 5px;">
        <button class="pdf-btn" onclick="exportCapitalPDF()" style="flex:1">تقرير رأس المال PDF</button>
        <button class="pdf-btn" onclick="exportSafePDF()" style="flex:1">تقرير الخزنة PDF</button>
    </div>

    <div style="display:flex; gap:10px; margin-top:10px">
        <button class="backup-btn" onclick="exportData()" style="flex:1">نسخة احتياطية 💾</button>
        <button class="restore-btn" onclick="document.getElementById('restoreInput').click()" style="flex:1">استعادة ♻️</button>
    </div>
    <input type="file" id="restoreInput" accept=".json" onchange="restoreData(event)" style="display:none">

    <h2>إجمالي رأس المال المسحوب 💰</h2>
    <div id="capitalRes" class="result" style="background:#ADD8E6; color:#0056b3;">0 ج.م</div>

    <h2>إجمالي أرباح الفائدة المتوقعة</h2>
    <div id="res" class="result">0 ج.م</div>

    <h2>إجمالي الربح الشهري الفعلي</h2>
    <div id="monthlyRes" class="result" style="background:#fff3cd; color:#856404;">0 ج.م</div>

    <h2>رصيد الخزنة الحالي 💵</h2>
    <div id="safeRes" class="result" style="background:#e8f5e9; color:#2e7d32; border: 2px dashed #28a745;">0 ج.م</div>

    <h2 id="clientsCount">العملاء (0)</h2>
    <div id="clientsTable"></div>
</div>

<!-- Modals نفس الأصلي -->
<div id="capitalModal" class="modal hidden"><div class="modal-content"> ... (كاملة زي الأصلي) </div></div>
<div id="safeModal" class="modal hidden"><div class="modal-content"> ... (كاملة) </div></div>
<div id="paymentModal" class="modal hidden"><div class="modal-content"> ... (كاملة) </div></div>
<div id="photoModal" class="modal hidden"><div class="modal-content"> ... (كاملة) </div></div>
<div id="editModal" class="modal hidden"><div class="modal-content"> ... (كاملة) </div></div>

<script type="module">
    // Firebase Setup
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* نفس الconfig */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.syncToFirebase = async (client) => {
        try {
            await setDoc(doc(db, "clients", String(client.phone)), {...client, lastUpdated: serverTimestamp()}, { merge: true });
        } catch (e) {}
    };
</script>

<script>
// باقي الكود النظيف والمُصلح...
let clients = [];
let capitalEntries = JSON.parse(localStorage.getItem('capitalEntries') || '[]');
let safeManualEntries = JSON.parse(localStorage.getItem('safeManualEntries') || '[]');
let currentIndex = -1;
let tempPhoto = null;
const today = new Date().toISOString().split('T')[0];

const formatCurrency = (n) => Number(n).toLocaleString('ar-EG') + ' ج.م';

function save() {
    localStorage.setItem('clients', JSON.stringify(clients));
    localStorage.setItem('capitalEntries', JSON.stringify(capitalEntries));
    localStorage.setItem('safeManualEntries', JSON.stringify(safeManualEntries));
    showClients();
}

async function loadData() {
    try {
        const snapshot = await getDocs(collection(db, "clients"));
        if (!snapshot.empty) {
            clients = [];
            snapshot.forEach(doc => clients.push(doc.data()));
            console.log("Loaded from Firebase");
        } else {
            clients = JSON.parse(localStorage.getItem('clients') || '[]');
        }
    } catch(e) {
        clients = JSON.parse(localStorage.getItem('clients') || '[]');
    }
    showClients();
}

function restoreData(e) {
    const reader = new FileReader();
    reader.onload = async (ev) => {
        try {
            const d = JSON.parse(ev.target.result);
            clients = d.clients || [];
            capitalEntries = d.capitalEntries || [];
            safeManualEntries = d.safeManualEntries || [];

            save();

            // رفع لـ Firebase
            for (let client of clients) {
                await window.syncToFirebase(client);
            }

            alert("✅ تمت الاستعادة بنجاح");
            document.getElementById('restoreInput').value = '';
        } catch(err) {
            alert("خطأ في استعادة الملف");
        }
    };
    reader.readAsText(e.target.files[0]);
}

// باقي الدوال (addClient, showClients, etc.) ...

window.onload = async () => {
    document.getElementById('regDate').value = today;
    await loadData();
};
</script>
</body>
</html>
