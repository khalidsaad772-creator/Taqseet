<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزامنة السحاب - معرض خالد</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 40px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; font-size: 14px; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155524; }
    </style>
</head>
<body>
    <div class="card">
        <h2>تحديث بيانات السحاب ☁️</h2>
        <input type="file" id="fileInput" accept=".json" style="margin: 20px 0;">
        <button id="uploadBtn">ابدأ الرفع الآن</button>
        <div id="status"></div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('uploadBtn').onclick = async () => {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        if (!fileInput.files[0]) return alert("اختار الملف يا خالد");

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                status.innerText = "جاري الإنقاذ والرفع... ⏳";

                // رفع العملاء بأي شكل موجودين بيه
                const clientsList = data.clients || (Array.isArray(data) ? data : []);
                
                if (Array.isArray(clientsList)) {
                    for (const client of clientsList) {
                        if (client.phone) {
                            await setDoc(doc(db, "clients", String(client.phone)), client);
                        }
                    }
                }

                // رفع الحسابات لو موجودة
                const adminData = {};
                if (data.capitalEntries) adminData.capitalEntries = data.capitalEntries;
                if (data.safeManualEntries) adminData.safeManualEntries = data.safeManualEntries;

                if (Object.keys(adminData).length > 0) {
                    await setDoc(doc(db, "admin_data", "finances"), adminData);
                }

                status.innerText = "تم الرفع بنجاح ✅ بياناتك بقت على السحاب ونقدر نفتحها من أي مكان.";
                alert("تمت المهمة! بياناتك في أمان يا بطل.");
            } catch (err) {
                console.error(err);
                alert("خطأ فني في قراءة الملف، ابعتلي أول سطر من ملف الباك اب وأنا أخلصها لك.");
            }
        };
        reader.readAsText(fileInput.files[0]);
    };
</script>

</body>
</html>
