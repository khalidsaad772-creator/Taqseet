<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مزامنة السحاب - معرض خالد</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 40px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; font-size: 14px; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155524; }
    </style>
</head>
<body>
    <div class="card">
        <h2>تحديث بيانات السحاب ☁️</h2>
        <input type="file" id="fileInput" accept=".json" style="margin: 20px 0;">
        <button id="uploadBtn">ابدأ الرفع الآن</button>
        <div id="status"></div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBs4516o79M6NqDPkiqBn2hlcWz6Fh5PQ4",
        authDomain: "taqseet-f4aaf.firebaseapp.com",
        projectId: "taqseet-f4aaf",
        storageBucket: "taqseet-f4aaf.firebasestorage.app",
        appId: "1:436609051568:web:8a6d40e2b08ddc2aad8475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة صغيرة للانتظار عشان المتصفح ما يهنجش
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    document.getElementById('uploadBtn').onclick = async () => {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        if (!fileInput.files[0]) return alert("اختار الملف يا خالد");

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                const clientsList = data.clients || [];
                status.innerText = "بدأنا عملية الرفع الشاملة... ⏳";

                let successCount = 0;
                let failCount = 0;

                for (let i = 0; i < clientsList.length; i++) {
                    const client = clientsList[i];
                    if (client.phone) {
                        try {
                            // محاولة رفع العميل بالكامل أولاً
                            await setDoc(doc(db, "clients", String(client.phone)), client);
                        } catch (err) {
                            // لو الحجم كبير (بسبب الصورة)، نرفعه من غير الصورة
                            const { photo, ...clientMin } = client;
                            await setDoc(doc(db, "clients", String(client.phone)), clientMin);
                        }
                        
                        successCount++;
                        status.innerText = `تم رفع ${successCount} عميل بنجاح...`;
                        
                        // ننتظر 50 مللي ثانية بين كل رفعة والتانية عشان السيرفر ما يرفضش
                        await sleep(50);
                    }
                }

                // رفع حسابات الخزنة ورأس المال
                const adminData = {};
                if (data.capitalEntries) adminData.capitalEntries = data.capitalEntries;
                if (data.safeManualEntries) adminData.safeManualEntries = data.safeManualEntries;
                if (Object.keys(adminData).length > 0) {
                    await setDoc(doc(db, "admin_data", "finances"), adminData);
                }

                status.innerText = `اكتملت المهمة! ✅ تم رفع ${successCount} عميل للسحاب.`;
                alert("تم رفع كافة البيانات للسحاب بنجاح.");

            } catch (err) {
                alert("خطأ عام: " + err.message);
            }
        };
        reader.readAsText(fileInput.files[0]);
    };
</script>



</body>
</html>
