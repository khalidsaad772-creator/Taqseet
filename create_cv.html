<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الاحترافية | ATS Friendly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Cairo', 'Inter', sans-serif;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        body.english-mode { direction: ltr; text-align: left; font-family: 'Inter', 'Cairo', sans-serif; }
        .app-container { max-width: 1500px; margin: 0 auto; }
        
        /* Language Switcher */
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 0.5rem; }
        .lang-btn {
            background: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px;
            font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: inline-flex; align-items: center; gap: 8px;
        }
        .lang-btn.active { background: #1e6f5c; color: white; }
        body.english-mode .lang-btn.active { background: #2c7da0; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.3rem; font-weight: 800; background: linear-gradient(135deg, #1f3b4c, #2c5a6e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; margin-bottom: 2rem; }
        .form-panel {
            background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.5rem; max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: #0f2b3b; font-size: 0.85rem; }
        input, textarea, select {
            width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0;
            border-radius: 18px; font-family: inherit; font-size: 0.9rem;
        }
        input:focus, textarea:focus { outline: none; border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.2); }
        .section-title { font-size: 1.2rem; font-weight: 700; margin: 1.2rem 0 0.8rem 0; padding-bottom: 0.3rem; border-bottom: 3px solid #2c7da0; display: inline-block; color: #1e4a6b; }
        .dynamic-item { background: #f8fafc; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #eef2f8; }
        .dynamic-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; color: #1e4a6b; cursor: pointer; margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 8px; }
        .add-btn:hover { background: #dfe7ff; }
        .template-selector { background: #f1f5f9; border-radius: 40px; padding: 0.2rem; display: flex; margin: 1rem 0 1.2rem 0; gap: 0.5rem; }
        .template-option { flex: 1; text-align: center; padding: 0.6rem; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .template-option.active { background: white; color: #1f6e8c; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        
        .preview-panel { background: #fefefe; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .preview-header { background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .download-btn { background: #1e6f5c; border: none; padding: 0.6rem 1.3rem; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; font-size: 0.85rem; }
        .download-btn:hover { background: #0f5a4a; }
        .ats-btn { background: #2c7da0; }
        .ats-btn:hover { background: #1a5a75; }
        
        .image-upload { margin-top: 1rem; padding: 1rem; background: #f0f9ff; border-radius: 20px; border: 1px dashed #2c7da0; }
        
        /* CV Preview Styles */
        .cv-preview { padding: 1.8rem; background: white; margin: 1rem; border-radius: 16px; width: 100%; font-size: 11pt; line-height: 1.5; }
        
        /* Template Styles */
        .template-modern .cv-header { text-align: center; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; }
        .template-modern .cv-name { font-size: 1.8rem; font-weight: 800; color: #1e4a6b; }
        .template-modern .section-title-preview { font-size: 1.1rem; font-weight: 800; border-right: 4px solid #2c7da0; padding-right: 0.7rem; margin: 1rem 0 0.6rem 0; color: #1e4a6b; }
        
        .template-elegant .cv-header { background: #2c3e4e; color: white; margin: -1.8rem -1.8rem 1.2rem -1.8rem; padding: 1.5rem 1.8rem; border-radius: 16px 16px 30px 30px; }
        .template-elegant .cv-name { font-size: 1.6rem; font-weight: 800; }
        .template-elegant .section-title-preview { font-size: 1rem; font-weight: 800; border-bottom: 2px solid #d4c2a7; display: inline-block; margin-bottom: 0.6rem; }
        
        .template-premium .premium-header { display: flex; align-items: center; gap: 1.5rem; background: linear-gradient(135deg, #1e4a6b, #2c7da0); color: white; padding: 1.5rem; margin: -1.8rem -1.8rem 1.5rem -1.8rem; border-radius: 16px 16px 30px 30px; }
        .template-premium .premium-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #ffd966; background: #f0f0f0; }
        .template-premium .premium-name { font-size: 1.8rem; font-weight: 800; }
        .template-premium .section-title-preview { font-size: 1.1rem; font-weight: 800; color: #1e4a6b; border-right: 4px solid #ffd966; padding-right: 0.7rem; margin: 1.2rem 0 0.6rem 0; }
        
        /* Common styles */
        .job-item { margin-bottom: 0.8rem; }
        .job-title { font-weight: 800; font-size: 0.95rem; }
        .skills-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .skill-tag { background: #eef2ff; padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; }
        
        /* PRINT STYLES FOR ATS COMPATIBILITY */
        @media print {
            body { background: white !important; padding: 0 !important; }
            .app-container > *:not(.dashboard), .form-panel, .preview-header, footer, .lang-switch { display: none !important; }
            .dashboard { display: block !important; margin: 0 !important; }
            .preview-panel { box-shadow: none !important; border-radius: 0 !important; margin: 0 !important; padding: 0 !important; }
            .cv-preview { margin: 0 !important; padding: 0 !important; width: 100% !important; border-radius: 0 !important; }
            .template-premium .premium-header, .skill-tag, .section-title-preview { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        @media (max-width: 950px) { .dashboard { grid-template-columns: 1fr; } }
        footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #556b82; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 9999; color: white; flex-direction: column; gap: 1rem; backdrop-filter: blur(3px); }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="lang-switch">
        <button id="langArBtn" class="lang-btn active"><i class="fas fa-language"></i> العربية</button>
        <button id="langEnBtn" class="lang-btn"><i class="fas fa-language"></i> English</button>
    </div>
    <div class="header">
        <h1 id="mainTitle">منشئ السيرة الذاتية الاحترافية</h1>
        <p id="subTitle">أنشئ سيرتك الذاتية مع قوالب مميزة ودعم كامل لنظام ATS</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-option active" id="tempModern">✨ عصري</div>
                <div data-template="elegant" class="template-option" id="tempElegant">💎 أنيق</div>
                <div data-template="premium" class="template-option" id="tempPremium">🌟 بريميوم</div>
            </div>
            
            <div class="image-upload" id="imageUploadSection" style="display: none;">
                <label><i class="fas fa-camera"></i> <span id="photoLabel">الصورة الشخصية</span></label>
                <input type="file" id="profileImage" accept="image/*">
            </div>
            
            <div class="form-group"><label id="fullNameLabel">الاسم الكامل</label><input type="text" id="fullName" value="Khalid Helmy Khafagy"></div>
            <div class="form-group"><label id="jobTitleLabel">المسمى الوظيفي</label><input type="text" id="jobTitle" value="Payroll Specialist"></div>
            <div class="form-group"><label id="emailLabel">البريد الإلكتروني</label><input type="email" id="email" value="khalid@example.com"></div>
            <div class="form-group"><label id="phoneLabel">رقم الهاتف</label><input type="text" id="phone" value="+201095890589"></div>
            <div class="form-group"><label id="locationLabel">العنوان</label><input type="text" id="location" value="Egypt"></div>
            <div class="form-group"><label id="linkedinLabel">LinkedIn</label><input type="text" id="linkedin" value="linkedin.com/in/khalid"></div>
            <div class="form-group"><label id="summaryLabel">نبذة شخصية</label><textarea id="summary" rows="3">Results-oriented Payroll Specialist with 15+ years of experience.</textarea></div>
            
            <span class="section-title" id="expTitle">الخبرات</span>
            <div id="experiencesContainer"></div>
            <button class="add-btn" id="addExperienceBtn"><i class="fas fa-plus"></i> <span id="addExpText">إضافة خبرة</span></button>
            
            <div style="margin-top:1rem;"><span class="section-title" id="eduTitle">التعليم</span></div>
            <div id="educationContainer"></div>
            <button class="add-btn" id="addEducationBtn"><i class="fas fa-plus"></i> <span id="addEduText">إضافة تعليم</span></button>
            
            <div class="form-group" style="margin-top:1rem;"><label id="skillsLabel">المهارات</label><input type="text" id="skills" value="SAP, Excel, Payroll, HRIS"></div>
            <div class="form-group"><label id="langsLabel">اللغات</label><input type="text" id="languages" value="Arabic, English"></div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3 id="previewTitle"><i class="fas fa-eye"></i> المعاينة</h3>
                <div style="display: flex; gap: 8px;">
                    <button id="downloadAtsBtn" class="download-btn ats-btn"><i class="fas fa-file-invoice"></i> <span id="atsBtnText">نسخة ATS (نصية)</span></button>
                    <button id="downloadPDFBtn" class="download-btn"><i class="fas fa-image"></i> <span id="downloadText">تحميل PDF (تصميم)</span></button>
                </div>
            </div>
            <div id="cvPreviewContainer" class="cv-preview template-modern"></div>
        </div>
    </div>
    <footer id="footerText">جميع الحقوق محفوظة - المنشئ يدعم التصدير النصي لضمان القراءة بواسطة الأنظمة الآلية</footer>
</div>

<script>
    let experiences = [{ title: "Senior Payroll Specialist", company: "Egypt Post", startDate: "2014", endDate: "Present", description: "Manage full-cycle payroll using SAP." }];
    let educations = [{ degree: "LL.B. Law", institution: "Cairo University", year: "2018", description: "Labor law specialist." }];
    let currentTemplate = "modern";
    let currentLang = "ar";
    let profileImageData = null;

    const fullNameInp = document.getElementById("fullName");
    const jobTitleInp = document.getElementById("jobTitle");
    const emailInp = document.getElementById("email");
    const phoneInp = document.getElementById("phone");
    const locationInp = document.getElementById("location");
    const linkedinInp = document.getElementById("linkedin");
    const summaryInp = document.getElementById("summary");
    const skillsInp = document.getElementById("skills");
    const languagesInp = document.getElementById("languages");
    const expContainer = document.getElementById("experiencesContainer");
    const eduContainer = document.getElementById("educationContainer");
    const cvPreview = document.getElementById("cvPreviewContainer");

    const trans = {
        ar: { expTitle: "الخبرات العملية", eduTitle: "التعليم", addExpText: "إضافة خبرة", addEduText: "إضافة تعليم", atsBtnText: "نسخة ATS (نصية)", downloadText: "تحميل PDF (تصميم)", summarySec: "نبذة شخصية", experienceSec: "الخبرات", educationSec: "التعليم", skillsSec: "المهارات", languagesSec: "اللغات" },
        en: { expTitle: "Work Experience", eduTitle: "Education", addExpText: "Add Experience", addEduText: "Add Education", atsBtnText: "ATS Version (Text)", downloadText: "Download PDF (Design)", summarySec: "Summary", experienceSec: "Experience", educationSec: "Education", skillsSec: "Skills", languagesSec: "Languages" }
    };

    function applyLanguage() {
        const t = trans[currentLang];
        document.getElementById("expTitle").innerText = t.expTitle;
        document.getElementById("eduTitle").innerText = t.eduTitle;
        document.getElementById("addExpText").innerText = t.addExpText;
        document.getElementById("addEduText").innerText = t.addEduText;
        document.getElementById("atsBtnText").innerText = t.atsBtnText;
        document.getElementById("downloadText").innerText = t.downloadText;
        document.body.className = currentLang === 'ar' ? '' : 'english-mode';
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        renderDynamicForms();
        updateCVPreview();
    }

    document.getElementById("profileImage").addEventListener("change", function(e) {
        const reader = new FileReader();
        reader.onload = e => { profileImageData = e.target.result; updateCVPreview(); };
        if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    });

    function renderDynamicForms() {
        expContainer.innerHTML = experiences.map((exp, i) => `
            <div class="dynamic-item">
                <div class="dynamic-item-header"><strong>خبرة ${i+1}</strong><button class="remove-btn" onclick="removeExp(${i})"><i class="fas fa-trash"></i></button></div>
                <input class="exp-title" value="${exp.title}" placeholder="المسمى">
                <input class="exp-company" value="${exp.company}" placeholder="الشركة">
                <textarea class="exp-desc" rows="2">${exp.description}</textarea>
            </div>`).join('');
        
        eduContainer.innerHTML = educations.map((edu, i) => `
            <div class="dynamic-item">
                <div class="dynamic-item-header"><strong>تعليم ${i+1}</strong><button class="remove-btn" onclick="removeEdu(${i})"><i class="fas fa-trash"></i></button></div>
                <input class="edu-degree" value="${edu.degree}">
                <input class="edu-institution" value="${edu.institution}">
            </div>`).join('');
        
        document.querySelectorAll(".dynamic-item input, .dynamic-item textarea").forEach(el => el.oninput = syncData);
    }

    function removeExp(i) { experiences.splice(i,1); renderDynamicForms(); updateCVPreview(); }
    function removeEdu(i) { educations.splice(i,1); renderDynamicForms(); updateCVPreview(); }

    function syncData() {
        experiences = Array.from(document.querySelectorAll("#experiencesContainer .dynamic-item")).map(item => ({
            title: item.querySelector(".exp-title").value,
            company: item.querySelector(".exp-company").value,
            description: item.querySelector(".exp-desc").value,
            startDate: "", endDate: ""
        }));
        educations = Array.from(document.querySelectorAll("#educationContainer .dynamic-item")).map(item => ({
            degree: item.querySelector(".edu-degree").value,
            institution: item.querySelector(".edu-institution").value,
            year: "", description: ""
        }));
        updateCVPreview();
    }

    function updateCVPreview() {
        const t = trans[currentLang];
        const data = {
            name: fullNameInp.value, title: jobTitleInp.value, email: emailInp.value,
            phone: phoneInp.value, loc: locationInp.value, link: linkedinInp.value,
            sum: summaryInp.value, skills: skillsInp.value.split(','), langs: languagesInp.value
        };

        let html = '';
        if(currentTemplate === "premium") {
            html = `<div class="template-premium">
                <div class="premium-header">
                    ${profileImageData ? `<img src="${profileImageData}" class="premium-avatar">` : '<div class="premium-avatar"></div>'}
                    <div><h2>${data.name}</h2><p>${data.title}</p></div>
                </div>
                <div class="section-title-preview">${t.summarySec}</div><p>${data.sum}</p>
                <div class="section-title-preview">${t.experienceSec}</div>${experiences.map(e => `<div><strong>${e.title}</strong> - ${e.company}<br>${e.description}</div>`).join('')}
                <div class="section-title-preview">${t.skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
            </div>`;
        } else {
            html = `<div class="template-modern">
                <div class="cv-header"><h1>${data.name}</h1><p>${data.title}</p></div>
                <p><strong>Email:</strong> ${data.email} | <strong>Phone:</strong> ${data.phone}</p>
                <div class="section-title-preview">${t.summarySec}</div><p>${data.sum}</p>
                <div class="section-title-preview">${t.experienceSec}</div>${experiences.map(e => `<div><strong>${e.title}</strong> @ ${e.company}<p>${e.description}</p></div>`).join('')}
                <div class="section-title-preview">${t.educationSec}</div>${educations.map(e => `<div><strong>${e.degree}</strong> - ${e.institution}</div>`).join('')}
                <div class="section-title-preview">${t.skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
            </div>`;
        }
        cvPreview.innerHTML = html;
        cvPreview.className = `cv-preview template-${currentTemplate}`;
    }

    // وظيفة التحميل لنسخة الـ ATS (نصية بالكامل)
    function downloadAtsFriendly() {
        const originalTitle = document.title;
        document.title = `CV_ATS_${fullNameInp.value.replace(/\s/g, '_')}`;
        window.print();
        document.title = originalTitle;
    }

    // وظيفة التحميل لنسخة التصميم (صورة داخل PDF)
    async function downloadDesignPDF() {
        const loading = document.createElement('div');
        loading.className = 'loading-overlay';
        loading.innerHTML = '<div class="spinner"></div><div>جاري المعالجة...</div>';
        document.body.appendChild(loading);
        
        const canvas = await html2canvas(cvPreview, { scale: 2, useCORS: true });
        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const pdf = new jspdf.jsPDF();
        pdf.addImage(imgData, 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`CV_Design_${fullNameInp.value}.pdf`);
        document.body.removeChild(loading);
    }

    document.getElementById("addExperienceBtn").onclick = () => { experiences.push({title:"",company:"",description:""}); renderDynamicForms(); };
    document.getElementById("addEducationBtn").onclick = () => { educations.push({degree:"",institution:""}); renderDynamicForms(); };
    document.querySelectorAll(".template-option").forEach(opt => opt.onclick = () => {
        document.querySelectorAll(".template-option").forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        currentTemplate = opt.dataset.template;
        document.getElementById("imageUploadSection").style.display = currentTemplate === "premium" ? "block" : "none";
        updateCVPreview();
    });

    document.getElementById("downloadAtsBtn").onclick = downloadAtsFriendly;
    document.getElementById("downloadPDFBtn").onclick = downloadDesignPDF;
    document.getElementById("langArBtn").onclick = () => { currentLang = "ar"; applyLanguage(); };
    document.getElementById("langEnBtn").onclick = () => { currentLang = "en"; applyLanguage(); };

    fullNameInp.oninput = jobTitleInp.oninput = emailInp.oninput = phoneInp.oninput = summaryInp.oninput = skillsInp.oninput = updateCVPreview;

    applyLanguage();
</script>
</body>
</html>
