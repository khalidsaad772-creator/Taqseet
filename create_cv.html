<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder | Text-based PDF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #1e4a6b; font-size: 28px; }
        .header p { color: #556b82; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        
        .form-panel {
            background: white; border-radius: 20px; padding: 20px;
            max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 13px; color: #1e4a6b; }
        input, textarea {
            width: 100%; padding: 10px 15px; border: 1px solid #ddd;
            border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px;
        }
        input:focus, textarea:focus { outline: none; border-color: #2c7da0; }
        
        .section-title { font-size: 18px; font-weight: 800; border-bottom: 3px solid #2c7da0; display: inline-block; margin: 15px 0 10px 0; }
        
        .dynamic-item { background: #f8fafc; border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 8px 18px; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 5px; display: inline-flex; align-items: center; gap: 8px; }
        
        .template-selector { display: flex; gap: 10px; margin: 15px 0; background: #f1f5f9; padding: 5px; border-radius: 50px; }
        .template-opt { flex: 1; text-align: center; padding: 8px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .template-opt.active { background: white; color: #1f6e8c; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        
        .preview-panel {
            background: white; border-radius: 20px; box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .preview-header {
            padding: 15px 20px; border-bottom: 1px solid #e9edf2;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            background: white;
        }
        .download-btn {
            background: #1e6f5c; border: none; padding: 8px 20px; border-radius: 30px;
            color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .download-btn:hover { background: #0f5a4a; }
        
        .cv-preview {
            padding: 25px; background: white; margin: 15px; border-radius: 16px;
        }
        .template-modern .cv-name { font-size: 26px; font-weight: 800; color: #1e4a6b; text-align: center; }
        .template-modern .cv-title { text-align: center; color: #2c7da0; font-weight: 600; }
        .template-modern .section-preview-title { font-size: 18px; font-weight: 800; border-left: 4px solid #2c7da0; padding-left: 10px; margin: 20px 0 10px 0; }
        
        .template-elegant .elegant-header { background: #2c3e4e; color: white; padding: 20px; margin: -25px -25px 20px -25px; border-radius: 16px 16px 30px 30px; }
        .template-elegant .section-preview-title { font-weight: 800; border-bottom: 2px solid #d4c2a7; display: inline-block; margin: 15px 0 8px 0; }
        
        .template-sidebar { display: grid; grid-template-columns: 0.9fr 2.1fr; gap: 20px; }
        .template-sidebar .sidebar-col { background: #eef3fa; padding: 15px; border-radius: 16px; }
        .template-sidebar .section-preview-title { font-weight: 800; border-bottom: 2px solid #cbd5e1; margin: 15px 0 8px 0; }
        
        .job-item { margin-bottom: 15px; }
        .job-title { font-weight: 800; }
        .job-date { font-size: 12px; color: #5b6e8c; }
        .job-desc { font-size: 13px; white-space: pre-line; margin-top: 5px; }
        .skills-badge { display: inline-block; background: #eef2ff; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 3px; }
        
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        footer { text-align: center; margin-top: 30px; font-size: 12px; color: #556b82; }
        
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 9999; color: white; flex-direction: column; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: #1e6f5c; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-file-alt"></i> Professional CV Builder</h1>
        <p>Enter your data, choose your template, and download a text-based PDF (selectable text)</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-opt active">✨ Modern</div>
                <div data-template="elegant" class="template-opt">💎 Elegant</div>
                <div data-template="sidebar" class="template-opt">📐 Sidebar</div>
            </div>

            <div class="form-group"><label><i class="fas fa-user"></i> Full Name</label><input type="text" id="inputName" value="Khalid Helmy Khafagy"></div>
            <div class="form-group"><label><i class="fas fa-briefcase"></i> Job Title</label><input type="text" id="inputJob" value="Payroll & HRIS Specialist | SAP & Oracle Expert"></div>
            <div class="form-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" id="inputEmail" value="khalid.helmy@example.com"></div>
            <div class="form-group"><label><i class="fas fa-phone"></i> Phone</label><input type="text" id="inputPhone" value="+201095890589"></div>
            <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> Location</label><input type="text" id="inputLocation" value="Cairo, Egypt"></div>
            <div class="form-group"><label><i class="fab fa-linkedin"></i> LinkedIn</label><input type="text" id="inputLinkedin" value="linkedin.com/in/khalid-helmy"></div>
            <div class="form-group"><label><i class="fas fa-align-left"></i> Professional Summary</label><textarea id="inputSummary" rows="3">Results-oriented Payroll Specialist with over 15 years of experience managing end-to-end payroll for large-scale government-sector workforces. LL.B. background combined with technical mastery of SAP and Oracle Payroll ensures 100% compliance with Egyptian labor law, social insurance, and tax regulations.</textarea></div>

            <div><span class="section-title">Work Experience</span></div>
            <div id="expList"></div>
            <button id="addExpBtn" class="add-btn"><i class="fas fa-plus"></i> Add Experience</button>

            <div><span class="section-title">Education</span></div>
            <div id="eduList"></div>
            <button id="addEduBtn" class="add-btn"><i class="fas fa-plus"></i> Add Education</button>

            <div class="form-group"><label><i class="fas fa-code"></i> Skills (comma separated)</label><input type="text" id="inputSkills" value="HRIS, Advanced Excel, SAP, Oracle, Adobe Creative Suite"></div>
            <div class="form-group"><label><i class="fas fa-language"></i> Languages</label><input type="text" id="inputLangs" value="Arabic (Native), English (Professional Working Proficiency)"></div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3><i class="fas fa-eye"></i> CV Preview</h3>
                <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> Download PDF (Selectable Text)</button>
            </div>
            <div id="cvPreview" class="cv-preview template-modern"></div>
        </div>
    </div>
    <footer>The PDF is text-based (selectable/copyable) and fills the entire A4 page perfectly</footer>
</div>

<script>
    // Default data
    let experiences = [
        { title: "Senior Payroll Specialist", company: "Egypt Post", startDate: "2014", endDate: "Present", desc: "• Manage full-cycle payroll for 1,200+ employees using SAP and Oracle with 99.9% accuracy\n• Reduced payroll processing time by 30% through automation\n• Ensure 100% compliance on social insurance and tax filings\n• Maintain employee records across ERP platforms\n• Generate financial and HR reports to support audits\n• Resolved 50+ system tickets annually" }
    ];
    let educations = [
        { degree: "LL.B. (Bachelor of Laws)", institution: "Cairo University", year: "2018", desc: "Background in Egyptian labor law and legal compliance" }
    ];

    let currentTemplate = "modern";

    const cvDiv = document.getElementById("cvPreview");
    const expContainer = document.getElementById("expList");
    const eduContainer = document.getElementById("eduList");

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function renderForms() {
        expContainer.innerHTML = "";
        experiences.forEach((exp, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="item-header"><strong>Experience ${idx+1}</strong><button class="remove-btn" data-exp="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" id="exp_title_${idx}" value="${escapeHtml(exp.title)}" placeholder="Job Title" style="margin-bottom:8px; width:100%;">
                <input type="text" id="exp_company_${idx}" value="${escapeHtml(exp.company)}" placeholder="Company" style="margin-bottom:8px; width:100%;">
                <input type="text" id="exp_start_${idx}" value="${escapeHtml(exp.startDate)}" placeholder="Start Date" style="width:48%; display:inline-block;">
                <input type="text" id="exp_end_${idx}" value="${escapeHtml(exp.endDate)}" placeholder="End Date" style="width:48%; display:inline-block;">
                <textarea id="exp_desc_${idx}" rows="3" placeholder="Description" style="width:100%; margin-top:8px;">${escapeHtml(exp.desc)}</textarea>
            `;
            expContainer.appendChild(div);
            
            document.getElementById(`exp_title_${idx}`).addEventListener('input', (e) => { experiences[idx].title = e.target.value; updatePreview(); });
            document.getElementById(`exp_company_${idx}`).addEventListener('input', (e) => { experiences[idx].company = e.target.value; updatePreview(); });
            document.getElementById(`exp_start_${idx}`).addEventListener('input', (e) => { experiences[idx].startDate = e.target.value; updatePreview(); });
            document.getElementById(`exp_end_${idx}`).addEventListener('input', (e) => { experiences[idx].endDate = e.target.value; updatePreview(); });
            document.getElementById(`exp_desc_${idx}`).addEventListener('input', (e) => { experiences[idx].desc = e.target.value; updatePreview(); });
        });
        
        eduContainer.innerHTML = "";
        educations.forEach((edu, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="item-header"><strong>Education ${idx+1}</strong><button class="remove-btn" data-edu="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" id="edu_degree_${idx}" value="${escapeHtml(edu.degree)}" placeholder="Degree" style="margin-bottom:8px; width:100%;">
                <input type="text" id="edu_institution_${idx}" value="${escapeHtml(edu.institution)}" placeholder="Institution" style="margin-bottom:8px; width:100%;">
                <input type="text" id="edu_year_${idx}" value="${escapeHtml(edu.year)}" placeholder="Year" style="margin-bottom:8px; width:100%;">
                <textarea id="edu_desc_${idx}" rows="2" placeholder="Notes" style="width:100%;">${escapeHtml(edu.desc)}</textarea>
            `;
            eduContainer.appendChild(div);
            
            document.getElementById(`edu_degree_${idx}`).addEventListener('input', (e) => { educations[idx].degree = e.target.value; updatePreview(); });
            document.getElementById(`edu_institution_${idx}`).addEventListener('input', (e) => { educations[idx].institution = e.target.value; updatePreview(); });
            document.getElementById(`edu_year_${idx}`).addEventListener('input', (e) => { educations[idx].year = e.target.value; updatePreview(); });
            document.getElementById(`edu_desc_${idx}`).addEventListener('input', (e) => { educations[idx].desc = e.target.value; updatePreview(); });
        });
        
        document.querySelectorAll("[data-exp]").forEach(btn => { btn.addEventListener('click', (e) => { experiences.splice(parseInt(btn.dataset.exp), 1); renderForms(); updatePreview(); }); });
        document.querySelectorAll("[data-edu]").forEach(btn => { btn.addEventListener('click', (e) => { educations.splice(parseInt(btn.dataset.education), 1); renderForms(); updatePreview(); }); });
    }
    
    function updatePreview() {
        const name = document.getElementById("inputName").value;
        const job = document.getElementById("inputJob").value;
        const email = document.getElementById("inputEmail").value;
        const phone = document.getElementById("inputPhone").value;
        const location = document.getElementById("inputLocation").value;
        const linkedin = document.getElementById("inputLinkedin").value;
        const summaryText = document.getElementById("inputSummary").value;
        const skillsArr = document.getElementById("inputSkills").value.split(',').map(s=>s.trim());
        const langs = document.getElementById("inputLangs").value;
        
        if (currentTemplate === "sidebar") {
            cvDiv.innerHTML = `<div class="template-sidebar">
                <div class="sidebar-col">
                    <div style="font-weight:800; font-size:18px;">${escapeHtml(name)}</div>
                    <div style="color:#2c7da0;">${escapeHtml(job)}</div><hr>
                    <div><i class="fas fa-envelope"></i> ${escapeHtml(email)}</div>
                    <div><i class="fas fa-phone"></i> ${escapeHtml(phone)}</div>
                    <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(location)}</div>
                    ${linkedin ? `<div><i class="fab fa-linkedin"></i> ${escapeHtml(linkedin)}</div>` : ''}<hr>
                    <div><strong>Skills</strong><br>${skillsArr.map(s => `• ${escapeHtml(s)}`).join('<br>')}</div><hr>
                    <div><strong>Languages</strong><br>${escapeHtml(langs)}</div>
                </div>
                <div class="main-col">
                    <div><div class="section-preview-title">Summary</div><p>${escapeHtml(summaryText)}</p></div>
                    <div><div class="section-preview-title">Work Experience</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.desc)}</p></div><br/>`).join('')}</div>
                    <div><div class="section-preview-title">Education</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div><br/>`).join('')}</div>
                </div>
            </div>`;
            cvDiv.className = "cv-preview template-sidebar";
        } 
        else if (currentTemplate === "modern") {
            cvDiv.innerHTML = `<div class="cv-name">${escapeHtml(name)}</div><div class="cv-title">${escapeHtml(job)}</div>
            <div style="text-align:center; font-size:13px; margin:10px 0;"><i class="fas fa-envelope"></i> ${escapeHtml(email)} | <i class="fas fa-phone"></i> ${escapeHtml(phone)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(location)} ${linkedin ? `| <i class="fab fa-linkedin"></i> ${escapeHtml(linkedin)}` : ''}</div>
            <div><div class="section-preview-title">Summary</div><p>${escapeHtml(summaryText)}</p></div>
            <div><div class="section-preview-title">Work Experience</div>${experiences.map(exp => `<div class="job-item"><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><div class="job-desc">${escapeHtml(exp.desc)}</div></div>`).join('')}</div>
            <div><div class="section-preview-title">Education</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div>`).join('')}</div>
            <div><div class="section-preview-title">Skills</div>${skillsArr.map(s => `<span class="skills-badge">${escapeHtml(s)}</span>`).join('')}</div>
            <div><div class="section-preview-title">Languages</div><p>${escapeHtml(langs)}</p></div>`;
            cvDiv.className = "cv-preview template-modern";
        }
        else {
            cvDiv.innerHTML = `<div class="elegant-header"><div style="font-size:24px; font-weight:800;">${escapeHtml(name)}</div><div>${escapeHtml(job)}</div><div style="font-size:12px;">${escapeHtml(email)} | ${escapeHtml(phone)} | ${escapeHtml(location)}</div></div>
            <div><div class="section-preview-title">Summary</div><p>${escapeHtml(summaryText)}</p></div>
            <div><div class="section-preview-title">Work Experience</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.desc)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-preview-title">Education</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-preview-title">Skills</div>${skillsArr.map(s => `<span class="skills-badge">${escapeHtml(s)}</span>`).join('')}</div>
            <div><div class="section-preview-title">Languages</div><p>${escapeHtml(langs)}</p></div>`;
            cvDiv.className = "cv-preview template-elegant";
        }
    }
    
    document.getElementById("addExpBtn").onclick = () => { experiences.push({ title: "New Role", company: "Company Name", startDate: "2024", endDate: "Present", desc: "" }); renderForms(); updatePreview(); };
    document.getElementById("addEduBtn").onclick = () => { educations.push({ degree: "Bachelor's Degree", institution: "University Name", year: "2024", desc: "" }); renderForms(); updatePreview(); };
    
    document.querySelectorAll(".template-opt").forEach(opt => { opt.onclick = () => { document.querySelectorAll(".template-opt").forEach(o => o.classList.remove('active')); opt.classList.add('active'); currentTemplate = opt.dataset.template; updatePreview(); }; });
    
    const inputIds = ["inputName", "inputJob", "inputEmail", "inputPhone", "inputLocation", "inputLinkedin", "inputSummary", "inputSkills", "inputLangs"];
    inputIds.forEach(id => { document.getElementById(id).addEventListener('input', () => updatePreview()); });
    
    // ===================== English PDF - Perfect A4 Text-based =====================
    document.getElementById("downloadBtn").onclick = async () => {
        const loader = document.createElement('div'); loader.className = 'loading'; loader.innerHTML = '<div class="spinner"></div><div>Generating PDF...</div>'; document.body.appendChild(loader);
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            
            const name = document.getElementById("inputName").value;
            const job = document.getElementById("inputJob").value;
            const email = document.getElementById("inputEmail").value;
            const phone = document.getElementById("inputPhone").value;
            const location = document.getElementById("inputLocation").value;
            const linkedin = document.getElementById("inputLinkedin").value;
            const summaryText = document.getElementById("inputSummary").value;
            const skillsArr = document.getElementById("inputSkills").value.split(',').map(s=>s.trim());
            const langs = document.getElementById("inputLangs").value;
            
            let y = 25;
            const leftMargin = 20;
            const pageHeight = 297;
            
            // Name
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(24);
            pdf.text(name, leftMargin, y);
            y += 10;
            
            // Job Title
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(14);
            pdf.text(job, leftMargin, y);
            y += 8;
            
            // Contact
            pdf.setFontSize(10);
            let contactLine = `${email}  |  ${phone}  |  ${location}`;
            pdf.text(contactLine, leftMargin, y);
            y += 5;
            if (linkedin) {
                pdf.text(`LinkedIn: ${linkedin}`, leftMargin, y);
                y += 5;
            }
            y += 8;
            
            // Summary
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(14);
            pdf.text("Professional Summary", leftMargin, y);
            y += 7;
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(10);
            const summaryLines = pdf.splitTextToSize(summaryText, 170);
            pdf.text(summaryLines, leftMargin, y);
            y += (summaryLines.length * 5) + 8;
            
            // Work Experience
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(14);
            pdf.text("Work Experience", leftMargin, y);
            y += 7;
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(10);
            for (let exp of experiences) {
                const expTitle = `${exp.title} | ${exp.company} (${exp.startDate} - ${exp.endDate})`;
                pdf.setFont("helvetica", "bold");
                pdf.text(expTitle, leftMargin, y);
                y += 5;
                pdf.setFont("helvetica", "normal");
                const descLines = pdf.splitTextToSize(exp.desc, 170);
                pdf.text(descLines, leftMargin, y);
                y += (descLines.length * 4.5) + 6;
                if (y > 270) { pdf.addPage(); y = 20; }
            }
            
            // Education
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(14);
            pdf.text("Education", leftMargin, y);
            y += 7;
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(10);
            for (let edu of educations) {
                const eduTitle = `${edu.degree} - ${edu.institution} (${edu.year})`;
                pdf.text(eduTitle, leftMargin, y);
                y += 5;
                const eduLines = pdf.splitTextToSize(edu.desc, 170);
                pdf.text(eduLines, leftMargin, y);
                y += (eduLines.length * 4.5) + 6;
                if (y > 270) { pdf.addPage(); y = 20; }
            }
            
            // Skills
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(14);
            pdf.text("Skills", leftMargin, y);
            y += 7;
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(10);
            const skillsText = skillsArr.join('  •  ');
            const skillsLines = pdf.splitTextToSize(skillsText, 170);
            pdf.text(skillsLines, leftMargin, y);
            y += (skillsLines.length * 5) + 8;
            
            // Languages
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(14);
            pdf.text("Languages", leftMargin, y);
            y += 7;
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(10);
            pdf.text(langs, leftMargin, y);
            
            pdf.save(`CV_${name.replace(/\s/g, '_')}.pdf`);
            
        } catch (err) { console.error(err); alert("Error creating PDF"); }
        finally { document.body.removeChild(loader); }
    };
    
    renderForms();
    updatePreview();
</script>
</body>
</html>
