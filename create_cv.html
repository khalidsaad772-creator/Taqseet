<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الاحترافية | Professional CV Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2c7da0;
            --primary-dark: #1e4a6b;
            --secondary: #1e6f5c;
            --bg-gradient: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-gradient);
            font-family: 'Cairo', sans-serif;
            padding: 1.5rem;
            transition: all 0.2s;
            color: #2d3436;
        }

        body.english-mode { direction: ltr; text-align: left; font-family: 'Inter', 'Cairo', sans-serif; }
        .app-container { max-width: 1500px; margin: 0 auto; }
        
        /* Language Switcher */
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 0.5rem; }
        .lang-btn {
            background: white; border: none; padding: 0.6rem 1.4rem; border-radius: 40px;
            font-weight: 700; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .lang-btn.active { background: var(--secondary); color: white; }
        body.english-mode .lang-btn.active { background: var(--primary); }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #1f3b4c, #2c7da0); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .header p { color: #636e72; font-weight: 500; }

        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; margin-bottom: 2rem; }
        
        /* Form Panel */
        .form-panel {
            background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 2rem; max-height: 85vh; overflow-y: auto;
        }

        .template-selector { background: #f1f5f9; border-radius: 40px; padding: 0.3rem; display: flex; margin-bottom: 1.5rem; gap: 0.5rem; }
        .template-option { flex: 1; text-align: center; padding: 0.7rem; border-radius: 40px; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 0.85rem; }
        .template-option.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }

        .image-upload { margin-bottom: 1.5rem; padding: 1.2rem; background: #f0f9ff; border-radius: 20px; border: 2px dashed #2c7da0; text-align: center; }
        
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--primary-dark); font-size: 0.9rem; }
        label i { margin-left: 8px; color: var(--primary); width: 20px; text-align: center; }
        body.english-mode label i { margin-left: 0; margin-right: 8px; }

        input, textarea {
            width: 100%; padding: 0.8rem 1.2rem; border: 1.5px solid #e2e8f0;
            border-radius: 15px; font-family: inherit; font-size: 0.95rem; transition: 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(44,125,160,0.1); }

        .section-title { font-size: 1.3rem; font-weight: 800; margin: 1.5rem 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 3px solid var(--primary); display: inline-block; color: var(--primary-dark); }
        
        .dynamic-item { background: #f8fafc; border-radius: 22px; padding: 1.5rem; margin-bottom: 1.2rem; border: 1px solid #eef2f8; position: relative; }
        .remove-btn { position: absolute; top: 15px; left: 15px; background: #fee2e2; border: none; color: #b91c1c; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        body.english-mode .remove-btn { left: auto; right: 15px; }
        .remove-btn:hover { background: #fecaca; transform: scale(1.1); }
        
        .add-btn { background: #eef2ff; border: none; padding: 0.7rem 1.5rem; border-radius: 40px; font-weight: 700; color: var(--primary-dark); cursor: pointer; margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .add-btn:hover { background: #dfe7ff; }

        /* Preview Panel */
        .preview-panel { background: #fefefe; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .preview-header { background: white; padding: 1.2rem 1.5rem; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .download-group { display: flex; gap: 10px; }
        
        .download-btn { border: none; padding: 0.7rem 1.4rem; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 0.85rem; }
        .btn-design { background: var(--secondary); }
        .btn-design:hover { background: #0f5a4a; transform: translateY(-2px); }
        .btn-ats { background: var(--primary); }
        .btn-ats:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* CV Content Styles */
        .cv-preview { padding: 2rem; background: white; margin: 1rem; border-radius: 12px; width: 100%; min-height: 297mm; }
        
        /* Modern Template */
        .template-modern .cv-header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .template-modern .cv-name { font-size: 2.2rem; font-weight: 800; color: var(--primary-dark); }
        .template-modern .section-title-preview { font-size: 1.2rem; font-weight: 800; color: var(--primary); border-right: 5px solid var(--primary); padding-right: 10px; margin: 1.5rem 0 0.8rem 0; }
        body.english-mode .template-modern .section-title-preview { border-right: none; border-left: 5px solid var(--primary); padding-left: 10px; }

        /* Premium Template */
        .template-premium .premium-header { display: flex; align-items: center; gap: 2rem; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 2rem; margin: -2rem -2rem 1.5rem -2rem; border-radius: 0 0 40px 40px; }
        .premium-avatar { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid #ffd966; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .premium-info h2 { font-size: 2rem; font-weight: 900; }
        .template-premium .section-title-preview { font-size: 1.2rem; font-weight: 800; color: var(--primary-dark); border-right: 5px solid #ffd966; padding-right: 10px; margin: 1.5rem 0 0.8rem 0; }
        body.english-mode .template-premium .section-title-preview { border-right: none; border-left: 5px solid #ffd966; padding-left: 10px; }

        .job-item { margin-bottom: 1rem; }
        .job-header { display: flex; justify-content: space-between; font-weight: 700; color: #2d3436; }
        .job-desc { white-space: pre-line; font-size: 0.95rem; color: #636e72; margin-top: 4px; }
        .skill-tag { background: #f0f7ff; color: var(--primary-dark); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; border: 1px solid #d0e4ff; }
        .skills-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

        @media print {
            body { background: white !important; padding: 0 !important; }
            .lang-switch, .header, .form-panel, .preview-header, footer { display: none !important; }
            .dashboard { display: block !important; margin: 0 !important; }
            .preview-panel { box-shadow: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }
            .cv-preview { margin: 0 !important; padding: 20mm !important; width: 100% !important; box-shadow: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        footer { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: #636e72; padding-bottom: 2rem; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; color: white; backdrop-filter: blur(5px); }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-switch">
        <button id="langArBtn" class="lang-btn active"><i class="fas fa-language"></i> العربية</button>
        <button id="langEnBtn" class="lang-btn"><i class="fas fa-language"></i> English</button>
    </div>

    <div class="header">
        <h1 id="mainTitle"><i class="fas fa-file-alt"></i> منشئ السيرة الذاتية الاحترافية</h1>
        <p id="subTitle">صمم سيرتك الذاتية بأحدث المعايير المتوافقة مع محركات البحث ATS</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector">
                <div data-template="modern" class="template-option active" id="tempModern">✨ عصري</div>
                <div data-template="elegant" class="template-option" id="tempElegant">💎 أنيق</div>
                <div data-template="premium" class="template-option" id="tempPremium">🌟 بريميوم</div>
            </div>

            <div class="image-upload" id="imageUploadSection" style="display: none;">
                <label id="photoLabel"><i class="fas fa-camera"></i> الصورة الشخصية</label>
                <input type="file" id="profileImage" accept="image/*">
            </div>

            <div class="form-group">
                <label id="fullNameLabel"><i class="fas fa-user"></i> الاسم الكامل</label>
                <input type="text" id="fullName" value="خالد حلمي خفاجي">
            </div>

            <div class="form-group">
                <label id="jobTitleLabel"><i class="fas fa-briefcase"></i> المسمى الوظيفي</label>
                <input type="text" id="jobTitle" value="Payroll & HRIS Specialist">
            </div>

            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label id="emailLabel"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="email" value="khalid@example.com">
                </div>
                <div class="form-group">
                    <label id="phoneLabel"><i class="fas fa-phone-alt"></i> رقم الهاتف</label>
                    <input type="text" id="phone" value="+201095890589">
                </div>
            </div>

            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label id="locationLabel"><i class="fas fa-map-marker-alt"></i> العنوان</label>
                    <input type="text" id="location" value="Egypt">
                </div>
                <div class="form-group">
                    <label id="linkedinLabel"><i class="fab fa-linkedin"></i> LinkedIn</label>
                    <input type="text" id="linkedin" value="linkedin.com/in/khalid">
                </div>
            </div>

            <div class="form-group">
                <label id="summaryLabel"><i class="fas fa-align-right"></i> نبذة شخصية</label>
                <textarea id="summary" rows="4">خبير في إدارة المرتبات ونظم الموارد البشرية مع خبرة تزيد عن 15 عاماً في القطاع الحكومي والخاص، متخصص في أنظمة SAP و Oracle Payroll.</textarea>
            </div>

            <span class="section-title" id="expTitle">الخبرات العملية</span>
            <div id="experiencesContainer"></div>
            <button class="add-btn" id="addExperienceBtn"><i class="fas fa-plus-circle"></i> <span id="addExpText">إضافة خبرة</span></button>

            <div style="margin-top:2rem;"><span class="section-title" id="eduTitle">التعليم</span></div>
            <div id="educationContainer"></div>
            <button class="add-btn" id="addEducationBtn"><i class="fas fa-plus-circle"></i> <span id="addEduText">إضافة تعليم</span></button>

            <div class="form-group" style="margin-top:2rem;">
                <label id="skillsLabel"><i class="fas fa-star"></i> المهارات (افصل بينها بفاصلة)</label>
                <input type="text" id="skills" value="SAP, Oracle, Advanced Excel, Payroll Management, Egyptian Labor Law">
            </div>

            <div class="form-group">
                <label id="langsLabel"><i class="fas fa-language"></i> اللغات</label>
                <input type="text" id="languages" value="العربية (اللغة الأم)، الإنجليزية (جيد جداً)">
            </div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3 id="previewTitle"><i class="fas fa-eye"></i> معاينة السيرة الذاتية</h3>
                <div class="download-group">
                    <button id="downloadAtsBtn" class="download-btn btn-ats"><i class="fas fa-robot"></i> <span id="atsBtnText">نسخة ATS (نصية)</span></button>
                    <button id="downloadPDFBtn" class="download-btn btn-design"><i class="fas fa-file-pdf"></i> <span id="downloadText">تحميل PDF (تصميم)</span></button>
                </div>
            </div>
            <div id="cvPreviewContainer" class="cv-preview template-modern"></div>
        </div>
    </div>
    
    <footer id="footerText">تصميم ذكي يدعم القراءة الآلية والفرز المتقدم للموظفين</footer>
</div>

<script>
    let experiences = [
        { title: "Senior Payroll Specialist", company: "Egypt Post", date: "2014 - Present", desc: "• إدارة مرتبات أكثر من 1200 موظف.\n• تقليل وقت المعالجة بنسبة 30%." }
    ];
    let educations = [
        { degree: "ليسانس حقوق", school: "جامعة القاهرة", year: "2018" }
    ];
    let currentTemplate = "modern";
    let currentLang = "ar";
    let profileImageData = null;

    const trans = {
        ar: {
            mainTitle: "منشئ السيرة الذاتية الاحترافية",
            subTitle: "صمم سيرتك الذاتية بأحدث المعايير المتوافقة مع محركات البحث ATS",
            fullName: "الاسم الكامل", job: "المسمى الوظيفي", email: "البريد الإلكتروني", phone: "رقم الهاتف",
            loc: "العنوان", sum: "نبذة شخصية", skills: "المهارات (افصل بفاصلة)", langs: "اللغات",
            expT: "الخبرات العملية", eduT: "التعليم", addExp: "إضافة خبرة", addEdu: "إضافة تعليم",
            atsBtn: "نسخة ATS (نصية)", designBtn: "تحميل PDF (تصميم)",
            photo: "الصورة الشخصية", preview: "معاينة السيرة الذاتية"
        },
        en: {
            mainTitle: "Professional CV Builder",
            subTitle: "Design your CV with the latest ATS-compliant standards",
            fullName: "Full Name", job: "Job Title", email: "Email Address", phone: "Phone Number",
            loc: "Location", sum: "Professional Summary", skills: "Skills (comma separated)", langs: "Languages",
            expT: "Work Experience", eduT: "Education", addExp: "Add Experience", addEdu: "Add Education",
            atsBtn: "ATS Version (Text)", designBtn: "Download PDF (Design)",
            photo: "Profile Picture", preview: "CV Preview"
        }
    };

    function updateLanguageUI() {
        const t = trans[currentLang];
        document.getElementById("mainTitle").innerHTML = `<i class="fas fa-file-alt"></i> ${t.mainTitle}`;
        document.getElementById("subTitle").innerText = t.subTitle;
        document.getElementById("fullNameLabel").innerHTML = `<i class="fas fa-user"></i> ${t.fullName}`;
        document.getElementById("jobTitleLabel").innerHTML = `<i class="fas fa-briefcase"></i> ${t.job}`;
        document.getElementById("emailLabel").innerHTML = `<i class="fas fa-envelope"></i> ${t.email}`;
        document.getElementById("phoneLabel").innerHTML = `<i class="fas fa-phone-alt"></i> ${t.phone}`;
        document.getElementById("locationLabel").innerHTML = `<i class="fas fa-map-marker-alt"></i> ${t.loc}`;
        document.getElementById("summaryLabel").innerHTML = `<i class="fas fa-align-right"></i> ${t.sum}`;
        document.getElementById("skillsLabel").innerHTML = `<i class="fas fa-star"></i> ${t.skills}`;
        document.getElementById("langsLabel").innerHTML = `<i class="fas fa-language"></i> ${t.langs}`;
        document.getElementById("expTitle").innerText = t.expT;
        document.getElementById("eduTitle").innerText = t.eduT;
        document.getElementById("addExpText").innerText = t.addExp;
        document.getElementById("addEduText").innerText = t.addEdu;
        document.getElementById("atsBtnText").innerText = t.atsBtn;
        document.getElementById("downloadText").innerText = t.designBtn;
        document.getElementById("photoLabel").innerHTML = `<i class="fas fa-camera"></i> ${t.photo}`;
        document.getElementById("previewTitle").innerHTML = `<i class="fas fa-eye"></i> ${t.preview}`;

        document.body.className = currentLang === 'ar' ? '' : 'english-mode';
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        renderDynamicForms();
        updateCVPreview();
    }

    function renderDynamicForms() {
        const expCont = document.getElementById("experiencesContainer");
        expCont.innerHTML = experiences.map((exp, i) => `
            <div class="dynamic-item">
                <button class="remove-btn" onclick="removeExp(${i})"><i class="fas fa-trash"></i></button>
                <div class="form-group"><input type="text" placeholder="المسمى الوظيفي" oninput="updateExp(${i}, 'title', this.value)" value="${exp.title}"></div>
                <div class="form-group"><input type="text" placeholder="الشركة / الفترة" oninput="updateExp(${i}, 'date', this.value)" value="${exp.date}"></div>
                <textarea placeholder="الوصف والمهام" oninput="updateExp(${i}, 'desc', this.value)">${exp.desc}</textarea>
            </div>
        `).join('');

        const eduCont = document.getElementById("educationContainer");
        eduCont.innerHTML = educations.map((edu, i) => `
            <div class="dynamic-item">
                <button class="remove-btn" onclick="removeEdu(${i})"><i class="fas fa-trash"></i></button>
                <div class="form-group"><input type="text" placeholder="الدرجة العلمية" oninput="updateEdu(${i}, 'degree', this.value)" value="${edu.degree}"></div>
                <div class="form-group"><input type="text" placeholder="المؤسسة / السنة" oninput="updateEdu(${i}, 'school', this.value)" value="${edu.school}"></div>
            </div>
        `).join('');
    }

    function addExp() { experiences.push({title:"", date:"", desc:""}); renderDynamicForms(); updateCVPreview(); }
    function addEdu() { educations.push({degree:"", school:""}); renderDynamicForms(); updateCVPreview(); }
    function removeExp(i) { experiences.splice(i,1); renderDynamicForms(); updateCVPreview(); }
    function removeEdu(i) { educations.splice(i,1); renderDynamicForms(); updateCVPreview(); }
    function updateExp(i, key, val) { experiences[i][key] = val; updateCVPreview(); }
    function updateEdu(i, key, val) { educations[i][key] = val; updateCVPreview(); }

    document.getElementById("profileImage").addEventListener("change", function(e) {
        const reader = new FileReader();
        reader.onload = function(event) { profileImageData = event.target.result; updateCVPreview(); };
        if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    });

    function updateCVPreview() {
        const container = document.getElementById("cvPreviewContainer");
        const t = trans[currentLang];
        const name = document.getElementById("fullName").value;
        const job = document.getElementById("jobTitle").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;
        const loc = document.getElementById("location").value;
        const link = document.getElementById("linkedin").value;
        const sum = document.getElementById("summary").value;
        const skills = document.getElementById("skills").value.split(',').map(s => s.trim()).filter(s => s);
        const langs = document.getElementById("languages").value;

        let content = '';

        if(currentTemplate === "premium") {
            content = `
            <div class="template-premium">
                <div class="premium-header">
                    ${profileImageData ? `<img src="${profileImageData}" class="premium-avatar">` : `<div class="premium-avatar" style="background:#eee"></div>`}
                    <div class="premium-info">
                        <h2>${name}</h2>
                        <p>${job}</p>
                        <div style="font-size:0.8rem; margin-top:5px; opacity:0.9">
                            <i class="fas fa-envelope"></i> ${email} | <i class="fas fa-phone"></i> ${phone}
                        </div>
                    </div>
                </div>
                <div class="section-title-preview">${currentLang === 'ar' ? 'الملف الشخصي' : 'Profile'}</div>
                <p style="font-size:0.95rem">${sum}</p>
                <div class="section-title-preview">${t.expT}</div>
                ${experiences.map(e => `<div class="job-item"><div class="job-header"><span>${e.title}</span><span>${e.date}</span></div><div class="job-desc">${e.desc}</div></div>`).join('')}
                <div class="section-title-preview">${t.skillsT || 'المهارات'}</div>
                <div class="skills-list">${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
            </div>`;
        } else {
            content = `
            <div class="template-modern">
                <div class="cv-header">
                    <div class="cv-name">${name}</div>
                    <div style="font-size:1.2rem; color:var(--primary)">${job}</div>
                    <div style="font-size:0.9rem; margin-top:10px; color:#636e72">
                        <i class="fas fa-envelope"></i> ${email} | <i class="fas fa-phone"></i> ${phone} | <i class="fas fa-map-marker-alt"></i> ${loc}
                    </div>
                </div>
                <div class="section-title-preview">${currentLang === 'ar' ? 'نبذة' : 'Summary'}</div>
                <p>${sum}</p>
                <div class="section-title-preview">${t.expT}</div>
                ${experiences.map(e => `<div class="job-item"><strong>${e.title}</strong><br><small>${e.date}</small><div class="job-desc">${e.desc}</div></div>`).join('')}
                <div class="section-title-preview">${t.eduT}</div>
                ${educations.map(e => `<div class="job-item"><strong>${e.degree}</strong><br>${e.school}</div>`).join('')}
                <div class="section-title-preview">${currentLang === 'ar' ? 'المهارات' : 'Skills'}</div>
                <div class="skills-list">${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
            </div>`;
        }
        
        container.innerHTML = content;
        container.className = `cv-preview template-${currentTemplate}`;
    }

    // ATS DOWNLOAD (Text-Based)
    function downloadAts() {
        window.print();
    }

    // DESIGN DOWNLOAD (Image-Based)
    async function downloadDesign() {
        const overlay = document.createElement('div');
        overlay.className = 'loading-overlay';
        overlay.innerHTML = '<div class="spinner"></div><p style="margin-top:1rem">جاري إعداد نسخة التصميم...</p>';
        document.body.appendChild(overlay);

        try {
            const canvas = await html2canvas(document.getElementById("cvPreviewContainer"), { scale: 2 });
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(imgData, 'JPEG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            pdf.save(`CV_Design_${document.getElementById("fullName").value}.pdf`);
        } finally {
            document.body.removeChild(overlay);
        }
    }

    // Listeners
    document.getElementById("addExperienceBtn").onclick = addExp;
    document.getElementById("addEducationBtn").onclick = addEdu;
    document.getElementById("downloadAtsBtn").onclick = downloadAts;
    document.getElementById("downloadPDFBtn").onclick = downloadDesign;
    
    document.getElementById("langArBtn").onclick = () => { currentLang = "ar"; updateLanguageUI(); };
    document.getElementById("langEnBtn").onclick = () => { currentLang = "en"; updateLanguageUI(); };

    document.querySelectorAll(".template-option").forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll(".template-option").forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            currentTemplate = opt.dataset.template;
            document.getElementById("imageUploadSection").style.display = currentTemplate === "premium" ? "block" : "none";
            updateCVPreview();
        };
    });

    const inputs = ["fullName", "jobTitle", "email", "phone", "location", "linkedin", "summary", "skills", "languages"];
    inputs.forEach(id => document.getElementById(id).oninput = updateCVPreview);

    updateLanguageUI();
</script>

</body>
</html>
