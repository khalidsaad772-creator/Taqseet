<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- خطوط عربية جميلة -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Tajawal', 'Almarai', 'Cairo', sans-serif;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        body.english-mode { direction: ltr; text-align: left; font-family: 'Inter', 'Tajawal', sans-serif; }
        .app-container { max-width: 1500px; margin: 0 auto; }
        
        /* Language Switcher */
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 0.5rem; }
        .lang-btn {
            background: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px;
            font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: inline-flex; align-items: center; gap: 8px;
        }
        .lang-btn.active { background: #1e6f5c; color: white; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #1f3b4c, #2c5a6e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; margin-bottom: 2rem; }
        .form-panel {
            background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.5rem; max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: #0f2b3b; font-size: 0.85rem; }
        input, textarea, select {
            width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0;
            border-radius: 18px; font-family: 'Tajawal', sans-serif; font-size: 0.9rem;
        }
        input:focus, textarea:focus { outline: none; border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.2); }
        .section-title { font-size: 1.2rem; font-weight: 700; margin: 1.2rem 0 0.8rem 0; padding-bottom: 0.3rem; border-bottom: 3px solid #2c7da0; display: inline-block; color: #1e4a6b; }
        .dynamic-item { background: #f8fafc; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #eef2f8; }
        .dynamic-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; color: #1e4a6b; cursor: pointer; margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 8px; }
        .add-btn:hover { background: #dfe7ff; }
        .template-selector { background: #f1f5f9; border-radius: 40px; padding: 0.2rem; display: flex; margin: 1rem 0 1.2rem 0; gap: 0.5rem; }
        .template-option { flex: 1; text-align: center; padding: 0.6rem; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .template-option.active { background: white; color: #1f6e8c; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        
        .preview-panel { background: #fefefe; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .preview-header { background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .send-btn {
            background: #25D366; border: none; padding: 0.6rem 1.3rem; border-radius: 40px;
            color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .send-btn:hover { background: #128C7E; }
        
        .image-upload { margin-top: 1rem; padding: 1rem; background: #f0f9ff; border-radius: 20px; border: 1px dashed #2c7da0; }
        .image-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-top: 10px; border: 3px solid #2c7da0; }
        
        .cv-preview { padding: 1.8rem; background: white; margin: 1rem; border-radius: 16px; width: 100%; font-size: 11pt; line-height: 1.5; }
        
        /* Template Modern */
        .template-modern .cv-header { text-align: center; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; }
        .template-modern .cv-name { font-size: 1.8rem; font-weight: 800; color: #1e4a6b; }
        .template-modern .section-title-preview { font-size: 1.1rem; font-weight: 800; border-right: 4px solid #2c7da0; padding-right: 0.7rem; margin: 1rem 0 0.6rem 0; color: #1e4a6b; }
        
        /* Template Elegant */
        .template-elegant .cv-header { background: #2c3e4e; color: white; margin: -1.8rem -1.8rem 1.2rem -1.8rem; padding: 1.5rem 1.8rem; border-radius: 16px 16px 30px 30px; }
        .template-elegant .section-title-preview { font-size: 1rem; font-weight: 800; border-bottom: 2px solid #d4c2a7; display: inline-block; margin-bottom: 0.6rem; }
        
        /* Template Premium */
        .template-premium { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); }
        .template-premium .premium-header { display: flex; align-items: center; gap: 1.5rem; background: linear-gradient(135deg, #1e4a6b, #2c7da0); color: white; padding: 1.5rem; margin: -1.8rem -1.8rem 1.5rem -1.8rem; border-radius: 16px 16px 30px 30px; }
        .template-premium .premium-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid #ffd966; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .template-premium .premium-name { font-size: 1.6rem; font-weight: 800; }
        .template-premium .section-title-preview { font-size: 1rem; font-weight: 800; color: #1e4a6b; border-right: 4px solid #ffd966; padding-right: 0.7rem; margin: 1rem 0 0.6rem 0; }
        
        .job-item, .edu-item { margin-bottom: 0.8rem; }
        .job-title { font-weight: 800; font-size: 0.95rem; }
        .job-date { font-size: 0.7rem; color: #5b6e8c; margin-bottom: 0.3rem; }
        .job-desc { font-size: 0.85rem; white-space: pre-line; }
        .skills-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .skill-tag { background: #eef2ff; padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; }
        
        @media (max-width: 950px) { .dashboard { grid-template-columns: 1fr; } }
        footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #556b82; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            z-index: 9999; color: white; font-size: 1.2rem; flex-direction: column; gap: 1rem;
            backdrop-filter: blur(3px);
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="lang-switch">
        <button id="langArBtn" class="lang-btn active"><i class="fas fa-language"></i> العربية</button>
        <button id="langEnBtn" class="lang-btn"><i class="fas fa-language"></i> English</button>
    </div>
    <div class="header">
        <h1 id="mainTitle"><i class="fas fa-file-alt"></i> منشئ السيرة الذاتية الاحترافية</h1>
        <p id="subTitle">أنشئ سيرتك الذاتية وسيتم إرسالها لك عبر واتساب بعد المراجعة</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-option active" id="tempModern">✨ عصري</div>
                <div data-template="elegant" class="template-option" id="tempElegant">💎 أنيق</div>
                <div data-template="premium" class="template-option" id="tempPremium">🌟 بريميوم</div>
            </div>
            
            <div class="image-upload" id="imageUploadSection" style="display: none;">
                <label><i class="fas fa-camera"></i> <span id="photoLabel">الصورة الشخصية (اختياري)</span></label>
                <input type="file" id="profileImage" accept="image/*">
                <div id="imagePreviewContainer"></div>
            </div>
            
            <div class="form-group"><label><i class="fas fa-user"></i> الاسم الكامل</label><input type="text" id="fullName" value="خالد حلمي خفاجي"></div>
            <div class="form-group"><label><i class="fas fa-briefcase"></i> المسمى الوظيفي</label><input type="text" id="jobTitle" value="خبير الرواتب | أخصائي موارد بشرية"></div>
            <div class="form-group"><label><i class="fas fa-envelope"></i> البريد الإلكتروني</label><input type="email" id="email" value="khalid@example.com"></div>
            <div class="form-group"><label><i class="fas fa-phone"></i> رقم الهاتف</label><input type="text" id="phone" value="+201095890589"></div>
            <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> العنوان</label><input type="text" id="location" value="مصر"></div>
            <div class="form-group"><label><i class="fab fa-linkedin"></i> LinkedIn</label><input type="text" id="linkedin" value="https://www.linkedin.com/in/khalid-helmy"></div>
            <div class="form-group"><label><i class="fas fa-align-left"></i> نبذة شخصية</label><textarea id="summary" rows="3">خبير رواتب موجه للنتائج بخبرة تزيد عن 15 عاماً في إدارة الرواتب للقطاع الحكومي. خلفية في القانون المصري مع خبرة تقنية في SAP و Oracle تضمن الامتثال الكامل للقوانين.</textarea></div>
            
            <div><span class="section-title">الخبرات العملية</span></div>
            <div id="experiencesContainer"></div>
            <button class="add-btn" id="addExperienceBtn"><i class="fas fa-plus-circle"></i> إضافة خبرة</button>
            
            <div style="margin-top:1rem;"><span class="section-title">التعليم</span></div>
            <div id="educationContainer"></div>
            <button class="add-btn" id="addEducationBtn"><i class="fas fa-plus-circle"></i> إضافة تعليم</button>
            
            <div class="form-group" style="margin-top:1rem;"><label><i class="fas fa-code"></i> المهارات (افصل بينها بفاصلة)</label><input type="text" id="skills" value="HRIS, Excel متقدم, SAP, Oracle, Adobe Suite"></div>
            <div class="form-group"><label><i class="fas fa-language"></i> اللغات</label><input type="text" id="languages" value="العربية (لغة أم)، الإنجليزية (ممتاز)"></div>
            
            <!-- حقل رقم واتساب المستخدم (سيتم إرسال نسخة له أيضاً) -->
            <div class="form-group"><label><i class="fab fa-whatsapp"></i> رقم واتساب (للتواصل)</label><input type="text" id="userWhatsapp" placeholder="مثال: 201234567890" value=""></div>
            <small style="color:#556b82;">سيتم التواصل معك عبر هذا الرقم لتسليم السيرة الذاتية</small>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3><i class="fas fa-eye"></i> معاينة السيرة الذاتية</h3>
                <button id="sendToWhatsAppBtn" class="send-btn"><i class="fab fa-whatsapp"></i> إرسال السيرة الذاتية إلى الخادم</button>
            </div>
            <div id="cvPreviewContainer" class="cv-preview template-modern"></div>
        </div>
    </div>
    <footer>سيتم مراجعة السيرة الذاتية وإرسال نسخة منها عبر واتساب خلال 24 ساعة</footer>
</div>

<script>
    // البيانات
    let experiences = [
        { title: "أخصائي رواتب أول", company: "هيئة البريد المصرية", startDate: "2014", endDate: "حالياً", description: "• إدارة كشوف رواتب 1,200+ موظف باستخدام SAP وOracle بدقة 99.9%\n• تقليل وقت معالجة الرواتب بنسبة 30%\n• ضمان الامتثال الكامل للتأمينات الاجتماعية والضرائب\n• إعداد تقارير مالية وموارد بشرية لدعم المراجعات\n• حل 50+ تذكرة نظام سنوياً" }
    ];
    let educations = [
        { degree: "ليسانس الحقوق", institution: "جامعة القاهرة", year: "2018", description: "تخصص في القانون المصري والامتثال القانوني" }
    ];
    let currentTemplate = "modern";
    let currentLang = "ar";
    let profileImageData = null;

    // العناصر
    const fullNameInp = document.getElementById("fullName");
    const jobTitleInp = document.getElementById("jobTitle");
    const emailInp = document.getElementById("email");
    const phoneInp = document.getElementById("phone");
    const locationInp = document.getElementById("location");
    const linkedinInp = document.getElementById("linkedin");
    const summaryInp = document.getElementById("summary");
    const skillsInp = document.getElementById("skills");
    const languagesInp = document.getElementById("languages");
    const userWhatsapp = document.getElementById("userWhatsapp");
    const expContainer = document.getElementById("experiencesContainer");
    const eduContainer = document.getElementById("educationContainer");
    const cvPreview = document.getElementById("cvPreviewContainer");
    const profileImageInput = document.getElementById("profileImage");
    const imageUploadSection = document.getElementById("imageUploadSection");

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // رفع الصورة
    profileImageInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                profileImageData = event.target.result;
                updateCVPreview();
            };
            reader.readAsDataURL(file);
        } else {
            profileImageData = null;
            updateCVPreview();
        }
    });

    function renderDynamicForms() {
        expContainer.innerHTML = "";
        experiences.forEach((exp, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="dynamic-item-header"><strong>خبرة ${idx+1}</strong><button class="remove-btn" data-type="exp" data-index="${idx}"><i class="fas fa-trash-alt"></i></button></div>
                <div class="form-group"><label>المسمى الوظيفي</label><input class="exp-title" value="${escapeHtml(exp.title)}"></div>
                <div class="form-group"><label>اسم الشركة</label><input class="exp-company" value="${escapeHtml(exp.company)}"></div>
                <div class="form-group"><label>تاريخ البدء</label><input class="exp-start" value="${escapeHtml(exp.startDate)}"></div>
                <div class="form-group"><label>تاريخ الانتهاء</label><input class="exp-end" value="${escapeHtml(exp.endDate)}"></div>
                <div class="form-group"><label>وصف</label><textarea class="exp-desc" rows="4">${escapeHtml(exp.description)}</textarea></div>
            `;
            expContainer.appendChild(div);
        });
        eduContainer.innerHTML = "";
        educations.forEach((edu, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="dynamic-item-header"><strong>تعليم ${idx+1}</strong><button class="remove-btn" data-type="edu" data-index="${idx}"><i class="fas fa-trash-alt"></i></button></div>
                <div class="form-group"><label>الشهادة / الدرجة</label><input class="edu-degree" value="${escapeHtml(edu.degree)}"></div>
                <div class="form-group"><label>المؤسسة</label><input class="edu-institution" value="${escapeHtml(edu.institution)}"></div>
                <div class="form-group"><label>السنة</label><input class="edu-year" value="${escapeHtml(edu.year)}"></div>
                <div class="form-group"><label>ملاحظات</label><textarea class="edu-desc" rows="2">${escapeHtml(edu.description)}</textarea></div>
            `;
            eduContainer.appendChild(div);
        });
        attachDynamicEvents();
    }

    function attachDynamicEvents() {
        document.querySelectorAll(".remove-btn[data-type='exp']").forEach(btn => {
            btn.addEventListener("click", () => { const idx = parseInt(btn.dataset.index); experiences.splice(idx,1); renderDynamicForms(); updateCVPreview(); });
        });
        document.querySelectorAll(".remove-btn[data-type='edu']").forEach(btn => {
            btn.addEventListener("click", () => { const idx = parseInt(btn.dataset.index); educations.splice(idx,1); renderDynamicForms(); updateCVPreview(); });
        });
        document.querySelectorAll(".exp-title, .exp-company, .exp-start, .exp-end, .exp-desc").forEach(inp => inp.addEventListener("input", () => syncExperiences()));
        document.querySelectorAll(".edu-degree, .edu-institution, .edu-year, .edu-desc").forEach(inp => inp.addEventListener("input", () => syncEducations()));
    }

    function syncExperiences() {
        const newExps = [];
        document.querySelectorAll("#experiencesContainer .dynamic-item").forEach(item => {
            newExps.push({
                title: item.querySelector(".exp-title")?.value || "",
                company: item.querySelector(".exp-company")?.value || "",
                startDate: item.querySelector(".exp-start")?.value || "",
                endDate: item.querySelector(".exp-end")?.value || "",
                description: item.querySelector(".exp-desc")?.value || ""
            });
        });
        experiences = newExps;
        updateCVPreview();
    }
    function syncEducations() {
        const newEdus = [];
        document.querySelectorAll("#educationContainer .dynamic-item").forEach(item => {
            newEdus.push({
                degree: item.querySelector(".edu-degree")?.value || "",
                institution: item.querySelector(".edu-institution")?.value || "",
                year: item.querySelector(".edu-year")?.value || "",
                description: item.querySelector(".edu-desc")?.value || ""
            });
        });
        educations = newEdus;
        updateCVPreview();
    }

    function getBaseData() {
        return {
            fullName: fullNameInp.value,
            jobTitle: jobTitleInp.value,
            email: emailInp.value,
            phone: phoneInp.value,
            location: locationInp.value,
            linkedin: linkedinInp.value,
            summary: summaryInp.value,
            skills: skillsInp.value.split(',').map(s=>s.trim()).filter(s=>s),
            languages: languagesInp.value,
            experiences, educations,
            profileImage: profileImageData
        };
    }

    function renderCVByTemplate(data, template) {
        const summarySec = "نبذة شخصية", expSec = "الخبرات العملية", eduSec = "التعليم", skillsSec = "المهارات", langsSec = "اللغات";
        
        if(template === "premium") {
            const avatarHtml = data.profileImage ? `<img class="premium-avatar" src="${data.profileImage}">` : `<div class="premium-avatar"><i class="fas fa-user"></i></div>`;
            return `<div class="template-premium">
                <div class="premium-header">
                    ${avatarHtml}
                    <div class="premium-info">
                        <div class="premium-name">${escapeHtml(data.fullName)}</div>
                        <div class="premium-title">${escapeHtml(data.jobTitle)}</div>
                        <div style="font-size:0.7rem; margin-top:0.5rem;"><i class="fas fa-envelope"></i> ${escapeHtml(data.email)} | <i class="fas fa-phone"></i> ${escapeHtml(data.phone)}</div>
                    </div>
                </div>
                <div><div class="section-title-preview">${summarySec}</div><p>${escapeHtml(data.summary)}</p></div>
                <div><div class="section-title-preview">${expSec}</div>${data.experiences.map(exp => `<div class="job-item"><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div>`).join('')}</div>
                <div><div class="section-title-preview">${eduSec}</div>${data.educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div>`).join('')}</div>
                <div><div class="section-title-preview">${skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
                <div><div class="section-title-preview">${langsSec}</div><p>${escapeHtml(data.languages)}</p></div>
            </div>`;
        }
        else if(template === "modern") {
            return `<div class="cv-header"><div class="cv-name">${escapeHtml(data.fullName)}</div><div class="cv-title">${escapeHtml(data.jobTitle)}</div><div style="margin-top:6px;font-size:0.8rem"><i class="fas fa-envelope"></i> ${escapeHtml(data.email)} | <i class="fas fa-phone"></i> ${escapeHtml(data.phone)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(data.location)}</div></div>
            <div><div class="section-title-preview">${summarySec}</div><p>${escapeHtml(data.summary)}</p></div>
            <div><div class="section-title-preview">${expSec}</div>${data.experiences.map(exp => `<div class="job-item"><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div>`).join('')}</div>
            <div><div class="section-title-preview">${eduSec}</div>${data.educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div>`).join('')}</div>
            <div><div class="section-title-preview">${skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
            <div><div class="section-title-preview">${langsSec}</div><p>${escapeHtml(data.languages)}</p></div>`;
        }
        else {
            return `<div class="cv-header"><div class="cv-name">${escapeHtml(data.fullName)}</div><div class="cv-title">${escapeHtml(data.jobTitle)}</div><div style="margin-top:6px;font-size:0.8rem">${escapeHtml(data.email)} | ${escapeHtml(data.phone)} | ${escapeHtml(data.location)}</div></div>
            <div><div class="section-title-preview">${summarySec}</div><p>${escapeHtml(data.summary)}</p></div>
            <div><div class="section-title-preview">${expSec}</div>${data.experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-title-preview">${eduSec}</div>${data.educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-title-preview">${skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
            <div><div class="section-title-preview">${langsSec}</div><p>${escapeHtml(data.languages)}</p></div>`;
        }
    }

    function updateCVPreview() {
        const data = getBaseData();
        cvPreview.innerHTML = renderCVByTemplate(data, currentTemplate);
        cvPreview.className = `cv-preview template-${currentTemplate}`;
    }

    function toggleImageUpload() {
        imageUploadSection.style.display = currentTemplate === "premium" ? "block" : "none";
    }

    // إرسال إلى واتساب (تقوم بإنشاء PDF وإرسال رابط أو الملف)
    async function sendToWhatsApp() {
        const userPhone = userWhatsapp.value.trim();
        if (!userPhone) {
            alert("الرجاء إدخال رقم واتساب للتواصل");
            return;
        }
        
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading-overlay';
        loadingDiv.innerHTML = '<div class="spinner"></div><div>جاري تجهيز السيرة الذاتية...</div>';
        document.body.appendChild(loadingDiv);
        
        try {
            // تثبيت حجم الـ CV للتصوير
            const originalStyle = cvPreview.getAttribute('style') || '';
            cvPreview.style.width = "794px";
            cvPreview.style.margin = "0 auto";
            cvPreview.style.padding = "12mm 10mm";
            cvPreview.style.boxSizing = "border-box";
            cvPreview.style.background = "white";
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const canvas = await html2canvas(cvPreview, {
                scale: 3,
                backgroundColor: '#ffffff',
                logging: false,
                useCORS: true
            });
            
            cvPreview.style.width = "";
            cvPreview.style.margin = "";
            cvPreview.style.padding = "";
            
            // تحويل إلى Base64
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            
            // هنا يتم إرسال البيانات إلى خادم (API) لإعادة توجيهها لك عبر واتساب
            // في الوقت الحالي، سنقوم بمحاكاة العملية وفتح واتساب للمستخدم
            const message = `مرحباً، أود طلب سيرتي الذاتية بعد مراجعتها. الاسم: ${fullNameInp.value}`;
            const whatsappUrl = `https://wa.me/${userPhone}?text=${encodeURIComponent(message)}`;
            
            // تخزين الـ PDF مؤقتاً (في localStorage أو IndexedDB) لاسترجاعه لاحقاً
            // أو يمكنك إرسال بيانات الـ PDF إلى بريدك أو خادم خارجي
            
            alert("تم استلام طلبك. سيتم التواصل معك عبر واتساب خلال 24 ساعة لإرسال السيرة الذاتية المعتمدة.");
            
            // فتح واتساب للمستخدم للتواصل (اختياري)
            window.open(whatsappUrl, '_blank');
            
        } catch (error) {
            console.error("Error:", error);
            alert("حدث خطأ، يرجى المحاولة مرة أخرى");
        } finally {
            document.body.removeChild(loadingDiv);
        }
    }
    
    document.getElementById("sendToWhatsAppBtn").addEventListener("click", sendToWhatsApp);
    document.getElementById("addExperienceBtn").addEventListener("click", () => { experiences.push({ title: "وظيفة جديدة", company: "الشركة", startDate: "2024", endDate: "الآن", description: "" }); renderDynamicForms(); updateCVPreview(); });
    document.getElementById("addEducationBtn").addEventListener("click", () => { educations.push({ degree: "درجة البكالوريوس", institution: "الجامعة", year: "2024", description: "" }); renderDynamicForms(); updateCVPreview(); });
    
    document.querySelectorAll(".template-option").forEach(opt => {
        opt.addEventListener("click", () => {
            document.querySelectorAll(".template-option").forEach(o=>o.classList.remove("active"));
            opt.classList.add("active");
            currentTemplate = opt.dataset.template;
            toggleImageUpload();
            updateCVPreview();
        });
    });
    
    const mainInputs = ["fullName", "jobTitle", "email", "phone", "location", "linkedin", "summary", "skills", "languages"];
    mainInputs.forEach(id => { document.getElementById(id).addEventListener("input", () => updateCVPreview()); });
    
    document.getElementById("langArBtn").addEventListener("click", () => { currentLang = "ar"; document.body.classList.remove('english-mode'); document.body.setAttribute('dir','rtl'); updateCVPreview(); });
    document.getElementById("langEnBtn").addEventListener("click", () => { currentLang = "en"; document.body.classList.add('english-mode'); document.body.setAttribute('dir','ltr'); updateCVPreview(); });
    
    renderDynamicForms();
    updateCVPreview();
    toggleImageUpload();
</script>
</body>
</html>
