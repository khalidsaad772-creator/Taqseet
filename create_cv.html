<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خالد حلمي خفاجي - السيرة الذاتية الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            direction: rtl;
        }

        body.english {
            direction: ltr;
            text-align: left;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Language Buttons */
        .lang-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .lang-btn.active {
            background: #1e6f5c;
            color: white;
        }

        /* Header */
        .main-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-header h1 {
            color: #1e4a6b;
            font-size: 28px;
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        /* Form Panel */
        .form-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 13px;
            color: #1e4a6b;
        }

        input, textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2c7da0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            border-bottom: 3px solid #2c7da0;
            display: inline-block;
            margin: 15px 0 10px 0;
            color: #1e4a6b;
        }

        .dynamic-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .remove-btn {
            background: #fee2e2;
            border: none;
            color: #b91c1c;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        .add-btn {
            background: #eef2ff;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Template Selector */
        .template-selector {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 50px;
        }

        .template-opt {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .template-opt.active {
            background: white;
            color: #1f6e8c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* Preview Panel */
        .preview-panel {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .download-btn {
            background: #1e6f5c;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn:hover {
            background: #0f5a4a;
        }

        /* CV Preview Content */
        .cv-content {
            padding: 25px;
            background: white;
            margin: 15px;
            border-radius: 16px;
        }

        /* القالب العصري */
        .template-modern .cv-name {
            font-size: 26px;
            font-weight: 800;
            color: #1e4a6b;
            text-align: center;
        }
        .template-modern .cv-title {
            text-align: center;
            color: #2c7da0;
            font-weight: 600;
            margin: 5px 0;
        }
        .template-modern .cv-contact {
            text-align: center;
            font-size: 13px;
            margin: 10px 0;
        }
        .template-modern .section-preview-title {
            font-size: 18px;
            font-weight: 800;
            border-right: 4px solid #2c7da0;
            padding-right: 10px;
            margin: 20px 0 10px 0;
        }

        /* القالب الأنيق */
        .template-elegant .elegant-header {
            background: #2c3e4e;
            color: white;
            padding: 20px;
            margin: -25px -25px 20px -25px;
            border-radius: 16px 16px 30px 30px;
        }
        .template-elegant .section-preview-title {
            font-size: 16px;
            font-weight: 800;
            border-bottom: 2px solid #d4c2a7;
            display: inline-block;
            margin: 15px 0 8px 0;
        }

        /* القالب الجانبي */
        .template-sidebar-layout {
            display: grid;
            grid-template-columns: 0.9fr 2.1fr;
            gap: 20px;
        }
        .template-sidebar-layout .sidebar-right {
            background: #eef3fa;
            padding: 15px;
            border-radius: 16px;
        }
        .template-sidebar-layout .main-left .section-preview-title {
            font-weight: 800;
            border-bottom: 2px solid #cbd5e1;
            margin: 15px 0 8px 0;
        }

        .job-item {
            margin-bottom: 15px;
        }
        .job-title {
            font-weight: 800;
        }
        .job-date {
            font-size: 12px;
            color: #5b6e8c;
        }
        .job-desc {
            font-size: 13px;
            white-space: pre-line;
            margin-top: 5px;
        }
        .skills-badge {
            display: inline-block;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
        }

        hr {
            margin: 10px 0;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #556b82;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="lang-buttons">
        <button id="btnAr" class="lang-btn active">🇸🇦 العربية</button>
        <button id="btnEn" class="lang-btn">🇬🇧 English</button>
    </div>

    <div class="main-header">
        <h1><i class="fas fa-file-alt"></i> <span id="mainTitle">منشئ السيرة الذاتية الاحترافية</span></h1>
        <p id="subTitle">أنشئ سيرتك الذاتية مع 3 قوالب متميزة وPDF نصي قابل للنسخ</p>
    </div>

    <div class="dashboard">
        <!-- نموذج الإدخال -->
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-opt active" id="tempModern">✨ عصري</div>
                <div data-template="elegant" class="template-opt" id="tempElegant">💎 أنيق</div>
                <div data-template="sidebar" class="template-opt" id="tempSidebar">📐 جانبي</div>
            </div>

            <div class="form-group"><label><i class="fas fa-user"></i> <span class="lbl-fullname">الاسم الكامل</span></label><input type="text" id="inputName" value="Khalid Helmy Khafagy / خالد حلمي خفاجي"></div>
            <div class="form-group"><label><i class="fas fa-briefcase"></i> <span class="lbl-title">المسمى الوظيفي</span></label><input type="text" id="inputJob" value="Payroll & HRIS Specialist | SAP & Oracle Expert"></div>
            <div class="form-group"><label><i class="fas fa-envelope"></i> <span class="lbl-email">البريد الإلكتروني</span></label><input type="email" id="inputEmail" value="khalidhelmy772@gmail.com"></div>
            <div class="form-group"><label><i class="fas fa-phone"></i> <span class="lbl-phone">رقم الهاتف</span></label><input type="text" id="inputPhone" value="+201095890589"></div>
            <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> <span class="lbl-location">العنوان</span></label><input type="text" id="inputLocation" value="Egypt"></div>
            <div class="form-group"><label><i class="fab fa-linkedin"></i> LinkedIn</label><input type="text" id="inputLinkedin" value="linkedin.com/in/khalid-helmy"></div>
            <div class="form-group"><label><i class="fas fa-align-left"></i> <span class="lbl-summary">نبذة شخصية</span></label><textarea id="inputSummary" rows="3">Results-oriented Payroll Specialist with over 15 years of experience managing end-to-end payroll for large-scale government-sector workforces. LL.B. background combined with technical mastery of SAP and Oracle Payroll ensures 100% compliance with Egyptian labor law, social insurance, and tax regulations.</textarea></div>

            <div><span class="section-title"><span class="lbl-experience">الخبرات العملية</span></span></div>
            <div id="expList"></div>
            <button id="addExpBtn" class="add-btn"><i class="fas fa-plus"></i> <span class="lbl-add-exp">إضافة خبرة</span></button>

            <div><span class="section-title"><span class="lbl-education">التعليم</span></span></div>
            <div id="eduList"></div>
            <button id="addEduBtn" class="add-btn"><i class="fas fa-plus"></i> <span class="lbl-add-edu">إضافة تعليم</span></button>

            <div class="form-group"><label><i class="fas fa-code"></i> <span class="lbl-skills">المهارات (افصل بينها بفاصلة)</span></label><input type="text" id="inputSkills" value="HRIS, Advanced Excel, SAP, Oracle, Adobe Creative Suite (Photoshop, Illustrator, After Effects, Premiere)"></div>
            <div class="form-group"><label><i class="fas fa-language"></i> <span class="lbl-langs">اللغات</span></label><input type="text" id="inputLangs" value="Arabic (Native), English (Professional Working Proficiency)"></div>
        </div>

        <!-- معاينة الـ CV -->
        <div class="preview-panel">
            <div class="preview-header">
                <h3><i class="fas fa-eye"></i> <span id="previewTitle">معاينة السيرة الذاتية</span></h3>
                <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> <span id="downloadText">تحميل PDF (نص قابل للنسخ)</span></button>
            </div>
            <div id="cvPreview" class="cv-content template-modern"></div>
        </div>
    </div>
    <footer>الـ PDF يخرج كنص قابل للتحديد والنسخ مع الحفاظ على التنسيق الاحترافي</footer>
</div>

<script>
    // ===================== البيانات =====================
    let experiences = [
        { title: "Senior Payroll Specialist", company: "Egypt Post", startDate: "2014", endDate: "Present", desc: "• Manage full-cycle payroll for 1,200+ employees using SAP and Oracle with 99.9% accuracy\n• Reduced payroll processing time by 30% through automation\n• Ensure 100% compliance on social insurance and tax filings\n• Maintain employee records across ERP platforms\n• Generate financial and HR reports to support audits\n• Resolved 50+ system tickets annually" }
    ];
    let educations = [
        { degree: "LL.B. (Bachelor of Laws)", institution: "Cairo University", year: "2018", desc: "Background in Egyptian labor law and legal compliance" }
    ];

    let currentTemplate = "modern";
    let currentLang = "ar";

    // ===================== المراجع =====================
    const cvDiv = document.getElementById("cvPreview");
    const expContainer = document.getElementById("expList");
    const eduContainer = document.getElementById("eduList");

    // ===================== دوال مساعدة =====================
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ===================== عرض نماذج الخبرات والتعليم =====================
    function renderForms() {
        // الخبرات
        expContainer.innerHTML = "";
        experiences.forEach((exp, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="item-header"><strong>${currentLang === 'ar' ? `خبرة ${idx+1}` : `Experience ${idx+1}`}</strong><button class="remove-btn" data-exp="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" id="exp_title_${idx}" value="${escapeHtml(exp.title)}" placeholder="${currentLang === 'ar' ? 'المسمى الوظيفي' : 'Job Title'}" style="margin-bottom:8px;"><br>
                <input type="text" id="exp_company_${idx}" value="${escapeHtml(exp.company)}" placeholder="${currentLang === 'ar' ? 'اسم الشركة' : 'Company'}" style="margin-bottom:8px;"><br>
                <input type="text" id="exp_start_${idx}" value="${escapeHtml(exp.startDate)}" placeholder="Start Date" style="width:48%; display:inline-block;">
                <input type="text" id="exp_end_${idx}" value="${escapeHtml(exp.endDate)}" placeholder="End Date" style="width:48%; display:inline-block;"><br>
                <textarea id="exp_desc_${idx}" rows="3" placeholder="${currentLang === 'ar' ? 'وصف المهام' : 'Description'}">${escapeHtml(exp.desc)}</textarea>
            `;
            expContainer.appendChild(div);
            
            document.getElementById(`exp_title_${idx}`).addEventListener('input', (e) => { experiences[idx].title = e.target.value; updateCV(); });
            document.getElementById(`exp_company_${idx}`).addEventListener('input', (e) => { experiences[idx].company = e.target.value; updateCV(); });
            document.getElementById(`exp_start_${idx}`).addEventListener('input', (e) => { experiences[idx].startDate = e.target.value; updateCV(); });
            document.getElementById(`exp_end_${idx}`).addEventListener('input', (e) => { experiences[idx].endDate = e.target.value; updateCV(); });
            document.getElementById(`exp_desc_${idx}`).addEventListener('input', (e) => { experiences[idx].desc = e.target.value; updateCV(); });
        });
        
        // التعليم
        eduContainer.innerHTML = "";
        educations.forEach((edu, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="item-header"><strong>${currentLang === 'ar' ? `تعليم ${idx+1}` : `Education ${idx+1}`}</strong><button class="remove-btn" data-edu="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" id="edu_degree_${idx}" value="${escapeHtml(edu.degree)}" placeholder="${currentLang === 'ar' ? 'الدرجة العلمية' : 'Degree'}" style="margin-bottom:8px;"><br>
                <input type="text" id="edu_institution_${idx}" value="${escapeHtml(edu.institution)}" placeholder="${currentLang === 'ar' ? 'الجامعة / المؤسسة' : 'Institution'}" style="margin-bottom:8px;"><br>
                <input type="text" id="edu_year_${idx}" value="${escapeHtml(edu.year)}" placeholder="Year" style="margin-bottom:8px;"><br>
                <textarea id="edu_desc_${idx}" rows="2" placeholder="${currentLang === 'ar' ? 'ملاحظات' : 'Notes'}">${escapeHtml(edu.desc)}</textarea>
            `;
            eduContainer.appendChild(div);
            
            document.getElementById(`edu_degree_${idx}`).addEventListener('input', (e) => { educations[idx].degree = e.target.value; updateCV(); });
            document.getElementById(`edu_institution_${idx}`).addEventListener('input', (e) => { educations[idx].institution = e.target.value; updateCV(); });
            document.getElementById(`edu_year_${idx}`).addEventListener('input', (e) => { educations[idx].year = e.target.value; updateCV(); });
            document.getElementById(`edu_desc_${idx}`).addEventListener('input', (e) => { educations[idx].desc = e.target.value; updateCV(); });
        });
        
        // أزرار الحذف
        document.querySelectorAll("[data-exp]").forEach(btn => {
            btn.addEventListener('click', (e) => { experiences.splice(parseInt(btn.dataset.exp), 1); renderForms(); updateCV(); });
        });
        document.querySelectorAll("[data-edu]").forEach(btn => {
            btn.addEventListener('click', (e) => { educations.splice(parseInt(btn.dataset.edu), 1); renderForms(); updateCV(); });
        });
    }
    
    // ===================== عرض السيرة الذاتية =====================
    function updateCV() {
        const name = document.getElementById("inputName").value;
        const job = document.getElementById("inputJob").value;
        const email = document.getElementById("inputEmail").value;
        const phone = document.getElementById("inputPhone").value;
        const location = document.getElementById("inputLocation").value;
        const linkedin = document.getElementById("inputLinkedin").value;
        const summaryText = document.getElementById("inputSummary").value;
        const skillsArr = document.getElementById("inputSkills").value.split(',').map(s=>s.trim());
        const langs = document.getElementById("inputLangs").value;
        
        const summarySec = currentLang === 'ar' ? "نبذة شخصية" : "Summary";
        const expSec = currentLang === 'ar' ? "الخبرات العملية" : "Work Experience";
        const eduSec = currentLang === 'ar' ? "التعليم" : "Education";
        const skillsSec = currentLang === 'ar' ? "المهارات" : "Skills";
        const langsSec = currentLang === 'ar' ? "اللغات" : "Languages";
        
        if (currentTemplate === "sidebar") {
            cvDiv.innerHTML = `
                <div class="template-sidebar-layout">
                    <div class="sidebar-right">
                        <div style="font-weight:800; font-size:18px;">${escapeHtml(name)}</div>
                        <div style="color:#2c7da0; font-size:13px;">${escapeHtml(job)}</div>
                        <hr>
                        <div><i class="fas fa-envelope"></i> ${escapeHtml(email)}</div>
                        <div><i class="fas fa-phone"></i> ${escapeHtml(phone)}</div>
                        <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(location)}</div>
                        ${linkedin ? `<div><i class="fab fa-linkedin"></i> ${escapeHtml(linkedin)}</div>` : ''}
                        <hr>
                        <div><strong>${skillsSec}</strong><br>${skillsArr.map(s => `• ${escapeHtml(s)}`).join('<br>')}</div>
                        <hr>
                        <div><strong>${langsSec}</strong><br>${escapeHtml(langs)}</div>
                    </div>
                    <div class="main-left">
                        <div><div class="section-preview-title">${summarySec}</div><p>${escapeHtml(summaryText)}</p></div>
                        <div><div class="section-preview-title">${expSec}</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line; font-size:13px;">${escapeHtml(exp.desc)}</p></div><br/>`).join('')}</div>
                        <div><div class="section-preview-title">${eduSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div><br/>`).join('')}</div>
                    </div>
                </div>
            `;
            cvDiv.className = "cv-content template-sidebar-layout";
        } 
        else if (currentTemplate === "modern") {
            cvDiv.innerHTML = `
                <div class="cv-name">${escapeHtml(name)}</div>
                <div class="cv-title">${escapeHtml(job)}</div>
                <div class="cv-contact"><i class="fas fa-envelope"></i> ${escapeHtml(email)} | <i class="fas fa-phone"></i> ${escapeHtml(phone)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(location)} ${linkedin ? `| <i class="fab fa-linkedin"></i> ${escapeHtml(linkedin)}` : ''}</div>
                <div><div class="section-preview-title">${summarySec}</div><p>${escapeHtml(summaryText)}</p></div>
                <div><div class="section-preview-title">${expSec}</div>${experiences.map(exp => `<div class="job-item"><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><div class="job-desc">${escapeHtml(exp.desc)}</div></div>`).join('')}</div>
                <div><div class="section-preview-title">${eduSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div>`).join('')}</div>
                <div><div class="section-preview-title">${skillsSec}</div>${skillsArr.map(s => `<span class="skills-badge">${escapeHtml(s)}</span>`).join('')}</div>
                <div><div class="section-preview-title">${langsSec}</div><p>${escapeHtml(langs)}</p></div>
            `;
            cvDiv.className = "cv-content template-modern";
        }
        else {
            cvDiv.innerHTML = `
                <div class="elegant-header"><div style="font-size:24px; font-weight:800;">${escapeHtml(name)}</div><div>${escapeHtml(job)}</div><div style="font-size:12px;">${escapeHtml(email)} | ${escapeHtml(phone)} | ${escapeHtml(location)}</div></div>
                <div><div class="section-preview-title">${summarySec}</div><p>${escapeHtml(summaryText)}</p></div>
                <div><div class="section-preview-title">${expSec}</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.desc)}</p></div><hr/>`).join('')}</div>
                <div><div class="section-preview-title">${eduSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div><hr/>`).join('')}</div>
                <div><div class="section-preview-title">${skillsSec}</div>${skillsArr.map(s => `<span class="skills-badge">${escapeHtml(s)}</span>`).join('')}</div>
                <div><div class="section-preview-title">${langsSec}</div><p>${escapeHtml(langs)}</p></div>
            `;
            cvDiv.className = "cv-content template-elegant";
        }
    }
    
    // ===================== ترجمة الواجهة =====================
    function updateLanguage() {
        const isAr = currentLang === 'ar';
        document.querySelector(".lbl-fullname").innerText = isAr ? "الاسم الكامل" : "Full Name";
        document.querySelector(".lbl-title").innerText = isAr ? "المسمى الوظيفي" : "Job Title";
        document.querySelector(".lbl-email").innerText = isAr ? "البريد الإلكتروني" : "Email";
        document.querySelector(".lbl-phone").innerText = isAr ? "رقم الهاتف" : "Phone";
        document.querySelector(".lbl-location").innerText = isAr ? "العنوان" : "Location";
        document.querySelector(".lbl-summary").innerText = isAr ? "نبذة شخصية" : "Professional Summary";
        document.querySelector(".lbl-experience").innerText = isAr ? "الخبرات العملية" : "Work Experience";
        document.querySelector(".lbl-education").innerText = isAr ? "التعليم" : "Education";
        document.querySelector(".lbl-skills").innerText = isAr ? "المهارات (افصل بينها بفاصلة)" : "Skills (comma separated)";
        document.querySelector(".lbl-langs").innerText = isAr ? "اللغات" : "Languages";
        document.querySelector(".lbl-add-exp").innerText = isAr ? "إضافة خبرة" : "Add Experience";
        document.querySelector(".lbl-add-edu").innerText = isAr ? "إضافة تعليم" : "Add Education";
        document.getElementById("mainTitle").innerHTML = isAr ? '<i class="fas fa-file-alt"></i> منشئ السيرة الذاتية الاحترافية' : '<i class="fas fa-file-alt"></i> Professional CV Builder';
        document.getElementById("subTitle").innerText = isAr ? "أنشئ سيرتك الذاتية مع 3 قوالب متميزة وPDF نصي قابل للنسخ" : "Create your CV with 3 unique templates & selectable text PDF";
        document.getElementById("previewTitle").innerText = isAr ? "معاينة السيرة الذاتية" : "CV Preview";
        document.getElementById("downloadText").innerText = isAr ? "تحميل PDF (نص قابل للنسخ)" : "Download PDF (Selectable Text)";
        document.getElementById("tempModern").innerText = isAr ? "✨ عصري" : "✨ Modern";
        document.getElementById("tempElegant").innerText = isAr ? "💎 أنيق" : "💎 Elegant";
        document.getElementById("tempSidebar").innerText = isAr ? "📐 جانبي" : "📐 Sidebar";
        
        document.body.classList.toggle('english', !isAr);
        renderForms();
        updateCV();
    }
    
    // ===================== أحداث الإضافة =====================
    document.getElementById("addExpBtn").onclick = () => {
        experiences.push({ title: "New Role", company: "Company", startDate: "2024", endDate: "Present", desc: "" });
        renderForms();
        updateCV();
    };
    document.getElementById("addEduBtn").onclick = () => {
        educations.push({ degree: "New Degree", institution: "University", year: "2024", desc: "" });
        renderForms();
        updateCV();
    };
    
    // ===================== تغيير القالب =====================
    document.querySelectorAll(".template-opt").forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll(".template-opt").forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            currentTemplate = opt.dataset.template;
            updateCV();
        };
    });
    
    // ===================== تغيير اللغة =====================
    document.getElementById("btnAr").onclick = () => {
        currentLang = "ar";
        document.getElementById("btnAr").classList.add('active');
        document.getElementById("btnEn").classList.remove('active');
        updateLanguage();
    };
    document.getElementById("btnEn").onclick = () => {
        currentLang = "en";
        document.getElementById("btnEn").classList.add('active');
        document.getElementById("btnAr").classList.remove('active');
        updateLanguage();
    };
    
    // ===================== استماع للتغييرات =====================
    const inputs = ["inputName", "inputJob", "inputEmail", "inputPhone", "inputLocation", "inputLinkedin", "inputSummary", "inputSkills", "inputLangs"];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', () => updateCV());
    });
    
    // ===================== تحميل PDF =====================
    document.getElementById("downloadBtn").onclick = () => {
        const element = cvDiv;
        const originalStyle = element.style.cssText;
        element.style.width = "794px";
        element.style.margin = "0 auto";
        element.style.padding = "12mm 10mm";
        element.style.background = "white";
        
        setTimeout(() => {
            const opt = {
                margin: [0, 0, 0, 0],
                filename: `CV_${document.getElementById("inputName").value.replace(/\s/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: 'css' }
            };
            html2pdf().set(opt).from(element).save().then(() => {
                element.style.cssText = originalStyle;
            });
        }, 100);
    };
    
    // ===================== التشغيل الأولي =====================
    renderForms();
    updateLanguage();
    updateCV();
</script>
</body>
</html>
