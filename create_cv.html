<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder Pro | سيرة ذاتية احترافية - عربي / English</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Cairo', 'Inter', sans-serif;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        body.english-mode { direction: ltr; text-align: left; font-family: 'Inter', 'Cairo', sans-serif; }
        .app-container { max-width: 1500px; margin: 0 auto; }
        
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 0.5rem; }
        .lang-btn {
            background: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px;
            font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: inline-flex; align-items: center; gap: 8px;
        }
        .lang-btn.active { background: #1e6f5c; color: white; }
        body.english-mode .lang-btn.active { background: #2c7da0; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.3rem; font-weight: 800; background: linear-gradient(135deg, #1f3b4c, #2c5a6e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; margin-bottom: 2rem; }
        .form-panel {
            background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.5rem; max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: #0f2b3b; font-size: 0.85rem; }
        input, textarea, select {
            width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0;
            border-radius: 18px; font-family: inherit; font-size: 0.9rem;
        }
        .section-title { font-size: 1.2rem; font-weight: 700; margin: 1.2rem 0 0.8rem 0; padding-bottom: 0.3rem; border-bottom: 3px solid #2c7da0; display: inline-block; color: #1e4a6b; }
        .dynamic-item { background: #f8fafc; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #eef2f8; }
        .dynamic-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; color: #1e4a6b; cursor: pointer; margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 8px; }
        
        .template-selector { background: #f1f5f9; border-radius: 40px; padding: 0.2rem; display: flex; margin: 1rem 0 1.2rem 0; gap: 0.5rem; }
        .template-option { flex: 1; text-align: center; padding: 0.6rem; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .template-option.active { background: white; color: #1f6e8c; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        
        .preview-panel { background: #fefefe; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .preview-header { background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; }
        .download-btn { background: #1e6f5c; border: none; padding: 0.6rem 1.3rem; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        /* CV Preview Container - THE FIX FOR PDF SCALING */
        #cvPreviewContainer {
            padding: 1.8rem;
            background: white;
            width: 100%;
            min-height: 297mm; /* Force A4 Height */
            font-size: 11pt;
        }

        .template-modern .cv-header { text-align: center; margin-bottom: 1rem; }
        .template-modern .cv-name { font-size: 1.8rem; font-weight: 800; color: #0f3b4a; }
        .template-modern .section-title-preview { font-size: 1.1rem; font-weight: 700; border-right: 4px solid #2c7da0; padding-right: 0.8rem; margin: 0.8rem 0 0.5rem 0; }
        
        .template-elegant .cv-header { background: #2c3e4e; color: white; margin: -1.8rem -1.8rem 1.2rem -1.8rem; padding: 1.5rem 1.8rem; border-radius: 16px 16px 30px 30px; }
        
        .template-sidebar { display: grid; grid-template-columns: 0.85fr 2.15fr; gap: 1.2rem; }
        .template-sidebar .sidebar-col { background: #eef3fa; padding: 1rem; border-radius: 16px; }

        @media (max-width: 950px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="lang-switch">
        <button id="langArBtn" class="lang-btn active"><i class="fas fa-language"></i> العربية</button>
        <button id="langEnBtn" class="lang-btn"><i class="fas fa-language"></i> English</button>
    </div>
    <div class="header">
        <h1 id="mainTitle"><i class="fas fa-file-alt"></i> منشئ السيرة الذاتية الاحترافية</h1>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-option active" id="tempModern">✨ عصري</div>
                <div data-template="elegant" class="template-option" id="tempElegant">💎 أنيق</div>
                <div data-template="sidebar" class="template-option" id="tempSidebar">📐 جانبي</div>
            </div>
            <div class="form-group"><label id="fullNameLabel">الاسم الكامل</label><input type="text" id="fullName" value="ليلى السيد"></div>
            <div class="form-group"><label id="jobTitleLabel">المسمى الوظيفي</label><input type="text" id="jobTitle" value="مصممة تجربة مستخدم أول"></div>
            <div class="form-group"><label id="summaryLabel">نبذة شخصية</label><textarea id="summary" rows="3">مصممة UX محترفة بخبرة 6 سنوات.</textarea></div>
            <div><span class="section-title" id="expTitle">الخبرات</span></div>
            <div id="experiencesContainer"></div>
            <button class="add-btn" id="addExperienceBtn">+ إضافة خبرة</button>
            <div class="form-group" style="margin-top:1rem;"><label id="skillsLabel">المهارات</label><input type="text" id="skills" value="Figma, Adobe XD"></div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3 id="previewTitle">معاينة السيرة الذاتية</h3>
                <button id="downloadPDFBtn" class="download-btn">تحميل PDF</button>
            </div>
            <div id="cvPreviewOuter" style="overflow-x: auto; background: #eee; padding: 10px;">
                <div id="cvPreviewContainer" class="template-modern"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
    let experiences = [{ title: "مصممة UX", company: "شركة تكامل", startDate: "2022", endDate: "حالياً", description: "وصف الوظيفة" }];
    let educations = []; 
    let currentTemplate = "modern";
    let currentLang = "ar";

    // ... (هنا نفس دوال الـ JavaScript الأصلية بتاعتك بدون تغيير) ...
    const fullNameInp = document.getElementById("fullName");
    const jobTitleInp = document.getElementById("jobTitle");
    const summaryInp = document.getElementById("summary");
    const skillsInp = document.getElementById("skills");
    const expContainer = document.getElementById("experiencesContainer");
    const cvPreview = document.getElementById("cvPreviewContainer");

    function updateCVPreview() {
        const skills = skillsInp.value.split(',').map(s=>s.trim()).filter(s=>s);
        const data = { fullName: fullNameInp.value, jobTitle: jobTitleInp.value, summary: summaryInp.value, skills, experiences };
        
        let html = "";
        if(currentTemplate === "modern") {
            html = `<div class="cv-header"><div class="cv-name">${data.fullName}</div><div class="cv-title">${data.jobTitle}</div></div>
                    <div class="section-title-preview">الملخص</div><p>${data.summary}</p>
                    <div class="section-title-preview">الخبرة</div>${data.experiences.map(e => `<div><b>${e.title}</b> - ${e.company}</div>`).join('')}
                    <div class="section-title-preview">المهارات</div><p>${data.skills.join(' • ')}</p>`;
        } else if(currentTemplate === "elegant") {
            html = `<div class="cv-header"><div class="cv-name">${data.fullName}</div></div><div>${data.summary}</div>`;
        } else {
            html = `<div class="template-sidebar"><div class="sidebar-col">${data.fullName}</div><div class="main-col">${data.summary}</div></div>`;
        }
        cvPreview.innerHTML = html;
        cvPreview.className = `template-${currentTemplate}`;
    }

    // THE ONLY FIX: طريقة التحميل لضمان عدم وجود مساحات بيضاء أو تصغير (Scaling)
    document.getElementById("downloadPDFBtn").addEventListener("click", () => {
        const element = document.getElementById("cvPreviewContainer");
        const opt = {
            margin: 0,
            filename: 'CV.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true, 
                width: element.offsetWidth // إجبار العرض على العرض الفعلي للعنصر
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    });

    // بقية المستمعات (Listeners)
    [fullNameInp, jobTitleInp, summaryInp, skillsInp].forEach(inp => inp.addEventListener("input", updateCVPreview));
    updateCVPreview();
</script>
</body>
</html>
