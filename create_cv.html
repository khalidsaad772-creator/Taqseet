<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Tajawal', sans-serif;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #1e4a6b; font-size: 28px; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; }
        .form-panel {
            background: white; border-radius: 28px; padding: 25px;
            max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { font-weight: 700; display: block; margin-bottom: 5px; color: #1e4a6b; }
        input, textarea {
            width: 100%; padding: 10px 15px; border: 1.5px solid #e2e8f0;
            border-radius: 18px; font-family: 'Tajawal', sans-serif;
        }
        input:focus, textarea:focus { outline: none; border-color: #2c7da0; }
        .section-title { font-size: 18px; font-weight: 800; border-bottom: 3px solid #2c7da0; display: inline-block; margin: 20px 0 10px; }
        .dynamic-item { background: #f8fafc; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #eef2f8; }
        .dynamic-item-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 8px 18px; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 5px; display: inline-flex; align-items: center; gap: 8px; }
        .template-selector { display: flex; gap: 10px; background: #f1f5f9; padding: 5px; border-radius: 50px; margin: 15px 0; }
        .template-option { flex: 1; text-align: center; padding: 8px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .template-option.active { background: white; color: #1f6e8c; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        
        .preview-panel {
            background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .preview-header { padding: 15px 20px; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; background: white; }
        .download-btn {
            background: #1e6f5c; border: none; padding: 10px 20px; border-radius: 40px;
            color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .download-btn:hover { background: #0f5a4a; }
        
        .cv-preview { padding: 25px; background: white; margin: 15px; border-radius: 16px; }
        .template-modern .cv-name { font-size: 26px; font-weight: 800; color: #1e4a6b; text-align: center; }
        .template-modern .cv-title { text-align: center; color: #2c7da0; font-weight: 600; margin-top: 5px; }
        .template-modern .section-title-preview { font-size: 18px; font-weight: 800; border-right: 4px solid #2c7da0; padding-right: 10px; margin: 20px 0 10px; }
        
        .template-elegant .elegant-header { background: #2c3e4e; color: white; padding: 15px; margin: -25px -25px 20px -25px; border-radius: 16px 16px 30px 30px; }
        .template-elegant .section-title-preview { font-weight: 800; border-bottom: 2px solid #d4c2a7; display: inline-block; margin-bottom: 10px; }
        
        .template-premium .premium-header { display: flex; align-items: center; gap: 15px; background: linear-gradient(135deg, #1e4a6b, #2c7da0); color: white; padding: 15px; margin: -25px -25px 20px -25px; border-radius: 16px 16px 30px 30px; }
        .template-premium .premium-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #ffd966; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .template-premium .premium-name { font-size: 22px; font-weight: 800; }
        
        .skills-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .skill-tag { background: #eef2ff; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        .image-upload { display: none; margin-top: 15px; padding: 12px; background: #f0f9ff; border-radius: 20px; border: 1px dashed #2c7da0; }
        
        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            z-index: 9999; color: white; flex-direction: column; gap: 15px;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: #1e6f5c; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        footer { text-align: center; margin-top: 30px; font-size: 12px; color: #556b82; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-file-alt"></i> منشئ السيرة الذاتية الاحترافية</h1>
        <p>اختر قالبك، املأ بياناتك، وحمّل PDF</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-option active">✨ عصري</div>
                <div data-template="elegant" class="template-option">💎 أنيق</div>
                <div data-template="premium" class="template-option">🌟 بريميوم</div>
            </div>
            
            <div class="image-upload" id="imageUploadSection">
                <label><i class="fas fa-camera"></i> الصورة الشخصية (للبريميوم)</label>
                <input type="file" id="profileImage" accept="image/*">
            </div>
            
            <div class="form-group"><label>الاسم الكامل</label><input type="text" id="fullName" value="خالد حلمي خفاجي"></div>
            <div class="form-group"><label>المسمى الوظيفي</label><input type="text" id="jobTitle" value="خبير الرواتب | أخصائي موارد بشرية"></div>
            <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="email" value="khalid@example.com"></div>
            <div class="form-group"><label>رقم الهاتف</label><input type="text" id="phone" value="+201095890589"></div>
            <div class="form-group"><label>العنوان</label><input type="text" id="location" value="مصر"></div>
            <div class="form-group"><label>LinkedIn</label><input type="text" id="linkedin" value="linkedin.com/in/khalid-helmy"></div>
            <div class="form-group"><label>نبذة شخصية</label><textarea id="summary" rows="2">خبير رواتب بخبرة 15 عاماً في إدارة الرواتب الحكومية.</textarea></div>
            
            <div><span class="section-title">الخبرات العملية</span></div>
            <div id="experiencesContainer"></div>
            <button id="addExperienceBtn" class="add-btn"><i class="fas fa-plus"></i> إضافة خبرة</button>
            
            <div><span class="section-title">التعليم</span></div>
            <div id="educationContainer"></div>
            <button id="addEducationBtn" class="add-btn"><i class="fas fa-plus"></i> إضافة تعليم</button>
            
            <div class="form-group"><label>المهارات (افصل بينها بفاصلة)</label><input type="text" id="skills" value="HRIS, Excel متقدم, SAP, Oracle"></div>
            <div class="form-group"><label>اللغات</label><input type="text" id="languages" value="العربية (لغة أم)، الإنجليزية (ممتاز)"></div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3><i class="fas fa-eye"></i> معاينة السيرة الذاتية</h3>
                <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> تحميل PDF</button>
            </div>
            <div id="cvPreviewContainer" class="cv-preview template-modern"></div>
        </div>
    </div>
    <footer>يمكنك تعديل البيانات والتبديل بين القوالب — PDF بجودة عالية</footer>
</div>

<script>
    let experiences = [
        { title: "أخصائي رواتب أول", company: "هيئة البريد المصرية", startDate: "2014", endDate: "حالياً", description: "• إدارة كشوف رواتب 1,200+ موظف\n• تقليل وقت المعالجة بنسبة 30%\n• ضمان الامتثال الكامل للقوانين" }
    ];
    let educations = [
        { degree: "ليسانس الحقوق", institution: "جامعة القاهرة", year: "2018", description: "تخصص في القانون المصري" }
    ];
    let currentTemplate = "modern";
    let profileImageData = null;

    const fullNameInp = document.getElementById("fullName");
    const jobTitleInp = document.getElementById("jobTitle");
    const emailInp = document.getElementById("email");
    const phoneInp = document.getElementById("phone");
    const locationInp = document.getElementById("location");
    const linkedinInp = document.getElementById("linkedin");
    const summaryInp = document.getElementById("summary");
    const skillsInp = document.getElementById("skills");
    const languagesInp = document.getElementById("languages");
    const cvPreview = document.getElementById("cvPreviewContainer");
    const profileImageInput = document.getElementById("profileImage");
    const imageUploadSection = document.getElementById("imageUploadSection");

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    profileImageInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                profileImageData = event.target.result;
                updateCV();
            };
            reader.readAsDataURL(file);
        }
    });

    function renderForms() {
        const expContainer = document.getElementById("experiencesContainer");
        expContainer.innerHTML = "";
        experiences.forEach((exp, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="dynamic-item-header"><strong>خبرة ${idx+1}</strong><button class="remove-btn" data-exp="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" class="exp-title" value="${escapeHtml(exp.title)}" placeholder="المسمى"><br>
                <input type="text" class="exp-company" value="${escapeHtml(exp.company)}" placeholder="الشركة"><br>
                <input type="text" class="exp-start" value="${escapeHtml(exp.startDate)}" placeholder="البدء" style="width:48%">
                <input type="text" class="exp-end" value="${escapeHtml(exp.endDate)}" placeholder="النهاية" style="width:48%"><br>
                <textarea class="exp-desc" rows="3" placeholder="الوصف">${escapeHtml(exp.description)}</textarea>
            `;
            expContainer.appendChild(div);
        });
        
        const eduContainer = document.getElementById("educationContainer");
        eduContainer.innerHTML = "";
        educations.forEach((edu, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="dynamic-item-header"><strong>تعليم ${idx+1}</strong><button class="remove-btn" data-edu="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" class="edu-degree" value="${escapeHtml(edu.degree)}" placeholder="الدرجة"><br>
                <input type="text" class="edu-institution" value="${escapeHtml(edu.institution)}" placeholder="المؤسسة"><br>
                <input type="text" class="edu-year" value="${escapeHtml(edu.year)}" placeholder="السنة"><br>
                <textarea class="edu-desc" rows="2" placeholder="ملاحظات">${escapeHtml(edu.description)}</textarea>
            `;
            eduContainer.appendChild(div);
        });
        
        document.querySelectorAll("[data-exp]").forEach(btn => {
            btn.onclick = () => { experiences.splice(parseInt(btn.dataset.exp),1); renderForms(); updateCV(); };
        });
        document.querySelectorAll("[data-edu]").forEach(btn => {
            btn.onclick = () => { educations.splice(parseInt(btn.dataset.edu),1); renderForms(); updateCV(); };
        });
        
        document.querySelectorAll(".exp-title").forEach((inp, i) => inp.addEventListener('input', (e) => { experiences[i].title = e.target.value; updateCV(); }));
        document.querySelectorAll(".exp-company").forEach((inp, i) => inp.addEventListener('input', (e) => { experiences[i].company = e.target.value; updateCV(); }));
        document.querySelectorAll(".exp-start").forEach((inp, i) => inp.addEventListener('input', (e) => { experiences[i].startDate = e.target.value; updateCV(); }));
        document.querySelectorAll(".exp-end").forEach((inp, i) => inp.addEventListener('input', (e) => { experiences[i].endDate = e.target.value; updateCV(); }));
        document.querySelectorAll(".exp-desc").forEach((inp, i) => inp.addEventListener('input', (e) => { experiences[i].description = e.target.value; updateCV(); }));
        
        document.querySelectorAll(".edu-degree").forEach((inp, i) => inp.addEventListener('input', (e) => { educations[i].degree = e.target.value; updateCV(); }));
        document.querySelectorAll(".edu-institution").forEach((inp, i) => inp.addEventListener('input', (e) => { educations[i].institution = e.target.value; updateCV(); }));
        document.querySelectorAll(".edu-year").forEach((inp, i) => inp.addEventListener('input', (e) => { educations[i].year = e.target.value; updateCV(); }));
        document.querySelectorAll(".edu-desc").forEach((inp, i) => inp.addEventListener('input', (e) => { educations[i].description = e.target.value; updateCV(); }));
    }

    function updateCV() {
        const name = fullNameInp.value;
        const job = jobTitleInp.value;
        const email = emailInp.value;
        const phone = phoneInp.value;
        const loc = locationInp.value;
        const linked = linkedinInp.value;
        const summaryText = summaryInp.value;
        const skillsArr = skillsInp.value.split(',').map(s=>s.trim());
        const langs = languagesInp.value;
        
        if (currentTemplate === "premium") {
            const avatarHtml = profileImageData ? `<img class="premium-avatar" src="${profileImageData}">` : `<div class="premium-avatar"><i class="fas fa-user"></i></div>`;
            cvPreview.innerHTML = `<div class="template-premium">
                <div class="premium-header">${avatarHtml}<div><div class="premium-name">${escapeHtml(name)}</div><div>${escapeHtml(job)}</div><div style="font-size:11px"><i class="fas fa-envelope"></i> ${escapeHtml(email)} | <i class="fas fa-phone"></i> ${escapeHtml(phone)}</div></div></div>
                <div><div class="section-title-preview">نبذة</div><p>${escapeHtml(summaryText)}</p></div>
                <div><div class="section-title-preview">الخبرات</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div>`).join('')}</div>
                <div><div class="section-title-preview">التعليم</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div>`).join('')}</div>
                <div><div class="section-title-preview">المهارات</div><div class="skills-list">${skillsArr.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
                <div><div class="section-title-preview">اللغات</div><p>${escapeHtml(langs)}</p></div>
            </div>`;
        } else if (currentTemplate === "modern") {
            cvPreview.innerHTML = `<div class="template-modern">
                <div class="cv-name">${escapeHtml(name)}</div>
                <div class="cv-title">${escapeHtml(job)}</div>
                <div style="text-align:center; font-size:12px; margin:8px 0"><i class="fas fa-envelope"></i> ${escapeHtml(email)} | <i class="fas fa-phone"></i> ${escapeHtml(phone)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(loc)} ${linked ? `| <i class="fab fa-linkedin"></i> ${escapeHtml(linked)}` : ''}</div>
                <div><div class="section-title-preview">نبذة</div><p>${escapeHtml(summaryText)}</p></div>
                <div><div class="section-title-preview">الخبرات</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div>`).join('')}</div>
                <div><div class="section-title-preview">التعليم</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div>`).join('')}</div>
                <div><div class="section-title-preview">المهارات</div><div class="skills-list">${skillsArr.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
                <div><div class="section-title-preview">اللغات</div><p>${escapeHtml(langs)}</p></div>
            </div>`;
        } else {
            cvPreview.innerHTML = `<div class="template-elegant">
                <div class="elegant-header"><div style="font-size:22px; font-weight:800">${escapeHtml(name)}</div><div>${escapeHtml(job)}</div><div style="font-size:11px">${escapeHtml(email)} | ${escapeHtml(phone)}</div></div>
                <div><div class="section-title-preview">نبذة</div><p>${escapeHtml(summaryText)}</p></div>
                <div><div class="section-title-preview">الخبرات</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div><hr/>`).join('')}</div>
                <div><div class="section-title-preview">التعليم</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div><hr/>`).join('')}</div>
                <div><div class="section-title-preview">المهارات</div><div class="skills-list">${skillsArr.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
                <div><div class="section-title-preview">اللغات</div><p>${escapeHtml(langs)}</p></div>
            </div>`;
        }
        cvPreview.className = `cv-preview template-${currentTemplate}`;
    }

    function toggleImageUpload() {
        imageUploadSection.style.display = currentTemplate === "premium" ? "block" : "none";
    }

    document.getElementById("addExperienceBtn").onclick = () => {
        experiences.push({ title: "مسمى وظيفي", company: "الشركة", startDate: "2024", endDate: "الآن", description: "" });
        renderForms();
        updateCV();
    };
    document.getElementById("addEducationBtn").onclick = () => {
        educations.push({ degree: "درجة علمية", institution: "الجامعة", year: "2024", description: "" });
        renderForms();
        updateCV();
    };
    
    document.querySelectorAll(".template-option").forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll(".template-option").forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            currentTemplate = opt.dataset.template;
            toggleImageUpload();
            updateCV();
        };
    });
    
    const inputIds = ["fullName", "jobTitle", "email", "phone", "location", "linkedin", "summary", "skills", "languages"];
    inputIds.forEach(id => document.getElementById(id).addEventListener('input', () => updateCV()));
    
    async function downloadPDF() {
        const loader = document.createElement('div');
        loader.className = 'loading';
        loader.innerHTML = '<div class="spinner"></div><div>جاري تجهيز السيرة الذاتية...</div>';
        document.body.appendChild(loader);
        
        try {
            const originalStyle = cvPreview.style.cssText;
            cvPreview.style.width = "794px";
            cvPreview.style.margin = "0 auto";
            cvPreview.style.padding = "12mm 10mm";
            cvPreview.style.background = "white";
            
            await new Promise(r => setTimeout(r, 100));
            
            const canvas = await html2canvas(cvPreview, { scale: 3, backgroundColor: '#ffffff', logging: false });
            cvPreview.style.cssText = originalStyle;
            
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
            pdf.save(`CV_${fullNameInp.value.replace(/\s/g, '_')}.pdf`);
            
        } catch(err) {
            console.error(err);
            alert("حدث خطأ، حاول مرة أخرى");
        } finally {
            document.body.removeChild(loader);
        }
    }
    
    document.getElementById("downloadBtn").addEventListener("click", downloadPDF);
    
    renderForms();
    updateCV();
    toggleImageUpload();
</script>
</body>
</html>
