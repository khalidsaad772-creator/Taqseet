<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الاحترافية | PDF عربي نصي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- jsPDF مع دعم اللغة العربية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            direction: rtl;
        }
        body.english { direction: ltr; text-align: left; }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .lang-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .lang-btn {
            background: white; border: none; padding: 8px 20px; border-radius: 30px;
            font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .lang-btn.active { background: #1e6f5c; color: white; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #1e4a6b; font-size: 24px; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        
        .form-panel {
            background: white; border-radius: 20px; padding: 20px;
            max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 13px; color: #1e4a6b; }
        input, textarea {
            width: 100%; padding: 10px 15px; border: 1px solid #ddd;
            border-radius: 12px; font-family: 'Cairo', sans-serif; font-size: 14px;
        }
        input:focus, textarea:focus { outline: none; border-color: #2c7da0; }
        
        .section-title { font-size: 18px; font-weight: 800; border-bottom: 3px solid #2c7da0; display: inline-block; margin: 15px 0 10px 0; }
        
        .dynamic-item { background: #f8fafc; border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 8px 18px; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 5px; display: inline-flex; align-items: center; gap: 8px; }
        
        .template-selector { display: flex; gap: 10px; margin: 15px 0; background: #f1f5f9; padding: 5px; border-radius: 50px; }
        .template-opt { flex: 1; text-align: center; padding: 8px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .template-opt.active { background: white; color: #1f6e8c; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        
        .preview-panel {
            background: white; border-radius: 20px; box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .preview-header {
            padding: 15px 20px; border-bottom: 1px solid #e9edf2;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            background: white;
        }
        .download-btn {
            background: #1e6f5c; border: none; padding: 8px 20px; border-radius: 30px;
            color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .download-btn:hover { background: #0f5a4a; }
        
        .cv-preview {
            padding: 25px; background: white; margin: 15px; border-radius: 16px;
        }
        .template-modern .cv-name { font-size: 26px; font-weight: 800; color: #1e4a6b; text-align: center; }
        .template-modern .cv-title { text-align: center; color: #2c7da0; font-weight: 600; }
        .template-modern .section-preview-title { font-size: 18px; font-weight: 800; border-right: 4px solid #2c7da0; padding-right: 10px; margin: 20px 0 10px 0; }
        
        .template-elegant .elegant-header { background: #2c3e4e; color: white; padding: 20px; margin: -25px -25px 20px -25px; border-radius: 16px 16px 30px 30px; }
        .template-elegant .section-preview-title { font-weight: 800; border-bottom: 2px solid #d4c2a7; display: inline-block; margin: 15px 0 8px 0; }
        
        .template-sidebar { display: grid; grid-template-columns: 0.9fr 2.1fr; gap: 20px; }
        .template-sidebar .sidebar-col { background: #eef3fa; padding: 15px; border-radius: 16px; }
        .template-sidebar .section-preview-title { font-weight: 800; border-bottom: 2px solid #cbd5e1; margin: 15px 0 8px 0; }
        
        .job-item { margin-bottom: 15px; }
        .job-title { font-weight: 800; }
        .job-date { font-size: 12px; color: #5b6e8c; }
        .job-desc { font-size: 13px; white-space: pre-line; margin-top: 5px; }
        .skills-badge { display: inline-block; background: #eef2ff; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 3px; }
        
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        footer { text-align: center; margin-top: 30px; font-size: 12px; color: #556b82; }
        
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 9999; color: white; flex-direction: column; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: #1e6f5c; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="lang-buttons">
        <button id="btnAr" class="lang-btn active">🇸🇦 العربية</button>
        <button id="btnEn" class="lang-btn">🇬🇧 English</button>
    </div>
    <div class="header">
        <h1><span id="mainTitle">منشئ السيرة الذاتية الاحترافية</span></h1>
        <p id="subTitle">أدخل بياناتك، اختر قالبك، وحمّل PDF عربي نصي قابل للنسخ</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-opt active" id="tempModern">✨ عصري</div>
                <div data-template="elegant" class="template-opt" id="tempElegant">💎 أنيق</div>
                <div data-template="sidebar" class="template-opt" id="tempSidebar">📐 جانبي</div>
            </div>

            <div class="form-group"><label><i class="fas fa-user"></i> <span class="lbl-fullname">الاسم الكامل</span></label><input type="text" id="inputName" value="خالد حلمي خفاجي"></div>
            <div class="form-group"><label><i class="fas fa-briefcase"></i> <span class="lbl-title">المسمى الوظيفي</span></label><input type="text" id="inputJob" value="أخصائي رواتب وأنظمة موارد بشرية"></div>
            <div class="form-group"><label><i class="fas fa-envelope"></i> <span class="lbl-email">البريد الإلكتروني</span></label><input type="email" id="inputEmail" value="khalid@example.com"></div>
            <div class="form-group"><label><i class="fas fa-phone"></i> <span class="lbl-phone">رقم الهاتف</span></label><input type="text" id="inputPhone" value="+20123456789"></div>
            <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> <span class="lbl-location">العنوان</span></label><input type="text" id="inputLocation" value="مصر"></div>
            <div class="form-group"><label><i class="fab fa-linkedin"></i> LinkedIn</label><input type="text" id="inputLinkedin" value="linkedin.com/in/khalid"></div>
            <div class="form-group"><label><i class="fas fa-align-left"></i> <span class="lbl-summary">نبذة شخصية</span></label><textarea id="inputSummary" rows="3">أخصائي رواتب موجه للنتائج بخبرة تزيد عن 15 عاماً في إدارة الرواتب للقطاع الحكومي. خلفية في القانون المصري مع خبرة تقنية في SAP و Oracle تضمن الامتثال الكامل لقوانين العمل والتأمينات الاجتماعية.</textarea></div>

            <div><span class="section-title"><span class="lbl-experience">الخبرات العملية</span></span></div>
            <div id="expList"></div>
            <button id="addExpBtn" class="add-btn"><i class="fas fa-plus"></i> <span class="lbl-add-exp">إضافة خبرة</span></button>

            <div><span class="section-title"><span class="lbl-education">التعليم</span></span></div>
            <div id="eduList"></div>
            <button id="addEduBtn" class="add-btn"><i class="fas fa-plus"></i> <span class="lbl-add-edu">إضافة تعليم</span></button>

            <div class="form-group"><label><i class="fas fa-code"></i> <span class="lbl-skills">المهارات (افصل بينها بفاصلة)</span></label><input type="text" id="inputSkills" value="HRIS, Excel متقدم, SAP, Oracle, Adobe Suite"></div>
            <div class="form-group"><label><i class="fas fa-language"></i> <span class="lbl-langs">اللغات</span></label><input type="text" id="inputLangs" value="العربية (لغة أم)، الإنجليزية (ممتاز)"></div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3><i class="fas fa-eye"></i> <span id="previewTitle">معاينة السيرة الذاتية</span></h3>
                <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> <span id="downloadText">تحميل PDF (عربي نصي)</span></button>
            </div>
            <div id="cvPreview" class="cv-preview template-modern"></div>
        </div>
    </div>
    <footer>الآن PDF يدعم اللغة العربية بشكل كامل ونص قابل للنسخ</footer>
</div>

<script>
    // ===================== البيانات الافتراضية =====================
    let experiences = [
        { title: "أخصائي رواتب أول", company: "هيئة البريد المصرية", startDate: "2014", endDate: "حالياً", desc: "• إدارة كشوف رواتب 1,200+ موظف باستخدام SAP وOracle بدقة 99.9%\n• تقليل وقت معالجة الرواتب بنسبة 30% من خلال الأتمتة\n• ضمان الامتثال الكامل للتأمينات الاجتماعية والضرائب\n• إدارة سجلات الموظفين عبر منصات ERP\n• إعداد تقارير مالية وموارد بشرية لدعم المراجعات\n• حل 50+ تذكرة نظام سنوياً" }
    ];
    let educations = [
        { degree: "ليسانس الحقوق", institution: "جامعة القاهرة", year: "2005", desc: "تخصص في القانون المصري والامتثال القانوني" }
    ];

    let currentTemplate = "modern";
    let currentLang = "ar";

    const cvDiv = document.getElementById("cvPreview");
    const expContainer = document.getElementById("expList");
    const eduContainer = document.getElementById("eduList");

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function reverseArabic(str) {
        // دالة لعكس النص العربي ليتوافق مع jsPDF
        if (!str) return "";
        return str.split('').reverse().join('');
    }

    function renderForms() {
        expContainer.innerHTML = "";
        experiences.forEach((exp, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="item-header"><strong>${currentLang === 'ar' ? `خبرة ${idx+1}` : `Experience ${idx+1}`}</strong><button class="remove-btn" data-exp="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" id="exp_title_${idx}" value="${escapeHtml(exp.title)}" placeholder="المسمى الوظيفي" style="margin-bottom:8px; width:100%;">
                <input type="text" id="exp_company_${idx}" value="${escapeHtml(exp.company)}" placeholder="اسم الشركة" style="margin-bottom:8px; width:100%;">
                <input type="text" id="exp_start_${idx}" value="${escapeHtml(exp.startDate)}" placeholder="تاريخ البدء" style="width:48%; display:inline-block;">
                <input type="text" id="exp_end_${idx}" value="${escapeHtml(exp.endDate)}" placeholder="تاريخ الانتهاء" style="width:48%; display:inline-block;">
                <textarea id="exp_desc_${idx}" rows="3" placeholder="وصف المهام" style="width:100%; margin-top:8px;">${escapeHtml(exp.desc)}</textarea>
            `;
            expContainer.appendChild(div);
            
            document.getElementById(`exp_title_${idx}`).addEventListener('input', (e) => { experiences[idx].title = e.target.value; updatePreview(); });
            document.getElementById(`exp_company_${idx}`).addEventListener('input', (e) => { experiences[idx].company = e.target.value; updatePreview(); });
            document.getElementById(`exp_start_${idx}`).addEventListener('input', (e) => { experiences[idx].startDate = e.target.value; updatePreview(); });
            document.getElementById(`exp_end_${idx}`).addEventListener('input', (e) => { experiences[idx].endDate = e.target.value; updatePreview(); });
            document.getElementById(`exp_desc_${idx}`).addEventListener('input', (e) => { experiences[idx].desc = e.target.value; updatePreview(); });
        });
        
        eduContainer.innerHTML = "";
        educations.forEach((edu, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="item-header"><strong>${currentLang === 'ar' ? `تعليم ${idx+1}` : `Education ${idx+1}`}</strong><button class="remove-btn" data-edu="${idx}"><i class="fas fa-trash"></i></button></div>
                <input type="text" id="edu_degree_${idx}" value="${escapeHtml(edu.degree)}" placeholder="الدرجة العلمية" style="margin-bottom:8px; width:100%;">
                <input type="text" id="edu_institution_${idx}" value="${escapeHtml(edu.institution)}" placeholder="المؤسسة" style="margin-bottom:8px; width:100%;">
                <input type="text" id="edu_year_${idx}" value="${escapeHtml(edu.year)}" placeholder="السنة" style="margin-bottom:8px; width:100%;">
                <textarea id="edu_desc_${idx}" rows="2" placeholder="ملاحظات" style="width:100%;">${escapeHtml(edu.desc)}</textarea>
            `;
            eduContainer.appendChild(div);
            
            document.getElementById(`edu_degree_${idx}`).addEventListener('input', (e) => { educations[idx].degree = e.target.value; updatePreview(); });
            document.getElementById(`edu_institution_${idx}`).addEventListener('input', (e) => { educations[idx].institution = e.target.value; updatePreview(); });
            document.getElementById(`edu_year_${idx}`).addEventListener('input', (e) => { educations[idx].year = e.target.value; updatePreview(); });
            document.getElementById(`edu_desc_${idx}`).addEventListener('input', (e) => { educations[idx].desc = e.target.value; updatePreview(); });
        });
        
        document.querySelectorAll("[data-exp]").forEach(btn => { btn.addEventListener('click', (e) => { experiences.splice(parseInt(btn.dataset.exp), 1); renderForms(); updatePreview(); }); });
        document.querySelectorAll("[data-edu]").forEach(btn => { btn.addEventListener('click', (e) => { educations.splice(parseInt(btn.dataset.education), 1); renderForms(); updatePreview(); }); });
    }
    
    function updatePreview() {
        const name = document.getElementById("inputName").value;
        const job = document.getElementById("inputJob").value;
        const email = document.getElementById("inputEmail").value;
        const phone = document.getElementById("inputPhone").value;
        const location = document.getElementById("inputLocation").value;
        const linkedin = document.getElementById("inputLinkedin").value;
        const summaryText = document.getElementById("inputSummary").value;
        const skillsArr = document.getElementById("inputSkills").value.split(',').map(s=>s.trim());
        const langs = document.getElementById("inputLangs").value;
        
        const sumSec = currentLang === 'ar' ? "نبذة شخصية" : "Summary";
        const expSec = currentLang === 'ar' ? "الخبرات العملية" : "Work Experience";
        const eduSec = currentLang === 'ar' ? "التعليم" : "Education";
        const skSec = currentLang === 'ar' ? "المهارات" : "Skills";
        const langSec = currentLang === 'ar' ? "اللغات" : "Languages";
        
        if (currentTemplate === "sidebar") {
            cvDiv.innerHTML = `<div class="template-sidebar">
                <div class="sidebar-col">
                    <div style="font-weight:800; font-size:18px;">${escapeHtml(name)}</div>
                    <div style="color:#2c7da0;">${escapeHtml(job)}</div><hr>
                    <div><i class="fas fa-envelope"></i> ${escapeHtml(email)}</div>
                    <div><i class="fas fa-phone"></i> ${escapeHtml(phone)}</div>
                    <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(location)}</div>
                    ${linkedin ? `<div><i class="fab fa-linkedin"></i> ${escapeHtml(linkedin)}</div>` : ''}<hr>
                    <div><strong>${skSec}</strong><br>${skillsArr.map(s => `• ${escapeHtml(s)}`).join('<br>')}</div><hr>
                    <div><strong>${langSec}</strong><br>${escapeHtml(langs)}</div>
                </div>
                <div class="main-col">
                    <div><div class="section-preview-title">${sumSec}</div><p>${escapeHtml(summaryText)}</p></div>
                    <div><div class="section-preview-title">${expSec}</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.desc)}</p></div><br/>`).join('')}</div>
                    <div><div class="section-preview-title">${eduSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div><br/>`).join('')}</div>
                </div>
            </div>`;
            cvDiv.className = "cv-preview template-sidebar";
        } 
        else if (currentTemplate === "modern") {
            cvDiv.innerHTML = `<div class="cv-name">${escapeHtml(name)}</div><div class="cv-title">${escapeHtml(job)}</div>
            <div style="text-align:center; font-size:13px; margin:10px 0;"><i class="fas fa-envelope"></i> ${escapeHtml(email)} | <i class="fas fa-phone"></i> ${escapeHtml(phone)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(location)} ${linkedin ? `| <i class="fab fa-linkedin"></i> ${escapeHtml(linkedin)}` : ''}</div>
            <div><div class="section-preview-title">${sumSec}</div><p>${escapeHtml(summaryText)}</p></div>
            <div><div class="section-preview-title">${expSec}</div>${experiences.map(exp => `<div class="job-item"><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><div class="job-desc">${escapeHtml(exp.desc)}</div></div>`).join('')}</div>
            <div><div class="section-preview-title">${eduSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div>`).join('')}</div>
            <div><div class="section-preview-title">${skSec}</div>${skillsArr.map(s => `<span class="skills-badge">${escapeHtml(s)}</span>`).join('')}</div>
            <div><div class="section-preview-title">${langSec}</div><p>${escapeHtml(langs)}</p></div>`;
            cvDiv.className = "cv-preview template-modern";
        }
        else {
            cvDiv.innerHTML = `<div class="elegant-header"><div style="font-size:24px; font-weight:800;">${escapeHtml(name)}</div><div>${escapeHtml(job)}</div><div style="font-size:12px;">${escapeHtml(email)} | ${escapeHtml(phone)} | ${escapeHtml(location)}</div></div>
            <div><div class="section-preview-title">${sumSec}</div><p>${escapeHtml(summaryText)}</p></div>
            <div><div class="section-preview-title">${expSec}</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.desc)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-preview-title">${eduSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.desc)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-preview-title">${skSec}</div>${skillsArr.map(s => `<span class="skills-badge">${escapeHtml(s)}</span>`).join('')}</div>
            <div><div class="section-preview-title">${langSec}</div><p>${escapeHtml(langs)}</p></div>`;
            cvDiv.className = "cv-preview template-elegant";
        }
    }
    
    function updateLanguage() {
        const isAr = currentLang === 'ar';
        document.querySelectorAll(".lbl-fullname").forEach(el => el.innerText = isAr ? "الاسم الكامل" : "Full Name");
        document.querySelectorAll(".lbl-title").forEach(el => el.innerText = isAr ? "المسمى الوظيفي" : "Job Title");
        document.querySelectorAll(".lbl-email").forEach(el => el.innerText = isAr ? "البريد الإلكتروني" : "Email");
        document.querySelectorAll(".lbl-phone").forEach(el => el.innerText = isAr ? "رقم الهاتف" : "Phone");
        document.querySelectorAll(".lbl-location").forEach(el => el.innerText = isAr ? "العنوان" : "Location");
        document.querySelectorAll(".lbl-summary").forEach(el => el.innerText = isAr ? "نبذة شخصية" : "Professional Summary");
        document.querySelectorAll(".lbl-experience").forEach(el => el.innerText = isAr ? "الخبرات العملية" : "Work Experience");
        document.querySelectorAll(".lbl-education").forEach(el => el.innerText = isAr ? "التعليم" : "Education");
        document.querySelectorAll(".lbl-skills").forEach(el => el.innerText = isAr ? "المهارات (افصل بينها بفاصلة)" : "Skills (comma separated)");
        document.querySelectorAll(".lbl-langs").forEach(el => el.innerText = isAr ? "اللغات" : "Languages");
        document.querySelectorAll(".lbl-add-exp").forEach(el => el.innerText = isAr ? "إضافة خبرة" : "Add Experience");
        document.querySelectorAll(".lbl-add-edu").forEach(el => el.innerText = isAr ? "إضافة تعليم" : "Add Education");
        document.getElementById("mainTitle").innerText = isAr ? "منشئ السيرة الذاتية الاحترافية" : "Professional CV Builder";
        document.getElementById("subTitle").innerText = isAr ? "أدخل بياناتك، اختر قالبك، وحمّل PDF عربي نصي قابل للنسخ" : "Enter your data, choose your template, and download Arabic selectable-text PDF";
        document.getElementById("previewTitle").innerText = isAr ? "معاينة السيرة الذاتية" : "CV Preview";
        document.getElementById("downloadText").innerText = isAr ? "تحميل PDF (عربي نصي)" : "Download PDF (Arabic Text)";
        document.getElementById("tempModern").innerText = isAr ? "✨ عصري" : "✨ Modern";
        document.getElementById("tempElegant").innerText = isAr ? "💎 أنيق" : "💎 Elegant";
        document.getElementById("tempSidebar").innerText = isAr ? "📐 جانبي" : "📐 Sidebar";
        
        document.body.classList.toggle('english', !isAr);
        renderForms();
        updatePreview();
    }
    
    document.getElementById("addExpBtn").onclick = () => { experiences.push({ title: "مسمى وظيفي", company: "اسم الشركة", startDate: "2024", endDate: "الآن", desc: "" }); renderForms(); updatePreview(); };
    document.getElementById("addEduBtn").onclick = () => { educations.push({ degree: "درجة علمية", institution: "اسم الجامعة", year: "2024", desc: "" }); renderForms(); updatePreview(); };
    
    document.querySelectorAll(".template-opt").forEach(opt => { opt.onclick = () => { document.querySelectorAll(".template-opt").forEach(o => o.classList.remove('active')); opt.classList.add('active'); currentTemplate = opt.dataset.template; updatePreview(); }; });
    
    document.getElementById("btnAr").onclick = () => { currentLang = "ar"; document.getElementById("btnAr").classList.add('active'); document.getElementById("btnEn").classList.remove('active'); updateLanguage(); };
    document.getElementById("btnEn").onclick = () => { currentLang = "en"; document.getElementById("btnEn").classList.add('active'); document.getElementById("btnAr").classList.remove('active'); updateLanguage(); };
    
    const inputIds = ["inputName", "inputJob", "inputEmail", "inputPhone", "inputLocation", "inputLinkedin", "inputSummary", "inputSkills", "inputLangs"];
    inputIds.forEach(id => { document.getElementById(id).addEventListener('input', () => updatePreview()); });
    
    // ===================== PDF النصي الذي يدعم اللغة العربية =====================
    document.getElementById("downloadBtn").onclick = async () => {
        const loader = document.createElement('div'); loader.className = 'loading'; loader.innerHTML = '<div class="spinner"></div><div>جاري إنشاء PDF العربي...</div>'; document.body.appendChild(loader);
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            
            // الحصول على البيانات
            const name = document.getElementById("inputName").value;
            const job = document.getElementById("inputJob").value;
            const email = document.getElementById("inputEmail").value;
            const phone = document.getElementById("inputPhone").value;
            const location = document.getElementById("inputLocation").value;
            const linkedin = document.getElementById("inputLinkedin").value;
            const summaryText = document.getElementById("inputSummary").value;
            const skillsArr = document.getElementById("inputSkills").value.split(',').map(s=>s.trim());
            const langs = document.getElementById("inputLangs").value;
            
            const sumSec = currentLang === 'ar' ? "نبذة شخصية" : "Summary";
            const expSec = currentLang === 'ar' ? "الخبرات العملية" : "Work Experience";
            const eduSec = currentLang === 'ar' ? "التعليم" : "Education";
            const skSec = currentLang === 'ar' ? "المهارات" : "Skills";
            const langSec = currentLang === 'ar' ? "اللغات" : "Languages";
            
            let y = 20;
            const leftMargin = 20;
            const rightAlign = currentLang === 'ar';
            
            // دالة لإضافة النص مع دعم العربية
            function addText(text, x, y, fontSize, isBold = false, isRTL = false) {
                if (!text) return;
                pdf.setFontSize(fontSize);
                pdf.setFont("helvetica", isBold ? "bold" : "normal");
                if (isRTL && currentLang === 'ar') {
                    // لعرض اللغة العربية بشكل صحيح
                    const reversed = text.split('').reverse().join('');
                    pdf.text(reversed, x, y, { align: "right" });
                } else {
                    pdf.text(text, x, y);
                }
            }
            
            // الاسم (يتم عرضه من اليمين لليسار)
            pdf.setFontSize(22);
            pdf.setFont("helvetica", "bold");
            const reversedName = name.split('').reverse().join('');
            pdf.text(reversedName, 200, y, { align: "right" });
            y += 10;
            
            // المسمى الوظيفي
            pdf.setFontSize(12);
            pdf.setFont("helvetica", "normal");
            const reversedJob = job.split('').reverse().join('');
            pdf.text(reversedJob, 200, y, { align: "right" });
            y += 8;
            
            // معلومات الاتصال
            pdf.setFontSize(9);
            const contactText = `البريد: ${email}  |  الهاتف: ${phone}  |  العنوان: ${location}`;
            const reversedContact = contactText.split('').reverse().join('');
            pdf.text(reversedContact, 200, y, { align: "right" });
            if (linkedin) { y += 5; const linkedText = `LinkedIn: ${linkedin}`; pdf.text(linkedText.split('').reverse().join(''), 200, y, { align: "right" }); }
            y += 12;
            
            // نبذة شخصية
            pdf.setFontSize(14);
            pdf.setFont("helvetica", "bold");
            pdf.text(sumSec.split('').reverse().join(''), 200, y, { align: "right" });
            y += 7;
            pdf.setFontSize(10);
            pdf.setFont("helvetica", "normal");
            const summaryLines = pdf.splitTextToSize(summaryText.split('').reverse().join(''), 160);
            for (let line of summaryLines) { pdf.text(line, 200, y, { align: "right" }); y += 5; }
            y += 6;
            
            // الخبرات العملية
            pdf.setFontSize(14);
            pdf.setFont("helvetica", "bold");
            pdf.text(expSec.split('').reverse().join(''), 200, y, { align: "right" });
            y += 7;
            pdf.setFontSize(10);
            pdf.setFont("helvetica", "normal");
            for (let exp of experiences) {
                const expTitle = `${exp.title} @ ${exp.company} (${exp.startDate}-${exp.endDate})`;
                pdf.setFont("helvetica", "bold");
                pdf.text(expTitle.split('').reverse().join(''), 200, y, { align: "right" });
                y += 5;
                pdf.setFont("helvetica", "normal");
                const descLines = pdf.splitTextToSize(exp.desc.split('').reverse().join(''), 160);
                for (let line of descLines) { pdf.text(line, 200, y, { align: "right" }); y += 4.5; }
                y += 5;
                if (y > 270) { pdf.addPage(); y = 20; }
            }
            
            // التعليم
            pdf.setFontSize(14);
            pdf.setFont("helvetica", "bold");
            pdf.text(eduSec.split('').reverse().join(''), 200, y, { align: "right" });
            y += 7;
            pdf.setFontSize(10);
            pdf.setFont("helvetica", "normal");
            for (let edu of educations) {
                const eduTitle = `${edu.degree} - ${edu.institution} (${edu.year})`;
                pdf.text(eduTitle.split('').reverse().join(''), 200, y, { align: "right" });
                y += 5;
                const eduLines = pdf.splitTextToSize(edu.desc.split('').reverse().join(''), 160);
                for (let line of eduLines) { pdf.text(line, 200, y, { align: "right" }); y += 4.5; }
                y += 5;
                if (y > 270) { pdf.addPage(); y = 20; }
            }
            
            // المهارات
            pdf.setFontSize(14);
            pdf.setFont("helvetica", "bold");
            pdf.text(skSec.split('').reverse().join(''), 200, y, { align: "right" });
            y += 7;
            pdf.setFontSize(10);
            pdf.setFont("helvetica", "normal");
            const skillsText = skillsArr.join(' • ');
            pdf.text(skillsText.split('').reverse().join(''), 200, y, { align: "right" });
            y += 10;
            
            // اللغات
            pdf.setFontSize(14);
            pdf.setFont("helvetica", "bold");
            pdf.text(langSec.split('').reverse().join(''), 200, y, { align: "right" });
            y += 7;
            pdf.setFontSize(10);
            pdf.setFont("helvetica", "normal");
            pdf.text(langs.split('').reverse().join(''), 200, y, { align: "right" });
            
            pdf.save(`CV_${name.replace(/\s/g, '_')}.pdf`);
            
        } catch (err) { console.error(err); alert("حدث خطأ أثناء إنشاء PDF"); }
        finally { document.body.removeChild(loader); }
    };
    
    renderForms();
    updateLanguage();
    updatePreview();
</script>
</body>
</html>
