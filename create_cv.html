<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ السيرة الذاتية الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Tajawal', 'Inter', sans-serif;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        body.english-mode { direction: ltr; text-align: left; font-family: 'Inter', 'Tajawal', sans-serif; }
        .app-container { max-width: 1400px; margin: 0 auto; }
        
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 0.5rem; }
        .lang-btn {
            background: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px;
            font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: inline-flex; align-items: center; gap: 8px;
        }
        .lang-btn.active { background: #1e6f5c; color: white; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.8rem; font-weight: 800; color: #1e4a6b; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; margin-bottom: 2rem; }
        .form-panel {
            background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.5rem; max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 700; margin-bottom: 0.4rem; color: #1e4a6b; font-size: 0.85rem; }
        input, textarea, select {
            width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0;
            border-radius: 18px; font-family: 'Tajawal', sans-serif; font-size: 0.9rem;
        }
        input:focus, textarea:focus { outline: none; border-color: #2c7da0; }
        .section-title { font-size: 1.2rem; font-weight: 800; border-bottom: 3px solid #2c7da0; display: inline-block; margin: 1.2rem 0 0.8rem 0; color: #1e4a6b; }
        .dynamic-item { background: #f8fafc; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #eef2f8; }
        .dynamic-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; font-weight: bold; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; color: #1e4a6b; cursor: pointer; margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 8px; }
        .template-selector { background: #f1f5f9; border-radius: 40px; padding: 0.2rem; display: flex; margin: 1rem 0 1.2rem 0; gap: 0.5rem; }
        .template-option { flex: 1; text-align: center; padding: 0.6rem; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .template-option.active { background: white; color: #1f6e8c; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        
        .preview-panel { background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .preview-header { background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .send-btn {
            background: #25D366; border: none; padding: 0.6rem 1.5rem; border-radius: 40px;
            color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-size: 0.9rem; transition: 0.2s;
        }
        .send-btn:hover { background: #128C7E; transform: scale(1.02); }
        
        .cv-preview { padding: 1.5rem; background: white; margin: 1rem; border-radius: 16px; width: 100%; font-size: 11pt; line-height: 1.5; }
        
        .template-modern .cv-name { font-size: 1.6rem; font-weight: 800; color: #1e4a6b; text-align: center; }
        .template-modern .cv-title { text-align: center; color: #2c7da0; font-weight: 600; margin: 5px 0; }
        .template-modern .section-title-preview { font-size: 1rem; font-weight: 800; border-right: 4px solid #2c7da0; padding-right: 0.7rem; margin: 1rem 0 0.6rem 0; color: #1e4a6b; }
        
        .template-elegant .elegant-header { background: #2c3e4e; color: white; padding: 1.2rem; margin: -1.5rem -1.5rem 1rem -1.5rem; border-radius: 16px 16px 30px 30px; }
        .template-elegant .section-title-preview { font-weight: 800; border-bottom: 2px solid #d4c2a7; display: inline-block; margin-bottom: 0.6rem; }
        
        .template-premium .premium-header { display: flex; align-items: center; gap: 1rem; background: linear-gradient(135deg, #1e4a6b, #2c7da0); color: white; padding: 1rem; margin: -1.5rem -1.5rem 1rem -1.5rem; border-radius: 16px 16px 30px 30px; }
        .template-premium .premium-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid #ffd966; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .template-premium .premium-name { font-size: 1.3rem; font-weight: 800; }
        .template-premium .section-title-preview { font-weight: 800; border-right: 4px solid #ffd966; padding-right: 0.7rem; margin: 1rem 0 0.6rem 0; }
        
        .job-item { margin-bottom: 0.8rem; }
        .job-title { font-weight: 800; font-size: 0.9rem; }
        .job-date { font-size: 0.7rem; color: #5b6e8c; margin-bottom: 0.3rem; }
        .job-desc { font-size: 0.8rem; white-space: pre-line; }
        .skills-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .skill-tag { background: #eef2ff; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; }
        
        .image-upload { margin-top: 1rem; padding: 1rem; background: #f0f9ff; border-radius: 20px; border: 1px dashed #2c7da0; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            z-index: 9999; color: white; flex-direction: column; gap: 1rem;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #fff; border-top-color: #25D366; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #556b82; }
        body.english-mode .template-modern .section-title-preview,
        body.english-mode .template-premium .section-title-preview { border-right: none; border-left: 4px solid #2c7da0; padding-left: 0.7rem; padding-right: 0; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="lang-switch">
        <button id="langArBtn" class="lang-btn active"><i class="fas fa-language"></i> العربية</button>
        <button id="langEnBtn" class="lang-btn"><i class="fas fa-language"></i> English</button>
    </div>
    <div class="header">
        <h1 id="mainTitle"><i class="fas fa-file-alt"></i> منشئ السيرة الذاتية الاحترافية</h1>
        <p id="subTitle">أنشئ سيرتك الذاتية وسيتم التواصل معك عبر واتساب لتسليمها</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-option active" id="tempModern">✨ عصري</div>
                <div data-template="elegant" class="template-option" id="tempElegant">💎 أنيق</div>
                <div data-template="premium" class="template-option" id="tempPremium">🌟 بريميوم</div>
            </div>
            
            <div class="image-upload" id="imageUploadSection" style="display: none;">
                <label><i class="fas fa-camera"></i> <span id="photoLabel">الصورة الشخصية</span></label>
                <input type="file" id="profileImage" accept="image/*">
            </div>
            
            <div class="form-group"><label id="fullNameLabel">الاسم الكامل</label><input type="text" id="fullName" value="خالد حلمي خفاجي"></div>
            <div class="form-group"><label id="jobTitleLabel">المسمى الوظيفي</label><input type="text" id="jobTitle" value="خبير الرواتب | أخصائي موارد بشرية"></div>
            <div class="form-group"><label id="emailLabel">البريد الإلكتروني</label><input type="email" id="email" value="khalid@example.com"></div>
            <div class="form-group"><label id="phoneLabel">رقم الهاتف</label><input type="text" id="phone" value="+201095890589"></div>
            <div class="form-group"><label id="locationLabel">العنوان</label><input type="text" id="location" value="مصر"></div>
            <div class="form-group"><label id="linkedinLabel">LinkedIn</label><input type="text" id="linkedin" value="linkedin.com/in/khalid-helmy"></div>
            <div class="form-group"><label><i class="fab fa-whatsapp"></i> رقم واتساب (للتسليم)</label><input type="text" id="userWhatsapp" placeholder="مثال: 201234567890" value=""></div>
            <div class="form-group"><label id="summaryLabel">نبذة شخصية</label><textarea id="summary" rows="2">خبير رواتب بخبرة تزيد عن 15 عاماً في إدارة الرواتب للقطاع الحكومي. خلفية في القانون المصري مع خبرة في SAP و Oracle.</textarea></div>
            
            <div><span class="section-title" id="expTitle">الخبرات العملية</span></div>
            <div id="experiencesContainer"></div>
            <button class="add-btn" id="addExperienceBtn"><i class="fas fa-plus-circle"></i> <span id="addExpText">إضافة خبرة</span></button>
            
            <div><span class="section-title" id="eduTitle">التعليم</span></div>
            <div id="educationContainer"></div>
            <button class="add-btn" id="addEducationBtn"><i class="fas fa-plus-circle"></i> <span id="addEduText">إضافة تعليم</span></button>
            
            <div class="form-group"><label id="skillsLabel">المهارات</label><input type="text" id="skills" value="HRIS, Excel متقدم, SAP, Oracle"></div>
            <div class="form-group"><label id="langsLabel">اللغات</label><input type="text" id="languages" value="العربية (لغة أم)، الإنجليزية (ممتاز)"></div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3 id="previewTitle"><i class="fas fa-eye"></i> معاينة السيرة الذاتية</h3>
                <button id="sendBtn" class="send-btn"><i class="fab fa-whatsapp"></i> <span id="sendText">إرسال السيرة الذاتية</span></button>
            </div>
            <div id="cvPreviewContainer" class="cv-preview template-modern"></div>
        </div>
    </div>
    <footer id="footerText">سيتم إرسال السيرة الذاتية إلى الخبير، وسيتم التواصل معك عبر واتساب لتسلم الملف</footer>
</div>

<script>
    // البيانات
    let experiences = [
        { title: "أخصائي رواتب أول", company: "هيئة البريد المصرية", startDate: "2014", endDate: "حالياً", description: "• إدارة كشوف رواتب 1,200+ موظف باستخدام SAP وOracle\n• تقليل وقت معالجة الرواتب بنسبة 30%\n• ضمان الامتثال الكامل للتأمينات والضرائب" }
    ];
    let educations = [
        { degree: "ليسانس الحقوق", institution: "جامعة القاهرة", year: "2018", description: "تخصص في القانون المصري" }
    ];
    
    let currentTemplate = "modern";
    let currentLang = "ar";
    let profileImageData = null;
    
    const EXPERT_WHATSAPP = "201095890589";
    
    // العناصر
    const fullNameInp = document.getElementById("fullName");
    const jobTitleInp = document.getElementById("jobTitle");
    const emailInp = document.getElementById("email");
    const phoneInp = document.getElementById("phone");
    const locationInp = document.getElementById("location");
    const linkedinInp = document.getElementById("linkedin");
    const userWhatsappInp = document.getElementById("userWhatsapp");
    const summaryInp = document.getElementById("summary");
    const skillsInp = document.getElementById("skills");
    const languagesInp = document.getElementById("languages");
    const expContainer = document.getElementById("experiencesContainer");
    const eduContainer = document.getElementById("educationContainer");
    const cvPreview = document.getElementById("cvPreviewContainer");
    const profileImageInput = document.getElementById("profileImage");
    const imageUploadSection = document.getElementById("imageUploadSection");
    
    const trans = {
        ar: {
            fullNameLabel: "الاسم الكامل", jobTitleLabel: "المسمى الوظيفي", emailLabel: "البريد الإلكتروني", phoneLabel: "رقم الهاتف",
            locationLabel: "العنوان", summaryLabel: "نبذة شخصية", skillsLabel: "المهارات (افصل بينها بفاصلة)", langsLabel: "اللغات",
            expTitle: "الخبرات العملية", eduTitle: "التعليم", addExpText: "إضافة خبرة", addEduText: "إضافة تعليم",
            previewTitle: "معاينة السيرة الذاتية", sendText: "إرسال السيرة الذاتية",
            footerText: "سيتم إرسال السيرة الذاتية إلى الخبير، وسيتم التواصل معك عبر واتساب لتسلم الملف",
            mainTitle: "منشئ السيرة الذاتية الاحترافية", subTitle: "أنشئ سيرتك الذاتية وسيتم التواصل معك عبر واتساب لتسليمها",
            tempModern: "✨ عصري", tempElegant: "💎 أنيق", tempPremium: "🌟 بريميوم",
            summarySec: "نبذة شخصية", experienceSec: "الخبرات العملية", educationSec: "التعليم", skillsSec: "المهارات", languagesSec: "اللغات", linkedinLabel: "LinkedIn", photoLabel: "الصورة الشخصية"
        },
        en: {
            fullNameLabel: "Full Name", jobTitleLabel: "Job Title", emailLabel: "Email", phoneLabel: "Phone",
            locationLabel: "Location", summaryLabel: "Summary", skillsLabel: "Skills (comma separated)", langsLabel: "Languages",
            expTitle: "Work Experience", eduTitle: "Education", addExpText: "Add Experience", addEduText: "Add Education",
            previewTitle: "CV Preview", sendText: "Send CV",
            footerText: "The CV will be sent to the expert, and you will be contacted via WhatsApp to receive it",
            mainTitle: "Professional CV Builder", subTitle: "Create your CV and you will be contacted via WhatsApp to receive it",
            tempModern: "✨ Modern", tempElegant: "💎 Elegant", tempPremium: "🌟 Premium",
            summarySec: "Summary", experienceSec: "Work Experience", educationSec: "Education", skillsSec: "Skills", languagesSec: "Languages", linkedinLabel: "LinkedIn", photoLabel: "Profile Picture"
        }
    };
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function applyLanguage() {
        const t = trans[currentLang];
        document.getElementById("fullNameLabel").innerHTML = t.fullNameLabel;
        document.getElementById("jobTitleLabel").innerHTML = t.jobTitleLabel;
        document.getElementById("emailLabel").innerHTML = t.emailLabel;
        document.getElementById("phoneLabel").innerHTML = t.phoneLabel;
        document.getElementById("locationLabel").innerHTML = t.locationLabel;
        document.getElementById("linkedinLabel").innerHTML = t.linkedinLabel;
        document.getElementById("summaryLabel").innerHTML = t.summaryLabel;
        document.getElementById("skillsLabel").innerHTML = t.skillsLabel;
        document.getElementById("langsLabel").innerHTML = t.langsLabel;
        document.getElementById("expTitle").innerHTML = t.expTitle;
        document.getElementById("eduTitle").innerHTML = t.eduTitle;
        document.getElementById("addExpText").innerText = t.addExpText;
        document.getElementById("addEduText").innerText = t.addEduText;
        document.getElementById("previewTitle").innerHTML = `<i class="fas fa-eye"></i> ${t.previewTitle}`;
        document.getElementById("sendText").innerText = t.sendText;
        document.getElementById("footerText").innerHTML = t.footerText;
        document.getElementById("mainTitle").innerHTML = `<i class="fas fa-file-alt"></i> ${t.mainTitle}`;
        document.getElementById("subTitle").innerText = t.subTitle;
        document.getElementById("tempModern").innerHTML = t.tempModern;
        document.getElementById("tempElegant").innerHTML = t.tempElegant;
        document.getElementById("tempPremium").innerHTML = t.tempPremium;
        document.getElementById("photoLabel").innerHTML = t.photoLabel;
        
        document.body.classList.toggle('english-mode', currentLang !== 'ar');
        document.body.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
        
        renderDynamicForms();
        updateCVPreview();
    }
    
    profileImageInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                profileImageData = event.target.result;
                updateCVPreview();
            };
            reader.readAsDataURL(file);
        }
    });
    
    function renderDynamicForms() {
        expContainer.innerHTML = "";
        experiences.forEach((exp, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="dynamic-item-header"><strong>${currentLang === 'ar' ? `خبرة ${idx+1}` : `Experience ${idx+1}`}</strong><button class="remove-btn" data-exp="${idx}"><i class="fas fa-trash-alt"></i></button></div>
                <input type="text" class="exp-title" value="${escapeHtml(exp.title)}" placeholder="${currentLang === 'ar' ? 'المسمى' : 'Title'}"><br>
                <input type="text" class="exp-company" value="${escapeHtml(exp.company)}" placeholder="${currentLang === 'ar' ? 'الشركة' : 'Company'}"><br>
                <input type="text" class="exp-start" value="${escapeHtml(exp.startDate)}" placeholder="Start" style="width:48%">
                <input type="text" class="exp-end" value="${escapeHtml(exp.endDate)}" placeholder="End" style="width:48%"><br>
                <textarea class="exp-desc" rows="3" placeholder="${currentLang === 'ar' ? 'الوصف' : 'Description'}">${escapeHtml(exp.description)}</textarea>
            `;
            expContainer.appendChild(div);
            
            div.querySelector(".exp-title").addEventListener("input", (e) => { experiences[idx].title = e.target.value; updateCVPreview(); });
            div.querySelector(".exp-company").addEventListener("input", (e) => { experiences[idx].company = e.target.value; updateCVPreview(); });
            div.querySelector(".exp-start").addEventListener("input", (e) => { experiences[idx].startDate = e.target.value; updateCVPreview(); });
            div.querySelector(".exp-end").addEventListener("input", (e) => { experiences[idx].endDate = e.target.value; updateCVPreview(); });
            div.querySelector(".exp-desc").addEventListener("input", (e) => { experiences[idx].description = e.target.value; updateCVPreview(); });
            div.querySelector(".remove-btn").addEventListener("click", () => { experiences.splice(idx,1); renderDynamicForms(); updateCVPreview(); });
        });
        
        eduContainer.innerHTML = "";
        educations.forEach((edu, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-item";
            div.innerHTML = `
                <div class="dynamic-item-header"><strong>${currentLang === 'ar' ? `تعليم ${idx+1}` : `Education ${idx+1}`}</strong><button class="remove-btn" data-edu="${idx}"><i class="fas fa-trash-alt"></i></button></div>
                <input type="text" class="edu-degree" value="${escapeHtml(edu.degree)}" placeholder="${currentLang === 'ar' ? 'الدرجة' : 'Degree'}"><br>
                <input type="text" class="edu-institution" value="${escapeHtml(edu.institution)}" placeholder="${currentLang === 'ar' ? 'المؤسسة' : 'Institution'}"><br>
                <input type="text" class="edu-year" value="${escapeHtml(edu.year)}" placeholder="Year"><br>
                <textarea class="edu-desc" rows="2" placeholder="${currentLang === 'ar' ? 'ملاحظات' : 'Notes'}">${escapeHtml(edu.description)}</textarea>
            `;
            eduContainer.appendChild(div);
            
            div.querySelector(".edu-degree").addEventListener("input", (e) => { educations[idx].degree = e.target.value; updateCVPreview(); });
            div.querySelector(".edu-institution").addEventListener("input", (e) => { educations[idx].institution = e.target.value; updateCVPreview(); });
            div.querySelector(".edu-year").addEventListener("input", (e) => { educations[idx].year = e.target.value; updateCVPreview(); });
            div.querySelector(".edu-desc").addEventListener("input", (e) => { educations[idx].description = e.target.value; updateCVPreview(); });
            div.querySelector(".remove-btn").addEventListener("click", () => { educations.splice(idx,1); renderDynamicForms(); updateCVPreview(); });
        });
    }
    
    function updateCVPreview() {
        const data = {
            fullName: fullNameInp.value, jobTitle: jobTitleInp.value, email: emailInp.value,
            phone: phoneInp.value, location: locationInp.value, linkedin: linkedinInp.value,
            summary: summaryInp.value, skills: skillsInp.value.split(',').map(s=>s.trim()),
            languages: languagesInp.value, experiences, educations, profileImage: profileImageData
        };
        const t = trans[currentLang];
        
        if (currentTemplate === "premium") {
            const avatarHtml = data.profileImage ? `<img class="premium-avatar" src="${data.profileImage}">` : `<div class="premium-avatar"><i class="fas fa-user"></i></div>`;
            cvPreview.innerHTML = `<div class="template-premium">
                <div class="premium-header">${avatarHtml}<div><div class="premium-name">${escapeHtml(data.fullName)}</div><div>${escapeHtml(data.jobTitle)}</div><div style="font-size:0.7rem"><i class="fas fa-envelope"></i> ${escapeHtml(data.email)} | <i class="fas fa-phone"></i> ${escapeHtml(data.phone)}</div></div></div>
                <div><div class="section-title-preview">${t.summarySec}</div><p>${escapeHtml(data.summary)}</p></div>
                <div><div class="section-title-preview">${t.experienceSec}</div>${data.experiences.map(exp => `<div><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><div class="job-desc">${escapeHtml(exp.description)}</div></div>`).join('')}</div>
                <div><div class="section-title-preview">${t.educationSec}</div>${data.educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/>${escapeHtml(edu.description)}</div>`).join('')}</div>
                <div><div class="section-title-preview">${t.skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
                <div><div class="section-title-preview">${t.languagesSec}</div><p>${escapeHtml(data.languages)}</p></div>
            </div>`;
        } else if (currentTemplate === "modern") {
            cvPreview.innerHTML = `<div class="template-modern">
                <div class="cv-name">${escapeHtml(fullNameInp.value)}</div>
                <div class="cv-title">${escapeHtml(jobTitleInp.value)}</div>
                <div style="text-align:center; font-size:0.75rem; margin:8px 0"><i class="fas fa-envelope"></i> ${escapeHtml(emailInp.value)} | <i class="fas fa-phone"></i> ${escapeHtml(phoneInp.value)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(locationInp.value)}</div>
                <div><div class="section-title-preview">${t.summarySec}</div><p>${escapeHtml(summaryInp.value)}</p></div>
                <div><div class="section-title-preview">${t.experienceSec}</div>${experiences.map(exp => `<div><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><div class="job-desc">${escapeHtml(exp.description)}</div></div>`).join('')}</div>
                <div><div class="section-title-preview">${t.educationSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/>${escapeHtml(edu.description)}</div>`).join('')}</div>
                <div><div class="section-title-preview">${t.skillsSec}</div><div class="skills-list">${skillsInp.value.split(',').map(s=>`<span class="skill-tag">${escapeHtml(s.trim())}</span>`).join('')}</div></div>
                <div><div class="section-title-preview">${t.languagesSec}</div><p>${escapeHtml(languagesInp.value)}</p></div>
            </div>`;
        } else {
            cvPreview.innerHTML = `<div class="template-elegant">
                <div class="elegant-header"><div style="font-size:1.4rem; font-weight:800">${escapeHtml(fullNameInp.value)}</div><div>${escapeHtml(jobTitleInp.value)}</div><div style="font-size:0.7rem">${escapeHtml(emailInp.value)} | ${escapeHtml(phoneInp.value)}</div></div>
                <div><div class="section-title-preview">${t.summarySec}</div><p>${escapeHtml(summaryInp.value)}</p></div>
                <div><div class="section-title-preview">${t.experienceSec}</div>${experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><div class="job-desc">${escapeHtml(exp.description)}</div></div><hr/>`).join('')}</div>
                <div><div class="section-title-preview">${t.educationSec}</div>${educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/>${escapeHtml(edu.description)}</div><hr/>`).join('')}</div>
                <div><div class="section-title-preview">${t.skillsSec}</div><div class="skills-list">${skillsInp.value.split(',').map(s=>`<span class="skill-tag">${escapeHtml(s.trim())}</span>`).join('')}</div></div>
                <div><div class="section-title-preview">${t.languagesSec}</div><p>${escapeHtml(languagesInp.value)}</p></div>
            </div>`;
        }
        cvPreview.className = `cv-preview template-${currentTemplate}`;
    }
    
    function toggleImageUpload() {
        imageUploadSection.style.display = currentTemplate === "premium" ? "block" : "none";
    }
    
    document.getElementById("addExperienceBtn").addEventListener("click", () => {
        experiences.push({ title: "مسمى وظيفي", company: "اسم الشركة", startDate: "2024", endDate: "الآن", description: "" });
        renderDynamicForms();
        updateCVPreview();
    });
    document.getElementById("addEducationBtn").addEventListener("click", () => {
        educations.push({ degree: "درجة علمية", institution: "اسم الجامعة", year: "2024", description: "" });
        renderDynamicForms();
        updateCVPreview();
    });
    
    document.querySelectorAll(".template-option").forEach(opt => {
        opt.addEventListener("click", () => {
            document.querySelectorAll(".template-option").forEach(o => o.classList.remove("active"));
            opt.classList.add("active");
            currentTemplate = opt.dataset.template;
            toggleImageUpload();
            updateCVPreview();
        });
    });
    
    document.getElementById("langArBtn").addEventListener("click", () => {
        currentLang = "ar";
        document.getElementById("langArBtn").classList.add("active");
        document.getElementById("langEnBtn").classList.remove("active");
        applyLanguage();
    });
    document.getElementById("langEnBtn").addEventListener("click", () => {
        currentLang = "en";
        document.getElementById("langEnBtn").classList.add("active");
        document.getElementById("langArBtn").classList.remove("active");
        applyLanguage();
    });
    
    const inputIds = ["fullName", "jobTitle", "email", "phone", "location", "linkedin", "summary", "skills", "languages"];
    inputIds.forEach(id => document.getElementById(id).addEventListener("input", () => updateCVPreview()));
    
    // إرسال السيرة الذاتية
    async function sendCV() {
        const userPhone = userWhatsappInp.value.trim();
        if (!userPhone) {
            alert(currentLang === 'ar' ? "الرجاء إدخال رقم واتساب الخاص بك" : "Please enter your WhatsApp number");
            return;
        }
        
        const loader = document.createElement('div');
        loader.className = 'loading-overlay';
        loader.innerHTML = '<div class="spinner"></div><div>' + (currentLang === 'ar' ? 'جاري تجهيز السيرة الذاتية...' : 'Preparing CV...') + '</div>';
        document.body.appendChild(loader);
        
        try {
            const originalStyle = cvPreview.style.cssText;
            cvPreview.style.width = "794px";
            cvPreview.style.margin = "0 auto";
            cvPreview.style.padding = "12mm 10mm";
            cvPreview.style.background = "white";
            
            await new Promise(r => setTimeout(r, 100));
            
            const canvas = await html2canvas(cvPreview, { scale: 3, backgroundColor: '#ffffff', logging: false });
            
            cvPreview.style.cssText = originalStyle;
            
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
            
            const pdfBlob = pdf.output('blob');
            const pdfUrl = URL.createObjectURL(pdfBlob);
            
            const expertMessage = `📄 *طلب سيرة ذاتية جديدة*
            
👤 الاسم: ${fullNameInp.value}
💼 المسمى: ${jobTitleInp.value}
📧 البريد: ${emailInp.value}
📞 هاتف العميل: ${phoneInp.value}
📱 واتساب العميل: ${userPhone}

🔗 رابط السيرة الذاتية: ${pdfUrl}

📌 يرجى حفظ الملف والتواصل مع العميل.`;
            
            const clientMessage = `🌟 *مرحباً ${fullNameInp.value}*
            
تم استلام طلب السيرة الذاتية بنجاح ✅

سيتم التواصل معك عبر هذا الرقم ${userPhone} خلال 24 ساعة لتسليم السيرة الذاتية بعد المراجعة.

شكراً لثقتك 🤝`;
            
            window.open(`https://wa.me/${EXPERT_WHATSAPP}?text=${encodeURIComponent(expertMessage)}`, '_blank');
            setTimeout(() => {
                window.open(`https://wa.me/${userPhone}?text=${encodeURIComponent(clientMessage)}`, '_blank');
            }, 500);
            
            alert(currentLang === 'ar' ? "تم إرسال طلبك بنجاح! سيتم التواصل معك عبر واتساب قريباً." : "Your request has been sent! You will be contacted via WhatsApp soon.");
            
        } catch(err) {
            console.error(err);
            alert(currentLang === 'ar' ? "حدث خطأ، حاول مرة أخرى" : "Error, please try again");
        } finally {
            document.body.removeChild(loader);
        }
    }
    
    document.getElementById("sendBtn").addEventListener("click", sendCV);
    
    renderDynamicForms();
    applyLanguage();
    toggleImageUpload();
    updateCVPreview();
</script>
</body>
</html>
