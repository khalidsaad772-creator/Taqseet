<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خالد حلمي خفاجي - السيرة الذاتية (نصي PDF)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e9eef5 100%);
            font-family: 'Cairo', sans-serif;
            padding: 1.5rem;
        }
        body.english-mode { direction: ltr; text-align: left; font-family: 'Inter', 'Cairo', sans-serif; }
        .app-container { max-width: 1400px; margin: 0 auto; }
        
        .lang-switch { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 0.5rem; }
        .lang-btn {
            background: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px;
            font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .lang-btn.active { background: #1e6f5c; color: white; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; font-weight: 800; color: #1e4a6b; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; }
        .form-panel {
            background: white; border-radius: 28px; padding: 1.5rem;
            max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 1.2rem; }
        label { font-weight: 700; display: block; margin-bottom: 0.3rem; font-size: 0.85rem; }
        input, textarea {
            width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0;
            border-radius: 18px; font-family: inherit;
        }
        .section-title { font-size: 1.1rem; font-weight: 800; border-bottom: 3px solid #2c7da0; display: inline-block; margin: 1rem 0 0.8rem 0; }
        .dynamic-item { background: #f8fafc; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; }
        .remove-btn { background: #fee2e2; border: none; color: #b91c1c; padding: 0.3rem 0.8rem; border-radius: 30px; cursor: pointer; }
        .add-btn { background: #eef2ff; border: none; padding: 0.4rem 1rem; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 0.3rem; }
        .template-selector { display: flex; gap: 0.5rem; margin: 1rem 0; background: #f1f5f9; padding: 0.3rem; border-radius: 40px; }
        .template-option { flex: 1; text-align: center; padding: 0.5rem; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .template-option.active { background: white; color: #1f6e8c; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        
        .preview-panel {
            background: white; border-radius: 28px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .preview-header {
            background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #e9edf2;
            display: flex; justify-content: space-between; align-items: center;
        }
        .download-btn { background: #1e6f5c; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .download-btn:hover { background: #0f5a4a; }
        
        /* قالب جانبي */
        .template-sidebar { display: grid; grid-template-columns: 0.9fr 2.1fr; gap: 1.2rem; }
        .template-sidebar .sidebar-col { background: #eef3fa; padding: 1rem; border-radius: 16px; }
        .template-sidebar .main-col .section-title-preview { font-weight: 800; font-size: 1rem; border-bottom: 2px solid #cbdbe2; margin: 0.8rem 0 0.4rem; }
        
        .template-modern .cv-header { text-align: center; margin-bottom: 1rem; }
        .template-modern .cv-name { font-size: 1.8rem; font-weight: 800; color: #0f3b4a; }
        .template-modern .section-title-preview { font-weight: 800; font-size: 1.1rem; border-right: 4px solid #2c7da0; padding-right: 0.5rem; margin: 0.8rem 0 0.5rem; }
        
        .template-elegant .cv-header { background: #2c3e4e; color: white; margin: -1.5rem -1.5rem 1rem -1.5rem; padding: 1.2rem; border-radius: 16px 16px 30px 30px; }
        .template-elegant .section-title-preview { font-weight: 800; border-bottom: 2px solid #d4c2a7; display: inline-block; margin-bottom: 0.5rem; }
        
        .cv-preview { padding: 1.5rem; background: white; margin: 1rem; border-radius: 16px; }
        .job-item, .edu-item { margin-bottom: 0.8rem; }
        .job-title { font-weight: 800; }
        .job-date { font-size: 0.7rem; color: #5b6e8c; }
        .job-desc { white-space: pre-line; font-size: 0.85rem; }
        .skills-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .skill-tag { background: #eef2ff; padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; }
        
        @media (max-width: 950px) { .dashboard { grid-template-columns: 1fr; } }
        footer { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: #556b82; }
        
        /* تثبيت حجم الـ CV للتصدير */
        .cv-for-pdf {
            width: 100%;
            max-width: 794px;
            margin: 0 auto;
            padding: 12mm 10mm;
            background: white;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="lang-switch">
        <button id="langArBtn" class="lang-btn active"><i class="fas fa-language"></i> العربية</button>
        <button id="langEnBtn" class="lang-btn"><i class="fas fa-language"></i> English</button>
    </div>
    <div class="header">
        <h1><i class="fas fa-file-alt"></i> منشئ السيرة الذاتية الاحترافية</h1>
        <p>PDF نصي قابل للنسخ - مع 3 قوالب مضمونة</p>
    </div>

    <div class="dashboard">
        <div class="form-panel">
            <div class="template-selector" id="templateSelector">
                <div data-template="modern" class="template-option active">✨ عصري</div>
                <div data-template="elegant" class="template-option">💎 أنيق</div>
                <div data-template="sidebar" class="template-option">📐 جانبي</div>
            </div>
            
            <div class="form-group"><label><i class="fas fa-user"></i> الاسم الكامل</label><input type="text" id="fullName" value="Khalid Helmy Khafagy / خالد حلمي خفاجي"></div>
            <div class="form-group"><label><i class="fas fa-briefcase"></i> المسمى الوظيفي</label><input type="text" id="jobTitle" value="Payroll & HRIS Specialist | SAP & Oracle Expert"></div>
            <div class="form-group"><label><i class="fas fa-envelope"></i> البريد الإلكتروني</label><input type="email" id="email" value="khalidhelmy772@gmail.com"></div>
            <div class="form-group"><label><i class="fas fa-phone-alt"></i> الهاتف</label><input type="text" id="phone" value="+201095890589"></div>
            <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> العنوان</label><input type="text" id="location" value="Egypt"></div>
            <div class="form-group"><label><i class="fab fa-linkedin"></i> LinkedIn</label><input type="text" id="linkedin" value="linkedin.com/in/khalid-helmy"></div>
            <div class="form-group"><label><i class="fas fa-align-left"></i> نبذة</label><textarea id="summary" rows="3">Results-oriented Payroll Specialist with over 15 years of experience managing end-to-end payroll for large-scale government-sector workforces. LL.B. background combined with technical mastery of SAP and Oracle Payroll ensures 100% compliance with Egyptian labor law, social insurance, and tax regulations.</textarea></div>
            
            <div><span class="section-title">الخبرات</span></div>
            <div id="experiencesContainer"></div>
            <button id="addExperienceBtn" class="add-btn"><i class="fas fa-plus"></i> إضافة خبرة</button>
            
            <div><span class="section-title">التعليم</span></div>
            <div id="educationContainer"></div>
            <button id="addEducationBtn" class="add-btn"><i class="fas fa-plus"></i> إضافة تعليم</button>
            
            <div class="form-group"><label><i class="fas fa-code"></i> المهارات</label><input type="text" id="skills" value="HRIS, Advanced Excel, SAP, Oracle, Adobe Creative Suite"></div>
            <div class="form-group"><label><i class="fas fa-language"></i> اللغات</label><input type="text" id="languages" value="Arabic (Native), English (Professional)"></div>
        </div>

        <div class="preview-panel">
            <div class="preview-header">
                <h3><i class="fas fa-eye"></i> معاينة السيرة الذاتية</h3>
                <button id="downloadPDFBtn" class="download-btn"><i class="fas fa-download"></i> تحميل PDF (نص قابل للنسخ)</button>
            </div>
            <div id="cvPreviewContainer" class="cv-preview template-modern"></div>
        </div>
    </div>
    <footer>الـ PDF يخرج كنص قابل للنسخ بالكامل مع الحفاظ على التنسيق الاحترافي.</footer>
</div>

<script>
    // البيانات
    let experiences = [
        { title: "Senior Payroll Specialist", company: "Egypt Post", startDate: "2014", endDate: "Present", description: "• Manage full-cycle payroll for 1,200+ employees using SAP and Oracle with 99.9% accuracy\n• Reduced payroll processing time by 30% through automation\n• Ensure 100% compliance on social insurance and tax filings\n• Maintain employee records across ERP platforms\n• Generate financial and HR reports to support audits\n• Resolved 50+ system tickets annually" }
    ];
    let educations = [
        { degree: "LL.B. (Bachelor of Laws)", institution: "Cairo University", year: "2018", description: "Background in Egyptian labor law and legal compliance" }
    ];
    let currentTemplate = "modern";
    let currentLang = "ar";

    // تعريف العناصر
    const fullName = document.getElementById("fullName");
    const jobTitle = document.getElementById("jobTitle");
    const email = document.getElementById("email");
    const phone = document.getElementById("phone");
    const location = document.getElementById("location");
    const linkedin = document.getElementById("linkedin");
    const summary = document.getElementById("summary");
    const skills = document.getElementById("skills");
    const languages = document.getElementById("languages");
    const expContainer = document.getElementById("experiencesContainer");
    const eduContainer = document.getElementById("educationContainer");
    const cvPreview = document.getElementById("cvPreviewContainer");

    function renderCV() {
        const data = {
            fullName: fullName.value,
            jobTitle: jobTitle.value,
            email: email.value,
            phone: phone.value,
            location: location.value,
            linkedin: linkedin.value,
            summary: summary.value,
            skills: skills.value.split(',').map(s=>s.trim()),
            languages: languages.value,
            experiences: experiences,
            educations: educations
        };
        
        const summarySec = currentLang === 'ar' ? "نبذة شخصية" : "Summary";
        const expSec = currentLang === 'ar' ? "الخبرات العملية" : "Work Experience";
        const eduSec = currentLang === 'ar' ? "التعليم" : "Education";
        const skillsSec = currentLang === 'ar' ? "المهارات" : "Skills";
        const langsSec = currentLang === 'ar' ? "اللغات" : "Languages";
        
        if(currentTemplate === "sidebar") {
            cvPreview.innerHTML = `<div class="template-sidebar">
                <div class="sidebar-col">
                    <div style="font-weight:800; font-size:1.2rem;">${escapeHtml(data.fullName)}</div>
                    <div style="font-size:0.8rem; color:#2c7da0;">${escapeHtml(data.jobTitle)}</div>
                    <hr><div><i class="fas fa-envelope"></i> ${escapeHtml(data.email)}</div>
                    <div><i class="fas fa-phone"></i> ${escapeHtml(data.phone)}</div>
                    <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(data.location)}</div>
                    ${data.linkedin ? `<div><i class="fab fa-linkedin"></i> ${escapeHtml(data.linkedin)}</div>` : ''}
                    <hr><div><strong>${skillsSec}</strong><br>${data.skills.map(s=>`• ${s}`).join('<br>')}</div>
                    <hr><div><strong>${langsSec}</strong><br>${escapeHtml(data.languages)}</div>
                </div>
                <div class="main-col">
                    <div><div class="section-title-preview">${summarySec}</div><p>${escapeHtml(data.summary)}</p></div>
                    <div><div class="section-title-preview">${expSec}</div>${data.experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div><br/>`).join('')}</div>
                    <div><div class="section-title-preview">${eduSec}</div>${data.educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div><br/>`).join('')}</div>
                </div>
            </div>`;
        } 
        else if(currentTemplate === "modern") {
            cvPreview.innerHTML = `<div class="cv-header"><div class="cv-name">${escapeHtml(data.fullName)}</div><div class="cv-title" style="color:#2c7da0;">${escapeHtml(data.jobTitle)}</div><div style="font-size:0.8rem;"><i class="fas fa-envelope"></i> ${escapeHtml(data.email)} | <i class="fas fa-phone"></i> ${escapeHtml(data.phone)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(data.location)} ${data.linkedin ? `| <i class="fab fa-linkedin"></i> ${escapeHtml(data.linkedin)}` : ''}</div></div>
            <div><div class="section-title-preview">${summarySec}</div><p>${escapeHtml(data.summary)}</p></div>
            <div><div class="section-title-preview">${expSec}</div>${data.experiences.map(exp => `<div class="job-item"><div class="job-title">${escapeHtml(exp.title)} - ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})</div><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div>`).join('')}</div>
            <div><div class="section-title-preview">${eduSec}</div>${data.educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong> - ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div>`).join('')}</div>
            <div><div class="section-title-preview">${skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
            <div><div class="section-title-preview">${langsSec}</div><p>${escapeHtml(data.languages)}</p></div>`;
        }
        else {
            cvPreview.innerHTML = `<div class="cv-header" style="background:#2c3e4e; color:white; margin:-1rem -1rem 1rem -1rem; padding:1rem; border-radius:16px;"><div class="cv-name">${escapeHtml(data.fullName)}</div><div>${escapeHtml(data.jobTitle)}</div><div style="font-size:0.7rem;">${escapeHtml(data.email)} | ${escapeHtml(data.phone)} | ${escapeHtml(data.location)}</div></div>
            <div><div class="section-title-preview">${summarySec}</div><p>${escapeHtml(data.summary)}</p></div>
            <div><div class="section-title-preview">${expSec}</div>${data.experiences.map(exp => `<div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.company)} (${exp.startDate}-${exp.endDate})<br/><p style="white-space:pre-line">${escapeHtml(exp.description)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-title-preview">${eduSec}</div>${data.educations.map(edu => `<div><strong>${escapeHtml(edu.degree)}</strong>, ${escapeHtml(edu.institution)} (${edu.year})<br/><p>${escapeHtml(edu.description)}</p></div><hr/>`).join('')}</div>
            <div><div class="section-title-preview">${skillsSec}</div><div class="skills-list">${data.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div></div>
            <div><div class="section-title-preview">${langsSec}</div><p>${escapeHtml(data.languages)}</p></div>`;
        }
        cvPreview.className = `cv-preview template-${currentTemplate}`;
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function renderDynamicForms() {
        expContainer.innerHTML = experiences.map((exp, idx) => `
            <div class="dynamic-item">
                <div style="display:flex; justify-content:space-between;"><strong>خبرة ${idx+1}</strong><button class="remove-exp" data-idx="${idx}"><i class="fas fa-trash"></i></button></div>
                <input class="exp-title-${idx}" value="${escapeHtml(exp.title)}" placeholder="المسمى"><br>
                <input class="exp-company-${idx}" value="${escapeHtml(exp.company)}" placeholder="الشركة"><br>
                <input class="exp-start-${idx}" value="${escapeHtml(exp.startDate)}" placeholder="تاريخ البدء" style="width:48%; display:inline-block;">
                <input class="exp-end-${idx}" value="${escapeHtml(exp.endDate)}" placeholder="تاريخ الانتهاء" style="width:48%; display:inline-block;"><br>
                <textarea class="exp-desc-${idx}" rows="3" placeholder="الوصف">${escapeHtml(exp.description)}</textarea>
            </div>`).join('');
        eduContainer.innerHTML = educations.map((edu, idx) => `
            <div class="dynamic-item">
                <div style="display:flex; justify-content:space-between;"><strong>تعليم ${idx+1}</strong><button class="remove-edu" data-idx="${idx}"><i class="fas fa-trash"></i></button></div>
                <input class="edu-degree-${idx}" value="${escapeHtml(edu.degree)}" placeholder="الدرجة"><br>
                <input class="edu-institution-${idx}" value="${escapeHtml(edu.institution)}" placeholder="المؤسسة"><br>
                <input class="edu-year-${idx}" value="${escapeHtml(edu.year)}" placeholder="السنة"><br>
                <textarea class="edu-desc-${idx}" rows="2" placeholder="ملاحظات">${escapeHtml(edu.description)}</textarea>
            </div>`).join('');
        
        document.querySelectorAll('.remove-exp').forEach(btn => btn.addEventListener('click', (e) => { experiences.splice(parseInt(btn.dataset.idx),1); renderDynamicForms(); renderCV(); }));
        document.querySelectorAll('.remove-edu').forEach(btn => btn.addEventListener('click', (e) => { educations.splice(parseInt(btn.dataset.idx),1); renderDynamicForms(); renderCV(); }));
        
        for(let i=0; i<experiences.length; i++) {
            document.querySelector(`.exp-title-${i}`)?.addEventListener('input', (e) => { experiences[i].title = e.target.value; renderCV(); });
            document.querySelector(`.exp-company-${i}`)?.addEventListener('input', (e) => { experiences[i].company = e.target.value; renderCV(); });
            document.querySelector(`.exp-start-${i}`)?.addEventListener('input', (e) => { experiences[i].startDate = e.target.value; renderCV(); });
            document.querySelector(`.exp-end-${i}`)?.addEventListener('input', (e) => { experiences[i].endDate = e.target.value; renderCV(); });
            document.querySelector(`.exp-desc-${i}`)?.addEventListener('input', (e) => { experiences[i].description = e.target.value; renderCV(); });
        }
        for(let i=0; i<educations.length; i++) {
            document.querySelector(`.edu-degree-${i}`)?.addEventListener('input', (e) => { educations[i].degree = e.target.value; renderCV(); });
            document.querySelector(`.edu-institution-${i}`)?.addEventListener('input', (e) => { educations[i].institution = e.target.value; renderCV(); });
            document.querySelector(`.edu-year-${i}`)?.addEventListener('input', (e) => { educations[i].year = e.target.value; renderCV(); });
            document.querySelector(`.edu-desc-${i}`)?.addEventListener('input', (e) => { educations[i].description = e.target.value; renderCV(); });
        }
    }
    
    document.getElementById("addExperienceBtn").addEventListener('click', () => { experiences.push({ title:"وظيفة جديدة", company:"الشركة", startDate:"2024", endDate:"الآن", description:"" }); renderDynamicForms(); renderCV(); });
    document.getElementById("addEducationBtn").addEventListener('click', () => { educations.push({ degree:"درجة جديدة", institution:"الجامعة", year:"2024", description:"" }); renderDynamicForms(); renderCV(); });
    
    document.querySelectorAll(".template-option").forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll(".template-option").forEach(o=>o.classList.remove('active'));
            opt.classList.add('active');
            currentTemplate = opt.dataset.template;
            renderCV();
        });
    });
    
    document.getElementById("langArBtn").addEventListener('click', () => { currentLang = "ar"; document.body.classList.remove('english-mode'); document.body.setAttribute('dir','rtl'); renderCV(); });
    document.getElementById("langEnBtn").addEventListener('click', () => { currentLang = "en"; document.body.classList.add('english-mode'); document.body.setAttribute('dir','ltr'); renderCV(); });
    
    const inputs = [fullName, jobTitle, email, phone, location, linkedin, summary, skills, languages];
    inputs.forEach(inp => inp.addEventListener('input', () => renderCV()));
    
    // PDF Download - نصي قابل للنسخ
    document.getElementById("downloadPDFBtn").addEventListener('click', () => {
        const originalWidth = cvPreview.style.width;
        const originalMargin = cvPreview.style.margin;
        const originalPadding = cvPreview.style.padding;
        
        cvPreview.style.width = "794px";
        cvPreview.style.margin = "0 auto";
        cvPreview.style.padding = "12mm 10mm";
        
        setTimeout(() => {
            const opt = {
                margin: [0, 0, 0, 0],
                filename: `CV_${fullName.value.replace(/\s/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: 'avoid-all' }
            };
            html2pdf().set(opt).from(cvPreview).save().then(() => {
                cvPreview.style.width = originalWidth;
                cvPreview.style.margin = originalMargin;
                cvPreview.style.padding = originalPadding;
            });
        }, 100);
    });
    
    renderDynamicForms();
    renderCV();
</script>
</body>
</html>
