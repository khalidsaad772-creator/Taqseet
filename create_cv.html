<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder Pro | سيرة ذاتية احترافية - نسخة مطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c7da0;
            --secondary: #1e6f5c;
            --bg-gray: #f4f7f9;
            --text-dark: #0f2b3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #eef2f7 0%, #dfe9f3 100%);
            font-family: 'Cairo', sans-serif;
            color: var(--text-dark);
            padding: 20px;
        }

        .app-container {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 25px;
        }

        /* التحكم في اللغات */
        .lang-switch {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-lang {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-lang.active { background: var(--primary); color: white; }

        /* لوحة التحكم (المدخلات) */
        .form-panel {
            background: white;
            border-radius: 25px;
            padding: 25px;
            height: 88vh;
            overflow-y: auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--primary);
            border-bottom: 2px solid #eee;
            margin: 20px 0 15px;
            padding-bottom: 5px;
            font-weight: 800;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
        }

        .dynamic-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid #edf2f7;
        }

        .add-btn {
            background: #eef2ff;
            color: var(--primary);
            border: 1px dashed var(--primary);
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 5px;
        }

        /* لوحة المعاينة (الـ PDF) */
        .preview-area {
            background: #525659;
            border-radius: 25px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 88vh;
            overflow-y: auto;
        }

        .download-header {
            width: 100%;
            max-width: 210mm;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
        }

        .btn-download {
            background: var(--secondary);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* مقاسات الورقة الثابتة لمنع المشكلة التي ظهرت بالصورة */
        #cvPreviewContainer {
            width: 210mm; /* عرض A4 ثابت */
            min-height: 297mm; /* طول A4 ثابت */
            background: white;
            padding: 20mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
            position: relative;
        }

        /* ستايل المحتوى داخل الـ CV */
        .cv-preview-content { color: #333; line-height: 1.5; }
        .cv-header { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .cv-name { font-size: 26pt; font-weight: 800; color: var(--text-dark); }
        .cv-job { font-size: 16pt; color: var(--primary); margin-top: 5px; }
        
        .cv-section-title {
            font-size: 13pt;
            font-weight: 700;
            background: #f0f4f8;
            padding: 5px 15px;
            margin: 15px 0 10px;
            border-right: 5px solid var(--primary);
        }
        
        body.en-mode .cv-section-title { border-right: none; border-left: 5px solid var(--primary); }

        .item-row { margin-bottom: 15px; page-break-inside: avoid; }
        .item-head { display: flex; justify-content: space-between; font-weight: 700; }
        .item-sub { color: var(--primary); font-style: italic; font-size: 10pt; }

        @media (max-width: 1000px) {
            .app-container { grid-template-columns: 1fr; }
            #cvPreviewContainer { transform: scale(0.5); transform-origin: top center; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-switch">
        <button id="arBtn" class="btn-lang active" onclick="setLang('ar')">العربية</button>
        <button id="enBtn" class="btn-lang" onclick="setLang('en')">English</button>
    </div>

    <!-- لوحة الإدخال -->
    <div class="form-panel">
        <h2 id="panelTitle">بيانات السيرة الذاتية</h2>
        
        <div class="section-title" id="personalTitle">المعلومات الشخصية</div>
        <div class="form-group"><label id="nameL">الاسم الكامل</label><input type="text" id="fullName" value="ليلى السيد"></div>
        <div class="form-group"><label id="jobL">المسمى الوظيفي</label><input type="text" id="jobTitle" value="مصممة تجربة مستخدم أول"></div>
        <div class="form-group"><label id="sumL">نبذة شخصية</label><textarea id="summary" rows="3">مصممة UX محترفة بخبرة 6 سنوات في تصميم تجارب رقمية مبتكرة.</textarea></div>

        <div class="section-title" id="expTitle">الخبرة العملية</div>
        <div id="experienceInputs"></div>
        <button class="add-btn" onclick="addExperience()">+ إضافة خبرة</button>

        <div class="section-title" id="skillTitle">المهارات واللغات</div>
        <div class="form-group"><label id="skillL">المهارات (فاصلة بين كل مهارة)</label><input type="text" id="skills" value="Figma, UI Design, Research"></div>
    </div>

    <!-- لوحة المعاينة -->
    <div class="preview-area">
        <div class="download-header">
            <span id="previewLabel">معاينة مباشرة (A4)</span>
            <button class="btn-download" onclick="downloadPDF()">
                <i class="fas fa-file-pdf"></i> <span id="dlText">تحميل PDF</span>
            </button>
        </div>

        <div id="cvPreviewContainer">
            <div id="cvContent" class="cv-preview-content">
                <!-- الـ JavaScript سيضع المحتوى هنا -->
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
    let currentLang = 'ar';
    let experiences = [
        { title: "مصممة UX كبيرة", company: "شركة تكامل", date: "2022 - الآن", desc: "قيادة فريق التصميم وتطوير تجربة مستخدم لمنصة رقمية." }
    ];

    const translations = {
        ar: {
            panelTitle: "بيانات السيرة الذاتية", personalTitle: "المعلومات الشخصية", nameL: "الاسم الكامل", jobL: "المسمى الوظيفي",
            sumL: "نبذة شخصية", expTitle: "الخبرة العملية", skillTitle: "المهارات واللغات", skillL: "المهارات", 
            previewLabel: "معاينة مباشرة (A4)", dlText: "تحميل PDF بصفحة واحدة", sumSec: "الملخص المهني", expSec: "الخبرة العملية", skillSec: "المهارات"
        },
        en: {
            panelTitle: "CV Information", personalTitle: "Personal Info", nameL: "Full Name", jobL: "Job Title",
            sumL: "Professional Summary", expTitle: "Work Experience", skillTitle: "Skills & Languages", skillL: "Skills",
            previewLabel: "Live Preview (A4)", dlText: "Download One-Page PDF", sumSec: "Summary", expSec: "Experience", skillSec: "Skills"
        }
    };

    function setLang(lang) {
        currentLang = lang;
        document.body.className = lang === 'en' ? 'en-mode' : '';
        document.getElementById('arBtn').classList.toggle('active', lang === 'ar');
        document.getElementById('enBtn').classList.toggle('active', lang === 'en');
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        for (let id in t) {
            const el = document.getElementById(id);
            if (el) el.innerText = t[id];
        }
        renderFormExperiences();
        renderPreview();
    }

    function renderFormExperiences() {
        const container = document.getElementById('experienceInputs');
        container.innerHTML = experiences.map((exp, i) => `
            <div class="dynamic-item">
                <input type="text" placeholder="المسمى الوظيفي" value="${exp.title}" oninput="updateExp(${i}, 'title', this.value)">
                <input type="text" placeholder="الشركة" value="${exp.company}" oninput="updateExp(${i}, 'company', this.value)" style="margin-top:5px">
                <input type="text" placeholder="التاريخ" value="${exp.date}" oninput="updateExp(${i}, 'date', this.value)" style="margin-top:5px">
                <textarea placeholder="الوصف" oninput="updateExp(${i}, 'desc', this.value)" style="margin-top:5px">${exp.desc}</textarea>
            </div>
        `).join('');
    }

    function updateExp(index, field, value) {
        experiences[index][field] = value;
        renderPreview();
    }

    function addExperience() {
        experiences.push({ title: "", company: "", date: "", desc: "" });
        renderFormExperiences();
        renderPreview();
    }

    function renderPreview() {
        const t = translations[currentLang];
        const name = document.getElementById('fullName').value;
        const job = document.getElementById('jobTitle').value;
        const summary = document.getElementById('summary').value;
        const skills = document.getElementById('skills').value.split(',');

        document.getElementById('cvContent').innerHTML = `
            <div class="cv-header" style="direction: ${currentLang === 'ar' ? 'rtl' : 'ltr'}">
                <div class="cv-name">${name}</div>
                <div class="cv-job">${job}</div>
            </div>

            <div style="direction: ${currentLang === 'ar' ? 'rtl' : 'ltr'}">
                <div class="cv-section-title">${t.sumSec}</div>
                <p style="font-size: 11pt; text-align: justify;">${summary}</p>

                <div class="cv-section-title">${t.expSec}</div>
                ${experiences.map(exp => `
                    <div class="item-row">
                        <div class="item-head"><span>${exp.title}</span><span>${exp.date}</span></div>
                        <div class="item-sub">${exp.company}</div>
                        <p style="font-size: 10pt;">${exp.desc}</p>
                    </div>
                `).join('')}

                <div class="cv-section-title">${t.skillSec}</div>
                <div style="display:flex; flex-wrap:wrap; gap:8px;">
                    ${skills.map(s => `<span style="border:1px solid #ddd; padding:2px 10px; border-radius:4px; font-size:10pt;">${s.trim()}</span>`).join('')}
                </div>
            </div>
        `;
    }

    function downloadPDF() {
        const element = document.getElementById('cvPreviewContainer');
        const opt = {
            margin: 0,
            filename: 'My_Professional_CV.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // تشغيل أولي
    document.getElementById('fullName').addEventListener('input', renderPreview);
    document.getElementById('jobTitle').addEventListener('input', renderPreview);
    document.getElementById('summary').addEventListener('input', renderPreview);
    document.getElementById('skills').addEventListener('input', renderPreview);
    updateUI();
</script>

</body>
</html>
